<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e36b7f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TimeNest">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/app-icon.svg">
  <title>TimeNest</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2937;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #fffdf8;
      --panel: #ffffff;
      --rose: #e36b7f;
      --rose-dark: #b94d61;
      --mint: #3da989;
      --gold: #d99825;
      --blue: #4d7cc7;
      --floor: #d7a876;
      --wall: #f1d9c8;
      --shadow: 0 12px 30px rgba(31, 41, 55, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, #f7efe6 0%, #eef5f0 46%, #f8fbff 100%);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--paper);
      box-shadow: 0 0 0 1px rgba(31, 41, 55, 0.06);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 18px 18px 12px;
      background: linear-gradient(180deg, #fffaf1 0%, #fffdf8 100%);
      border-bottom: 1px solid rgba(216, 222, 232, 0.8);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .coin-pill {
      min-width: 92px;
      padding: 9px 11px;
      border-radius: 999px;
      background: #fff1c8;
      color: #7a4a00;
      font-weight: 800;
      text-align: center;
      border: 1px solid #f0cc77;
    }

    main {
      overflow: auto;
      padding: 16px 16px 88px;
    }

    .view {
      display: none;
      animation: rise 180ms ease-out;
    }

    .view.active { display: block; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.05);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      margin-bottom: 3px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 14px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 17px;
      letter-spacing: 0;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 90px;
      gap: 8px;
      margin-bottom: 10px;
    }

    .schedule-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .schedule-form input[type="text"] {
      grid-column: 1 / -1;
    }

    .schedule-form .primary {
      grid-column: 1 / -1;
    }

    .edit-note {
      display: none;
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .edit-note.active {
      display: block;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(77, 124, 199, 0.14);
    }

    .primary {
      border-radius: 8px;
      background: var(--rose);
      color: #fff;
      font-weight: 800;
      padding: 11px 12px;
      min-height: 44px;
    }

    .primary:active, .secondary:active, .icon-button:active {
      transform: translateY(1px);
    }

    .secondary {
      border-radius: 8px;
      background: #eef7f3;
      color: #17644f;
      font-weight: 800;
      padding: 11px 12px;
      min-height: 44px;
      border: 1px solid #b7ded1;
    }

    .task-list {
      display: grid;
      gap: 9px;
    }

    .plan-list {
      position: relative;
      min-height: 810px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .day-timeline {
      position: relative;
      min-height: 810px;
      display: grid;
      grid-template-columns: 58px 1fr;
    }

    .timeline-hour {
      display: contents;
    }

    .timeline-label {
      min-height: 45px;
      padding: 6px 8px 0 0;
      color: #98a2b3;
      text-align: right;
      font-size: 12px;
      font-weight: 800;
      border-right: 1px solid #eef1f5;
    }

    .timeline-line {
      min-height: 45px;
      border-bottom: 1px solid #eef1f5;
    }

    .timeline-events {
      position: absolute;
      left: 58px;
      right: 7px;
      top: 0;
      bottom: 0;
    }

    .plan-item {
      position: absolute;
      left: 8px;
      right: 0;
      top: var(--top);
      height: var(--height);
      min-height: 32px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
      padding: 7px 8px 7px 11px;
      border: 1px solid color-mix(in srgb, var(--plan-color) 38%, #ffffff);
      border-left: 6px solid var(--plan-color);
      border-radius: 8px;
      background: color-mix(in srgb, var(--plan-color) 18%, #ffffff);
      box-shadow: 0 7px 16px rgba(31,41,55,.08);
      overflow: hidden;
    }

    .plan-item.done {
      opacity: .76;
      background: #f6fbf8;
      border-color: #b7ded1;
      border-left-color: var(--mint);
    }

    .plan-title {
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .plan-meta {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .plan-actions {
      display: flex;
      gap: 5px;
    }

    .plan-actions .icon-button {
      width: 28px;
      height: 28px;
      font-size: 12px;
      background: rgba(255,255,255,.78);
    }

    .compare-strip {
      display: grid;
      gap: 7px;
      margin: 10px 0 12px;
    }

    .compare-row {
      display: grid;
      grid-template-columns: 58px 1fr 46px;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .meter {
      height: 8px;
      overflow: hidden;
      border-radius: 99px;
      background: #edf1f5;
    }

    .meter-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--mint), #f0c55d);
    }

    .task {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .task.editing {
      grid-template-columns: 1fr;
      align-items: stretch;
    }

    .task.done {
      opacity: 0.65;
    }

    .task.done .task-name {
      text-decoration: line-through;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      border: 1px solid var(--line);
      color: var(--ink);
      font-weight: 900;
    }

    .task-name {
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .task-reward {
      color: var(--gold);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .task-actions .icon-button {
      width: 34px;
      height: 34px;
      font-size: 13px;
    }

    .task-edit-grid {
      display: grid;
      grid-template-columns: 1fr 88px;
      gap: 8px;
    }

    .task-edit-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .timer-face {
      aspect-ratio: 1;
      width: min(72vw, 275px);
      margin: 8px auto 16px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #fffdf8 0 55%, transparent 56%),
        conic-gradient(var(--mint) var(--progress), #e6ece8 0);
      display: grid;
      place-items: center;
      border: 1px solid #c8ded5;
      box-shadow: inset 0 0 0 14px #ffffff, var(--shadow);
    }

    .timer-time {
      font-size: 43px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .timer-actions, .timer-config {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
      padding: 4px;
      border-radius: 8px;
      background: #f1f5f9;
      border: 1px solid var(--line);
    }

    .mode-button {
      min-height: 38px;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-weight: 850;
    }

    .mode-button.active {
      background: #fff;
      color: var(--rose-dark);
      box-shadow: 0 4px 12px rgba(31, 41, 55, .08);
    }

    .travel-map {
      display: grid;
      gap: 12px;
      margin-bottom: 14px;
    }

    .map-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .map-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .map-header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .map-chip {
      flex: 0 0 auto;
      border-radius: 8px;
      background: #1f2937;
      color: #fff;
      padding: 7px 9px;
      font-size: 12px;
      font-weight: 850;
    }

    .map-trail {
      position: absolute;
      left: 10px;
      top: 10px;
      z-index: 4;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .map-trail span {
      border: 1px solid rgba(31,41,55,.1);
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      padding: 5px 8px;
      color: #435064;
      font-size: 11px;
      font-weight: 850;
    }

    .map-trail span.active {
      color: #7a3342;
      border-color: rgba(227,107,127,.42);
      background: #fff1f4;
    }

    .map-trail.in-region {
      left: 82px;
    }

    .world-map {
      position: relative;
      min-height: 254px;
      overflow: hidden;
      border: 1px solid #b7ccdd;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.26)),
        url("assets/visual/generated/world-map-handdrawn.png") center / cover no-repeat,
        radial-gradient(circle at 16% 16%, rgba(255,255,255,.72), transparent 20%),
        linear-gradient(180deg, #bfe3f3 0%, #e9f6f9 100%);
      box-shadow: var(--shadow);
    }

    .world-map.map-china {
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.24)),
        url("assets/visual/generated/map-china-shanghai-handdrawn.png") center / cover no-repeat,
        radial-gradient(circle at 18% 16%, rgba(255,255,255,.72), transparent 20%),
        linear-gradient(180deg, #c9e7f5 0%, #edf9f2 100%);
    }

    .world-map.map-germany {
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.24)),
        url("assets/visual/generated/map-germany-tuebingen-handdrawn.png") center / cover no-repeat,
        radial-gradient(circle at 18% 16%, rgba(255,255,255,.72), transparent 20%),
        linear-gradient(180deg, #c9e7f5 0%, #faf0df 100%);
    }

    .world-map.map-shanghai-city {
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.18)),
        url("assets/visual/generated/map-shanghai-city-handdrawn.png") center / cover no-repeat,
        linear-gradient(180deg, #cfe8f4 0%, #fff7e8 100%);
    }

    .world-map.map-tuebingen-city {
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.18)),
        url("assets/visual/generated/map-tuebingen-city-handdrawn.png") center / cover no-repeat,
        linear-gradient(180deg, #d9edf0 0%, #fff7e8 100%);
    }

    .world-map.map-zooming {
      animation: mapZoom 260ms ease both;
    }

    @keyframes mapZoom {
      from { opacity: .72; transform: scale(.985); }
      to { opacity: 1; transform: scale(1); }
    }

    .world-map::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(77, 124, 199, .13);
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 24%, rgba(77,124,199,.08) 25%, transparent 26%, transparent 49%, rgba(77,124,199,.08) 50%, transparent 51%, transparent 74%, rgba(77,124,199,.08) 75%, transparent 76%),
        linear-gradient(0deg, transparent 32%, rgba(77,124,199,.08) 33%, transparent 34%, transparent 65%, rgba(77,124,199,.08) 66%, transparent 67%);
      pointer-events: none;
    }

    .map-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .continent {
      fill: rgba(82, 137, 108, .72);
      stroke: rgba(47, 89, 72, .34);
      stroke-width: 2;
      filter: drop-shadow(0 8px 12px rgba(47, 89, 72, .13));
    }

    .continent.alt {
      fill: rgba(225, 185, 86, .66);
    }

    .route-line {
      fill: none;
      stroke: rgba(77,124,199,.44);
      stroke-width: 3;
      stroke-dasharray: 8 8;
      stroke-linecap: round;
    }

    .map-pin {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 3;
      min-width: 64px;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 8px;
      background: rgba(255,255,255,.88);
      color: var(--ink);
      padding: 7px 8px;
      box-shadow: 0 10px 22px rgba(31,41,55,.14);
      font-size: 12px;
      font-weight: 850;
      transition: 160ms ease;
    }

    .map-pin:hover,
    .map-region:hover {
      transform: translate(-50%, -53%);
    }

    .map-pin::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -7px;
      width: 10px;
      height: 10px;
      background: inherit;
      border-right: 1px solid rgba(255,255,255,.9);
      border-bottom: 1px solid rgba(255,255,255,.9);
      transform: translateX(-50%) rotate(45deg);
    }

    .map-pin.owned {
      border-color: rgba(61, 169, 137, .55);
      background: #f1fff9;
    }

    .map-pin.locked {
      color: #6b7280;
      background: rgba(255,255,255,.72);
      border-color: rgba(148,163,184,.5);
      filter: grayscale(.32);
    }

    .map-pin.locked::after {
      content: "LOCK";
      display: block;
      margin-top: 2px;
      color: #98a2b3;
      font-size: 8px;
      font-weight: 950;
    }

    .map-pin.active {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(77,124,199,.18), 0 10px 22px rgba(31,41,55,.14);
    }

    .map-region {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 3;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,.86);
      border-radius: 8px;
      background: rgba(255,255,255,.86);
      color: var(--ink);
      padding: 12px 14px;
      box-shadow: 0 10px 22px rgba(31,41,55,.14);
      font-weight: 900;
      transition: 160ms ease;
    }

    .map-region small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
    }

    .map-back {
      position: absolute;
      left: 10px;
      top: 10px;
      z-index: 4;
      border-radius: 8px;
      background: rgba(255,255,255,.88);
      color: var(--blue);
      border: 1px solid rgba(77,124,199,.28);
      padding: 7px 9px;
      font-size: 12px;
      font-weight: 850;
    }

    .map-caption {
      position: absolute;
      right: 10px;
      bottom: 10px;
      z-index: 4;
      border-radius: 8px;
      background: rgba(31,41,55,.8);
      color: #fff;
      padding: 7px 9px;
      font-size: 12px;
      font-weight: 800;
    }

    .selected-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 0 20px, rgba(31,41,55,.04) 20px 21px, transparent 21px),
        linear-gradient(135deg, rgba(255,255,255,.78), rgba(255,255,255,.32)),
        var(--card-color, #eff7f4);
      padding: 12px;
      display: grid;
      gap: 10px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.5);
    }

    .selected-card::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(31,41,55,.12);
      border-radius: 6px;
      pointer-events: none;
    }

    .selected-card::after {
      content: attr(data-card-type);
      position: absolute;
      right: 14px;
      top: 14px;
      color: rgba(31,41,55,.2);
      font-size: 10px;
      font-weight: 950;
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
    }

    .selected-card.locked {
      filter: saturate(.82);
    }

    .selected-card.owned {
      border-color: rgba(61,169,137,.46);
    }

    .selected-card.ticket {
      background:
        radial-gradient(circle at 72% 0, transparent 0 12px, rgba(255,255,255,.72) 13px),
        linear-gradient(90deg, rgba(255,255,255,.86) 0 64%, rgba(31,41,55,.05) 65%),
        var(--card-color, #fff7e8);
    }

    .selected-card.sight {
      background:
        radial-gradient(circle at 82% 18%, rgba(255,255,255,.82) 0 24px, transparent 25px),
        linear-gradient(135deg, rgba(255,255,255,.78), rgba(255,255,255,.36)),
        var(--card-color, #eefbf8);
    }

    .selected-card.wish {
      background:
        linear-gradient(135deg, rgba(255,255,255,.84), rgba(255,255,255,.26)),
        repeating-linear-gradient(-8deg, transparent 0 16px, rgba(227,107,127,.08) 16px 18px),
        var(--card-color, #ffeef4);
    }

    .selected-card-preview {
      min-height: 148px;
      border-radius: 8px;
      border: 1px solid rgba(31,41,55,.1);
      background: var(--card-poster) center / cover no-repeat, var(--card-color, #eff7f4);
      box-shadow: inset 0 -60px 80px rgba(31,41,55,.18);
      position: relative;
    }

    .selected-card.ticket .selected-card-preview {
      min-height: 96px;
      clip-path: polygon(0 0, 100% 0, 100% 38%, 96% 50%, 100% 62%, 100% 100%, 0 100%, 0 62%, 4% 50%, 0 38%);
    }

    .selected-card.sight .selected-card-preview {
      min-height: 118px;
      border-radius: 50%;
      width: min(172px, 58vw);
      justify-self: center;
      box-shadow: inset 0 0 0 7px rgba(255,255,255,.62), inset 0 -60px 80px rgba(31,41,55,.18);
    }

    .selected-card.wish .selected-card-preview {
      min-height: 120px;
      background-size: cover;
    }

    .selected-card-preview::after {
      content: attr(data-state);
      position: absolute;
      right: 10px;
      bottom: 10px;
      border: 1px solid rgba(255,255,255,.58);
      border-radius: 999px;
      background: rgba(31,41,55,.72);
      color: #fff;
      padding: 5px 8px;
      font-size: 10px;
      font-weight: 900;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .card-badge {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      border: 1px solid rgba(31,41,55,.12);
      background: rgba(255,255,255,.68);
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 900;
    }

    .card-copy {
      display: grid;
      gap: 5px;
    }

    .card-copy h3 {
      margin: 0;
      font-size: 17px;
    }

    .card-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .card-meta span,
    .stamp {
      border: 1px solid rgba(31,41,55,.1);
      border-radius: 8px;
      background: rgba(255,255,255,.72);
      padding: 5px 7px;
      font-size: 11px;
      font-weight: 850;
      color: #435064;
    }

    .card-progress {
      height: 8px;
      border-radius: 99px;
      background: rgba(31,41,55,.1);
      overflow: hidden;
    }

    .card-progress div {
      width: var(--progress);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #e36b7f, #f0c55d);
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .card-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(31,41,55,.46);
      display: none;
      place-items: center;
      padding: 18px;
    }

    .card-modal.active {
      display: grid;
    }

    .card-modal.active .collect-card {
      animation: cardDraw 240ms ease both;
    }

    @keyframes cardDraw {
      from { opacity: 0; transform: translateY(18px) rotate(-1.5deg) scale(.96); }
      to { opacity: 1; transform: translateY(0) rotate(0) scale(1); }
    }

    .collect-card {
      width: min(360px, 100%);
      aspect-ratio: 3 / 4.15;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      border: 10px solid #c08a3d;
      background:
        radial-gradient(circle at 24% 42%, rgba(255, 205, 53, .75) 0 8%, transparent 9%),
        radial-gradient(circle at 72% 62%, rgba(255, 205, 53, .6) 0 9%, transparent 10%),
        linear-gradient(145deg, #eb4f88 0%, #f78aae 43%, #f5c15e 100%);
      box-shadow: 0 24px 60px rgba(31,41,55,.32);
      color: #111827;
    }

    .collect-card.asset-card {
      border: 8px solid #c08a3d;
      background:
        linear-gradient(180deg, #fffdf8, #fff4e4);
      box-shadow: 0 24px 60px rgba(31,41,55,.32);
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 8px;
      gap: 8px;
    }

    .collect-card.asset-card img {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: block;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid rgba(31,41,55,.12);
    }

    .collect-card.asset-card::before,
    .collect-card.asset-card::after {
      display: none;
    }

    .modal-card-caption {
      border: 1px solid rgba(31,41,55,.14);
      border-radius: 8px;
      background: rgba(255,255,255,.74);
      padding: 9px;
      display: grid;
      gap: 6px;
    }

    .modal-card-caption strong {
      font-size: 15px;
      line-height: 1.15;
    }

    .modal-card-caption span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .modal-card-stamps {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .modal-card-stamps i {
      border: 1px solid rgba(31,41,55,.12);
      border-radius: 999px;
      background: #fff;
      padding: 4px 6px;
      color: #435064;
      font-style: normal;
      font-size: 10px;
      font-weight: 900;
    }

    .collect-card.shanghai {
      background:
        radial-gradient(circle at 82% 12%, rgba(255,255,255,.9) 0 2px, transparent 3px),
        radial-gradient(circle at 18% 24%, rgba(255,255,255,.8) 0 2px, transparent 3px),
        linear-gradient(180deg, #0f3f91 0%, #123678 42%, #10285f 43%, #173c7c 100%);
      color: #f8fbff;
      border-color: #d4a14d;
    }

    .collect-card.tuebingen {
      background:
        radial-gradient(circle at 14% 16%, rgba(255,255,255,.8) 0 9%, transparent 10%),
        linear-gradient(180deg, #c8e8f6 0 34%, #fff5e8 35% 100%);
      color: #243142;
      border-color: #bd8b52;
    }

    .collect-card.pig {
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.72) 0 9%, transparent 10%),
        linear-gradient(145deg, #f6a6bd, #f6d17f);
      color: #3b2230;
    }

    .collect-card::before,
    .collect-card::after {
      content: "";
      position: absolute;
      border: 2px solid rgba(17,24,39,.28);
      transform: rotate(-18deg);
    }

    .collect-card::before {
      width: 170px;
      height: 170px;
      left: -30px;
      top: 96px;
      border-radius: 18px;
    }

    .collect-card::after {
      width: 230px;
      height: 230px;
      right: -80px;
      bottom: 72px;
      border-radius: 50%;
    }

    .card-issue {
      position: absolute;
      right: 18px;
      top: 56px;
      text-align: right;
      font-weight: 900;
      letter-spacing: 3px;
      font-size: 14px;
      z-index: 2;
    }

    .card-title-big {
      position: absolute;
      left: 16px;
      top: 44px;
      z-index: 2;
      font-size: 50px;
      line-height: .82;
      font-weight: 950;
      letter-spacing: 0;
    }

    .card-subtitle {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 2;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 5px;
    }

    .card-art {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .landmark {
      position: absolute;
      left: 50%;
      top: 28%;
      width: 74px;
      height: 218px;
      transform: translateX(-50%);
      background: rgba(116, 36, 66, .48);
      clip-path: polygon(45% 0, 55% 0, 58% 18%, 69% 18%, 63% 24%, 72% 100%, 28% 100%, 37% 24%, 31% 18%, 42% 18%);
    }

    .landmark.shanghai {
      left: 28%;
      top: 18%;
      width: 74px;
      height: 238px;
      background: linear-gradient(180deg, #ffccd5, #e24d82);
      clip-path: polygon(49% 0, 54% 0, 56% 22%, 72% 31%, 61% 39%, 75% 100%, 25% 100%, 39% 39%, 28% 31%, 44% 22%);
      filter: drop-shadow(18px 28px 0 rgba(255, 178, 92, .92));
    }

    .landmark.tuebingen {
      top: 33%;
      width: 232px;
      height: 150px;
      background:
        repeating-linear-gradient(45deg, transparent 0 13px, rgba(255,255,255,.72) 13px 17px),
        #bd4c37;
      clip-path: polygon(3% 82%, 12% 60%, 12% 36%, 24% 24%, 31% 40%, 42% 28%, 53% 42%, 68% 20%, 86% 38%, 94% 84%, 100% 100%, 0 100%);
    }

    .poster-skyline {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 64px;
      height: 128px;
      z-index: 2;
      display: flex;
      align-items: end;
      gap: 5px;
      padding: 0 12px;
    }

    .poster-skyline span {
      flex: 1;
      height: var(--h);
      background:
        repeating-linear-gradient(180deg, rgba(255,255,255,.85) 0 4px, transparent 4px 12px),
        var(--b, #f7a35c);
      border: 2px solid rgba(255,255,255,.34);
      border-bottom: 0;
    }

    .poster-river {
      position: absolute;
      left: -12px;
      right: -12px;
      bottom: 46px;
      height: 72px;
      z-index: 2;
      background:
        repeating-linear-gradient(160deg, rgba(255,255,255,.4) 0 10px, transparent 10px 28px),
        rgba(39, 147, 189, .72);
      transform: rotate(-4deg);
    }

    .card-mascot {
      position: absolute;
      left: 58px;
      bottom: 88px;
      width: 118px;
      height: 156px;
      border-radius: 58px 58px 36px 36px;
      background: #f7a0b8;
      border: 3px solid rgba(70, 25, 45, .24);
      z-index: 3;
    }

    .card-mascot::before {
      content: "";
      position: absolute;
      left: 28px;
      top: 42px;
      width: 62px;
      height: 24px;
      border-radius: 0 0 20px 20px;
      background:
        linear-gradient(90deg, #fff 0 18%, transparent 18% 28%, #fff 28% 46%, transparent 46% 56%, #fff 56% 74%, transparent 74%),
        #4b2133;
    }

    .card-mascot::after {
      content: "";
      position: absolute;
      left: 34px;
      top: 26px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2f1f2b;
      box-shadow: 40px 0 #2f1f2b;
    }

    .card-bottom-text {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 12px;
      z-index: 4;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-top: 2px solid rgba(17,24,39,.36);
      padding-top: 8px;
      font-size: 10px;
      font-weight: 950;
      letter-spacing: 2px;
    }

    .card-close {
      position: absolute;
      right: 16px;
      top: 16px;
      z-index: 5;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,.82);
      color: #111827;
      font-weight: 900;
    }

    .travel-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .travel-stat {
      border: 1px solid rgba(216, 222, 232, .85);
      border-radius: 8px;
      background: rgba(255,255,255,.82);
      padding: 8px;
      text-align: left;
      color: var(--ink);
    }

    button.travel-stat {
      cursor: pointer;
      transition: 160ms ease;
    }

    button.travel-stat:hover {
      border-color: rgba(77,124,199,.44);
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(31,41,55,.1);
    }

    .travel-stat strong {
      display: block;
      font-size: 15px;
    }

    .travel-stat span {
      color: var(--muted);
      font-size: 11px;
    }

    .card-shelf {
      width: min(390px, 100%);
      max-height: min(720px, calc(100vh - 36px));
      overflow: hidden;
      border: 1px solid rgba(111,78,45,.28);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(111,78,45,.11) 0 1px, transparent 1px 50%),
        linear-gradient(180deg, #fffaf0, #f6ead8);
      background-size: 18px 18px, auto;
      box-shadow: 0 24px 60px rgba(31,41,55,.32);
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .shelf-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
    }

    .shelf-head h3 {
      margin: 0;
      font-size: 17px;
    }

    .shelf-head p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .shelf-board {
      overflow: auto;
      padding: 2px 2px 10px;
      display: grid;
      gap: 14px;
    }

    .shelf-row {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding-bottom: 12px;
    }

    .shelf-row::after {
      content: "";
      position: absolute;
      left: -4px;
      right: -4px;
      bottom: 0;
      height: 10px;
      border-radius: 3px;
      background: linear-gradient(180deg, #b9824a, #7c4f2f);
      box-shadow: 0 6px 12px rgba(83,51,28,.18);
    }

    .shelf-card {
      position: relative;
      min-height: 192px;
      border: 1px solid rgba(31,41,55,.16);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.3), rgba(255,255,255,.72)),
        var(--card-color, #eff7f4);
      padding: 7px;
      display: grid;
      grid-template-rows: 112px auto;
      gap: 7px;
      text-align: left;
      box-shadow: 0 10px 18px rgba(31,41,55,.1);
      transform: rotate(var(--tilt, 0deg));
      transition: 160ms ease;
    }

    .shelf-card:hover {
      transform: translateY(-3px) rotate(var(--tilt, 0deg));
      box-shadow: 0 14px 24px rgba(31,41,55,.14);
    }

    .shelf-card.locked {
      filter: grayscale(.55);
      opacity: .72;
      background: #f8fafc;
      border-style: dashed;
    }

    .shelf-card-art {
      border-radius: 7px;
      border: 1px solid rgba(31,41,55,.12);
      background: var(--card-poster) center / cover no-repeat, #fff;
      box-shadow: inset 0 -44px 56px rgba(31,41,55,.16);
    }

    .shelf-card.locked .shelf-card-art {
      background:
        repeating-linear-gradient(135deg, transparent 0 10px, rgba(31,41,55,.05) 10px 12px),
        #eef2f7;
      box-shadow: none;
    }

    .shelf-card-copy {
      display: grid;
      gap: 4px;
      align-content: start;
    }

    .shelf-card-copy strong {
      font-size: 12px;
      line-height: 1.18;
    }

    .shelf-card-copy span {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.3;
    }

    .shelf-status {
      position: absolute;
      right: 8px;
      top: 8px;
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 999px;
      background: rgba(31,41,55,.72);
      color: #fff;
      padding: 4px 6px;
      font-size: 9px;
      font-weight: 950;
    }

    .pig-area {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 10px;
      align-items: stretch;
    }

    .pet-stage {
      display: grid;
      gap: 12px;
    }

    .pet-room {
      min-height: 150px;
      position: relative;
      overflow: hidden;
      border: 1px solid #e4b9c4;
      border-radius: 8px;
      background:
        linear-gradient(180deg, #fff8f5 0 60%, #e8c7a8 61%),
        repeating-linear-gradient(90deg, rgba(150,94,65,.12) 0 12px, transparent 12px 24px);
      box-shadow: var(--shadow);
    }

    .pet-travel-card {
      border: 1px solid #e6c8aa;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.78), rgba(255,255,255,.28)),
        #fff7ed;
      padding: 12px;
      display: grid;
      gap: 8px;
      box-shadow: var(--shadow);
    }

    .pet-travel-card strong {
      font-size: 14px;
    }

    .pet-travel-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .pet-route {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
      color: #7a3342;
      font-size: 11px;
      font-weight: 900;
    }

    .pet-route-dot {
      height: 2px;
      background: repeating-linear-gradient(90deg, #d08b47 0 6px, transparent 6px 11px);
    }

    .pet-room .pig-face {
      left: 50%;
      bottom: 38px;
      width: 82px;
      height: 66px;
      transform: translateX(-50%);
    }

    .pet-room .pig-face::before,
    .pet-room .pig-face::after {
      width: 24px;
      height: 24px;
      top: -10px;
    }

    .pet-toy {
      position: absolute;
      right: 46px;
      bottom: 28px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 28%, #fff, #f0c55d 42%, #e36b7f 43%);
      border: 2px solid rgba(31,41,55,.12);
    }

    .pet-status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .pet-meter {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 7px;
      font-size: 12px;
      font-weight: 850;
    }

    .meter-track {
      height: 8px;
      border-radius: 99px;
      background: #eef1f5;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: var(--value);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--rose), var(--gold));
    }

    .pet-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .pet-note {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .pig-pen {
      position: relative;
      min-height: 108px;
      border: 1px solid #e4b9c4;
      border-radius: 8px;
      background:
        repeating-linear-gradient(90deg, rgba(150, 94, 65, .2) 0 8px, transparent 8px 20px),
        linear-gradient(180deg, #fff7f5, #f7e7dc);
      overflow: hidden;
    }

    .pig-pen::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 26px;
      height: 8px;
      background: rgba(150, 94, 65, .34);
    }

    .pig-label {
      position: absolute;
      left: 8px;
      top: 8px;
      color: #7a3342;
      font-size: 12px;
      font-weight: 800;
    }

    .pig-face {
      position: absolute;
      left: 36px;
      bottom: 26px;
      width: 38px;
      height: 32px;
      border-radius: 45% 45% 48% 48%;
      background:
        radial-gradient(circle at 35% 40%, #4b3138 0 2px, transparent 3px),
        radial-gradient(circle at 65% 40%, #4b3138 0 2px, transparent 3px),
        radial-gradient(ellipse at 50% 65%, #e8869b 0 22%, transparent 23%),
        #f5a9b9;
      border: 2px solid rgba(185, 77, 97, .24);
    }

    .pig-face::before,
    .pig-face::after {
      content: "";
      position: absolute;
      top: -5px;
      width: 12px;
      height: 12px;
      border-radius: 3px 8px 4px 8px;
      background: #f5a9b9;
      border: 2px solid rgba(185, 77, 97, .2);
    }

    .pig-face::before {
      left: 2px;
      transform: rotate(-28deg);
    }

    .pig-face::after {
      right: 2px;
      transform: rotate(28deg);
    }

    .passport {
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(31,41,55,.08) 0 1px, transparent 1px 50%),
        linear-gradient(180deg, #fffdf8, #fff);
      background-size: 14px 14px;
      padding: 12px;
      display: grid;
      gap: 8px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.72);
    }

    .passport strong {
      font-size: 13px;
    }

    .stamp-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .stamp-tab {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.86);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .stamp-tab.active {
      color: #7a3342;
      border-color: rgba(227,107,127,.42);
      background: #fff1f4;
    }

    .stamp-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .stamp-album {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stamp-card {
      min-height: 104px;
      border: 2px solid var(--stamp-color, #1f2937);
      border-radius: 3px;
      background:
        linear-gradient(90deg, transparent 63%, rgba(31,41,55,.09) 64%),
        radial-gradient(circle at 14% 16%, rgba(255,255,255,.86), transparent 18%),
        #fffdf8;
      color: var(--stamp-color, #1f2937);
      padding: 7px;
      display: grid;
      grid-template-columns: 1.45fr .9fr;
      gap: 6px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.72);
      cursor: pointer;
      transition: 160ms ease;
      position: relative;
    }

    .stamp-card::after {
      content: attr(data-status);
      position: absolute;
      right: 7px;
      bottom: 7px;
      opacity: .72;
      font-size: 8px;
      font-weight: 950;
    }

    .stamp-card:hover {
      transform: translateY(-2px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.72), 0 8px 18px rgba(31,41,55,.12);
    }

    .stamp-visual {
      border: 1px solid currentColor;
      display: grid;
      place-items: center;
      min-width: 0;
      background:
        radial-gradient(circle at 28% 24%, currentColor 0 3px, transparent 4px),
        linear-gradient(135deg, transparent 48%, currentColor 49% 51%, transparent 52%);
      font-size: 20px;
      font-weight: 950;
      letter-spacing: 0;
    }

    .stamp-info {
      display: grid;
      align-content: space-between;
      min-width: 0;
      font-size: 9px;
      font-weight: 950;
      line-height: 1.05;
      text-transform: uppercase;
    }

    .stamp-info strong {
      font-size: 10px;
      line-height: 1.05;
    }

    .stamp-date {
      border: 1px solid currentColor;
      min-height: 17px;
      display: grid;
      place-items: center;
      font-size: 8px;
    }

    .stamp-card.empty-stamp {
      --stamp-color: #98a2b3;
      border-style: dashed;
      opacity: .75;
    }

    .stamp-card.locked-stamp {
      --stamp-color: #a8b0bd;
      border-style: dashed;
      color: #8b95a5;
      background:
        linear-gradient(90deg, transparent 63%, rgba(31,41,55,.05) 64%),
        #f8fafc;
      filter: grayscale(.5);
    }

    .stamp-card.stamp-pressed {
      animation: stampPress 360ms ease;
    }

    @keyframes stampPress {
      0% { transform: scale(1.04) rotate(-1deg); }
      42% { transform: scale(.96) rotate(.5deg); box-shadow: inset 0 0 0 5px rgba(255,255,255,.8); }
      100% { transform: scale(1); }
    }

    .shop-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      margin-bottom: 12px;
    }

    .shop-tab {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .shop-tab.active {
      color: #7a3342;
      border-color: #efb5c0;
      background: #fff0f3;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .shop-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 10px;
      align-items: center;
    }

    .shop-item.selected {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(77, 124, 199, .12);
    }

    .shop-item.locked {
      background: #f8fafc;
      filter: saturate(.82);
    }

    .shop-copy {
      display: grid;
      gap: 6px;
    }

    .shop-item strong {
      font-size: 15px;
    }

    .shop-item span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .shop-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .shop-actions button:nth-child(3) {
      grid-column: 1 / -1;
    }

    .mini-preview {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      border: 1px solid #d9e1ec;
      background: var(--item-color, #eff7f4);
      display: grid;
      place-items: center;
      font-size: 24px;
      box-shadow: inset 0 -10px 0 rgba(31,41,55,.05);
    }

    .history {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #eef1f5;
    }

    .weekly-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .bar-chart {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      align-items: end;
      gap: 7px;
      height: 142px;
      padding-top: 12px;
    }

    .bar {
      display: grid;
      align-items: end;
      gap: 6px;
      height: 100%;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
    }

    .bar-fill {
      min-height: 6px;
      border-radius: 7px 7px 3px 3px;
      background: linear-gradient(180deg, #e36b7f, #f0c55d);
      box-shadow: 0 8px 14px rgba(227, 107, 127, .18);
    }

    nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(430px, 100%);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      background: rgba(255, 253, 248, 0.96);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .tab {
      min-height: 66px;
      display: grid;
      place-items: center;
      gap: 2px;
      color: var(--muted);
      background: transparent;
      font-size: 11px;
      font-weight: 750;
    }

    .tab svg {
      width: 21px;
      height: 21px;
      stroke-width: 2.4;
    }

    .tab.active {
      color: var(--rose-dark);
    }

    .empty {
      border: 1px dashed #cfd7e3;
      border-radius: 8px;
      padding: 16px;
      color: var(--muted);
      text-align: center;
      background: #fbfcff;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 78px;
      transform: translateX(-50%) translateY(16px);
      width: min(390px, calc(100% - 32px));
      background: #1f2937;
      color: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: 180ms ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 360px) {
      h1 { font-size: 21px; }
      .timer-time { font-size: 36px; }
      .shop-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

      { id: "shanghai-card", category: "city", name: "上海城市卡", price: 699, desc: "从世界地图点击中国后出现上海，收藏一张真正想去的城市卡。", icon: "SHA", color: "#eef2ff", region: "中国", mapScope: "china", zoomTo: "shanghai-city", stamp: "SHA", x: 73, y: 55, rarity: "rare", border: "blue", art: "shanghai", cardAsset: "assets/visual/generated/card-shanghai-handdrawn.png", cardLine: "外滩夜景、武康路、咖啡和展览。" },
      { id: "stuttgart-card", category: "city", name: "斯图加特城市卡", price: 249, desc: "从图宾根出发的周末大城徽章。", icon: "STR", color: "#f1fff9", region: "德国", mapScope: "germany", stamp: "STR", x: 60, y: 48, rarity: "common", requires: "tuebingen-card", border: "green", art: "tuebingen", cardAsset: "assets/visual/generated/card-tuebingen-handdrawn.png", cardLine: "短途火车、博物馆和周末市区。" },

      { id: "pig-passport", category: "wish", name: "小猪旅行护照", price: 99, desc: "让同行小猪拥有自己的盖章页。", icon: "PIG", color: "#ffeef4", region: "随身", mapScope: "world", stamp: "PIG", x: 58, y: 68, rarity: "wish", border: "rose", art: "pig", cardAsset: "assets/visual/card-pig-passport.svg", cardLine: "保留这个设定：每次兑换都会更像一段旅程。" },
      { id: "coffee-wish", category: "wish", name: "河边咖啡愿望", price: 79, desc: "愿望商店里的小额犒赏，适合普通但完整的一天。", icon: "CAF", color: "#f7efe6", region: "任意城市", mapScope: "world", stamp: "CAFE", x: 52, y: 62, rarity: "wish", border: "rose", art: "pig", cardAsset: "assets/visual/card-pig-passport.svg", cardLine: "不必很贵，但要真的让人期待。" },
      { id: "museum-day", category: "wish", name: "博物馆半日愿望", price: 329, desc: "给未来半天留白，兑换一个真正出门的理由。", icon: "DAY", color: "#f0f7ff", region: "任意城市", mapScope: "world", stamp: "MUSE", x: 44, y: 55, rarity: "wish", border: "rose", art: "pig", cardAsset: "assets/visual/card-pig-passport.svg", cardLine: "把时间留给慢慢看的东西。" }
    ];

    let activeCategory = "city";
    let activeStampCategory = "city";
    let selectedRewardId = "tuebingen-card";
    let mapMode = "world";
    let timerMode = "countdown";
    let editingPlanId = null;
    let editingTaskId = null;

    let state = loadState();
    let timer = {
      total: Math.max(1, Number(document.querySelector("#timerMinutes").value) || 25) * 60,
      left: Math.max(1, Number(document.querySelector("#timerMinutes").value) || 25) * 60,
      elapsed: 0,
      startedAt: null,
      interval: null
    };

    function makeId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function loadState() {
      const saved = localStorage.getItem("TimeNestState") || localStorage.getItem("timeNestState");
      if (!saved) return structuredClone(defaultState);
      const parsed = JSON.parse(saved);
      parsed.ownedRewards ??= Array.isArray(parsed.ownedRewards) ? parsed.ownedRewards : [];
      if (!parsed.ownedRewards.includes("tuebingen-card")) parsed.ownedRewards.unshift("tuebingen-card");
      parsed.pet ??= { food: 70, mood: 72, energy: 68 };
      parsed.pet.food ??= 70;
      parsed.pet.mood ??= 72;
      parsed.pet.energy ??= 68;
      parsed.funds ??= {};
      parsed.wishlist ??= [];
      parsed.records ??= [];
      parsed.plans ??= [];
      parsed.history = (parsed.history || []).map(item => ({ ...item, date: item.date || todayKey }));
      if (parsed.date !== todayKey) {
        parsed.date = todayKey;
        parsed.todayDone = 0;
        parsed.focusMinutes = 0;
        parsed.tasks = parsed.tasks.map(task => ({ ...task, done: false }));
        parsed.plans = [];
      }
      return parsed;
    }

    function saveState() {
      localStorage.setItem("TimeNestState", JSON.stringify(state));
    }

    function addCoins(amount, label, record = {}) {
      state.coins += amount;
      const entry = {
        text: label,
        amount,
        date: todayKey,
        time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
      };
      state.history.unshift(entry);
      state.history = state.history.slice(0, 8);
      state.records.push({ kind: "earn", label, coins: amount, minutes: 0, date: todayKey, ts: Date.now(), ...record });
      state.records = state.records.slice(-500);
      saveState();
      render();
      showToast(`${label}，获得 ${amount} 金币`);
    }

    function spendCoins(amount, label) {
      state.coins -= amount;
      state.history.unshift({
        text: label,
        amount: -amount,
        date: todayKey,
        time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
      });
      state.history = state.history.slice(0, 8);
      state.records.push({ kind: "spend", label, coins: -amount, minutes: 0, date: todayKey, ts: Date.now() });
      state.records = state.records.slice(-500);
      saveState();
      render();
    }

    function minutesBetween(start, end) {
      const [startHour, startMinute] = start.split(":").map(Number);
      const [endHour, endMinute] = end.split(":").map(Number);
      let startTotal = startHour * 60 + startMinute;
      let endTotal = endHour * 60 + endMinute;
      if (endTotal <= startTotal) endTotal += 24 * 60;
      return endTotal - startTotal;
    }

    function timeToMinutes(time) {
      const [hour, minute] = time.split(":").map(Number);
      return hour * 60 + minute;
    }

    function formatMinutes(minutes) {
      if (minutes < 60) return `${minutes}分`;
      const hours = Math.floor(minutes / 60);
      const rest = minutes % 60;
      return rest ? `${hours}小时${rest}分` : `${hours}小时`;
    }

    function renderPlans() {
      const root = document.querySelector("#planList");
      const planned = state.plans.reduce((sum, plan) => sum + plan.minutes, 0);
      const actual = state.plans.filter(plan => plan.done).reduce((sum, plan) => sum + plan.minutes, 0);
      const max = Math.max(planned, actual, 1);
      document.querySelector("#plannedMinutes").textContent = formatMinutes(planned);
      document.querySelector("#actualMinutes").textContent = formatMinutes(actual);
      document.querySelector("#plannedMeter").style.width = `${planned / max * 100}%`;
      document.querySelector("#actualMeter").style.width = `${actual / max * 100}%`;
      root.innerHTML = "";
      if (!state.plans.length) {
        root.innerHTML = `<div class="empty">先安排今天的一段时间，晚上就能对比计划和完成。</div>`;
        return;
      }
      const colors = ["#e36b7f", "#4d7cc7", "#3da989", "#d99825", "#7c3aed", "#e0523f"];
      const timelineStart = 6 * 60;
      const timelineEnd = 24 * 60;
      const timelineMinutes = timelineEnd - timelineStart;
      root.innerHTML = `
        <div class="day-timeline">
          ${Array.from({ length: 18 }, (_, index) => {
            const hour = index + 6;
            return `
            <div class="timeline-hour">
              <div class="timeline-label">${String(hour).padStart(2, "0")}:00</div>
              <div class="timeline-line"></div>
            </div>
          `;
          }).join("")}
          <div class="timeline-events"></div>
        </div>
      `;
      const eventLayer = root.querySelector(".timeline-events");
      [...state.plans].sort((a, b) => a.start.localeCompare(b.start)).forEach((plan, index) => {
        const start = timeToMinutes(plan.start);
        const end = start + plan.minutes;
        const visibleStart = Math.max(start, timelineStart);
        const visibleEnd = Math.min(end, timelineEnd);
        if (visibleEnd <= timelineStart || visibleStart >= timelineEnd) return;
        const top = (visibleStart - timelineStart) / timelineMinutes * 100;
        const visibleMinutes = Math.max(15, visibleEnd - visibleStart);
        const minHeight = 32 / 810 * 100;
        const height = Math.min(100 - top, Math.max(minHeight, visibleMinutes / timelineMinutes * 100));
        const row = document.createElement("div");
        row.className = `plan-item${plan.done ? " done" : ""}`;
        row.style.setProperty("--top", `${top}%`);
        row.style.setProperty("--height", `${height}%`);
        row.style.setProperty("--plan-color", colors[index % colors.length]);
        row.innerHTML = `
          <div>
            <div class="plan-title"></div>
            <div class="plan-meta">${plan.start}-${plan.end} · ${formatMinutes(plan.minutes)} · ${plan.done ? "已完成" : "计划中"}</div>
          </div>
          <div class="plan-actions">
            <button class="icon-button" data-action="done" title="${plan.done ? "已完成" : "标记完成"}">${plan.done ? "✓" : ""}</button>
            <button class="icon-button" data-action="edit" title="编辑">✎</button>
            <button class="icon-button" data-action="delete" title="删除">×</button>
          </div>
        `;
        row.querySelector(".plan-title").textContent = plan.title;
        row.querySelector('[data-action="done"]').addEventListener("click", () => completePlan(plan.id));
        row.querySelector('[data-action="edit"]').addEventListener("click", () => editPlan(plan.id));
        row.querySelector('[data-action="delete"]').addEventListener("click", () => deletePlan(plan.id));
        eventLayer.appendChild(row);
      });
    }

    function lastSevenDays() {
      return Array.from({ length: 7 }, (_, index) => {
        const date = new Date();
        date.setDate(date.getDate() - (6 - index));
        const key = date.toISOString().slice(0, 10);
        return {
          key,
          label: date.toLocaleDateString("zh-CN", { weekday: "short" }),
          minutes: 0,
          coins: 0,
          tasks: 0,
          plans: 0
        };
      });
    }

    function renderWeeklyReport() {
      const days = lastSevenDays();
      const byDay = Object.fromEntries(days.map(day => [day.key, day]));
      state.records.forEach(record => {
        if (!byDay[record.date]) return;
        if (record.kind === "focus") byDay[record.date].minutes += record.minutes || 0;
        if ((record.coins || 0) > 0) byDay[record.date].coins += record.coins;
        if (record.kind === "task") byDay[record.date].tasks += 1;
        if (record.kind === "plan") byDay[record.date].plans += record.minutes || 0;
      });

      const weekMinutes = days.reduce((sum, day) => sum + day.minutes, 0);
      const weekCoins = days.reduce((sum, day) => sum + day.coins, 0);
      const weekTasks = days.reduce((sum, day) => sum + day.tasks, 0);
      const weekPlanMinutes = days.reduce((sum, day) => sum + day.plans, 0);
      const bestDay = [...days].sort((a, b) => b.minutes - a.minutes)[0];
      document.querySelector("#weekMinutes").textContent = weekMinutes;
      document.querySelector("#weekCoins").textContent = weekCoins;

      const maxMinutes = Math.max(1, ...days.map(day => day.minutes));
      const bars = document.querySelector("#weeklyBars");
      bars.innerHTML = "";
      days.forEach(day => {
        const bar = document.createElement("div");
        bar.className = "bar";
        bar.innerHTML = `
          <div class="bar-fill" style="height:${Math.max(6, day.minutes / maxMinutes * 105)}px"></div>
          <span>${day.label}</span>
        `;
        bars.appendChild(bar);
      });

      const summary = document.querySelector("#weeklySummary");
      summary.innerHTML = `
        <div class="history-item"><span>本周完成任务</span><strong>${weekTasks} 个</strong></div>
        <div class="history-item"><span>计划实际完成</span><strong>${formatMinutes(weekPlanMinutes)}</strong></div>
        <div class="history-item"><span>最佳专注日</span><strong>${bestDay.minutes ? `${bestDay.label} ${bestDay.minutes} 分` : "暂无"}</strong></div>
        <div class="history-item"><span>按 1 金币/分钟，本月理论上限约</span><strong>10000</strong></div>
      `;
    }

    function rewardStyle(item) {
      return `--item-color:${item.color || "#eff7f4"}`;
    }

    function ownedRewardsBy(category) {
      return shopItems.filter(item => item.category === category && state.ownedRewards.includes(item.id));
    }

    function selectedReward() {
      return shopItems.find(item => item.id === selectedRewardId) || shopItems[0];
    }

    function categoryLabel(category) {
      return shopCategories.find(item => item.id === category)?.name || "收藏";
    }

    function rarityLabel(item) {
      return {
        base: "Base",
        common: "日常",
        rare: "稀有",
        epic: "长期目标",
        wish: "愿望"
      }[item.rarity] || "收藏";
    }

    function isOwned(item) {
      return state.ownedRewards.includes(item.id);
    }

    function isUnlocked(item) {
      return !item.requires || state.ownedRewards.includes(item.requires);
    }

    function unlockHint(item) {
      const parent = shopItems.find(reward => reward.id === item.requires);
      return parent ? `先解锁「${parent.name}」` : "暂未解锁";
    }

    function fundedAmount(item) {
      return Math.min(item.price, state.funds?.[item.id] || 0);
    }

    function rewardProgress(item) {
      if (isOwned(item)) return 100;
      if (!item.installment) return 0;
      return Math.round(fundedAmount(item) / item.price * 100);
    }

    function rewardPriceLabel(item) {
      if (isOwned(item)) return "已收藏";
      if (!isUnlocked(item)) return "未解锁";
      if (item.installment) {
        const left = Math.max(0, item.price - fundedAmount(item));
        return left ? `存入基金` : "领取票据";
      }
      return item.price ? `${item.price} 金币` : "领取";
    }

    function isMapMode(mode) {
      return ["world", "china", "germany", "shanghai-city", "tuebingen-city"].includes(mode);
    }

    function parentMapMode(mode) {
      if (mode === "shanghai-city") return "china";
      if (mode === "tuebingen-city") return "germany";
      return "world";
    }

    function layerTextFor(mode) {
      if (mode === "china") return ["世界", "中国", "上海入口"];
      if (mode === "germany") return ["世界", "德国", "图宾根入口"];
      if (mode === "shanghai-city") return ["世界", "中国", "上海", "城市探索"];
      if (mode === "tuebingen-city") return ["世界", "德国", "图宾根", "城市探索"];
      return ["世界地图", "选择国家"];
    }

    function captionFor(mode) {
      if (mode === "china") return "中国地图：点击上海进入城市地图";
      if (mode === "germany") return "德国地图：点击图宾根进入城市地图";
      if (mode === "shanghai-city") return "上海地图：外滩 / 机票基金 / 武康路愿望";
      if (mode === "tuebingen-city") return "图宾根地图：内卡河 / 火车票 / 周末出发";
      return "点击国家区域放大";
    }

    function mapArtwork(mode) {
      return "";
    }

      map.appendChild(trail);
      if (mapMode === "world") {

          { id: "china", name: "中国", hint: isOwned(shopItems.find(item => item.id === "shanghai-card")) ? "上海已收集" : "点击进入上海", x: 73, y: 48 },
          { id: "germany", name: "德国", hint: "Base 图宾根", x: 49, y: 39 },

        ].forEach(region => {
          const button = document.createElement("button");
          button.className = "map-region";
          button.style.setProperty("--x", `${region.x}%`);

      shopItems.filter(item => item.mapScope === mapMode && item.x && item.y).forEach(item => {
        const locked = !isUnlocked(item);
        const pin = document.createElement("button");
        pin.className = [
          "map-pin",
          isOwned(item) ? "owned" : "",
          locked ? "locked" : "",
          selectedRewardId === item.id ? "active" : ""
        ].filter(Boolean).join(" ");
        pin.style.setProperty("--x", `${item.x}%`);
        pin.style.setProperty("--y", `${item.y}%`);
        pin.dataset.rewardId = item.id;
        pin.textContent = item.name.replace("城市卡", "").replace("徽章", "").replace("基金", "").replace("体验", "");
        pin.title = locked ? unlockHint(item) : item.name;
        pin.addEventListener("click", () => {
          selectReward(item.id, { stayOnMap: Boolean(item.zoomTo) });
          if (item.zoomTo) zoomMap(item.zoomTo);
        });
        map.appendChild(pin);
      });

      caption.className = "map-caption";
      caption.textContent = captionFor(mapMode);
      map.appendChild(caption);

    function renderPassport() {
      const latest = [...state.ownedRewards].reverse()
        .map(id => shopItems.find(item => item.id === id))
        .find(Boolean);
      const hasShanghai = state.ownedRewards.includes("shanghai-card");

    function zoomMap(mode) {
      const map = document.querySelector("#worldMap");
      map.classList.remove("map-zooming");
      void map.offsetWidth;
      map.classList.add("map-zooming");
      if (mode === "wish") {
        mapMode = "world";
        selectReward("pig-passport");
      } else if (mode === "china") {
        mapMode = "china";
        selectReward("shanghai-card");
      } else if (mode === "germany") {
        mapMode = "germany";
        selectReward("tuebingen-card");
      } else if (mode === "shanghai-city") {
        mapMode = "shanghai-city";
        renderTravelMap();
        renderShop();
      } else if (mode === "tuebingen-city") {
        mapMode = "tuebingen-city";
        renderTravelMap();
        renderShop();
      } else {
        mapMode = "world";
        renderTravelMap();
        renderShop();
      }
    }

      const item = shopItems.find(reward => reward.id === id);
      selectedRewardId = id;
      if (item) {
        activeCategory = item.category;
        if (isMapMode(item.mapScope) && !options.stayOnMap) mapMode = item.mapScope;
        if (item.mapScope === "world") mapMode = "world";
      }
      renderTravelMap();
      renderShop();
    }
