<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e36b7f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TimeNest">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/app-icon-pig-192.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/app-icon-pig-192.png">
  <title>TimeNest</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2937;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #fffdf8;
      --panel: #ffffff;
      --rose: #e36b7f;
      --rose-dark: #b94d61;
      --mint: #3da989;
      --gold: #d99825;
      --blue: #4d7cc7;
      --floor: #d7a876;
      --wall: #f1d9c8;
      --shadow: 0 12px 30px rgba(31, 41, 55, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, #f7efe6 0%, #eef5f0 46%, #f8fbff 100%);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--paper);
      box-shadow: 0 0 0 1px rgba(31, 41, 55, 0.06);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 18px 18px 12px;
      background: linear-gradient(180deg, #fffaf1 0%, #fffdf8 100%);
      border-bottom: 1px solid rgba(216, 222, 232, 0.8);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .coin-pill {
      min-width: 92px;
      padding: 9px 11px;
      border-radius: 999px;
      background: #fff1c8;
      color: #7a4a00;
      font-weight: 800;
      text-align: center;
      border: 1px solid #f0cc77;
    }

    main {
      overflow: auto;
      padding: 16px 16px 88px;
    }

    .view {
      display: none;
      animation: rise 180ms ease-out;
    }

    .view.active { display: block; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.05);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      margin-bottom: 3px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 14px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 17px;
      letter-spacing: 0;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 90px;
      gap: 8px;
      margin-bottom: 10px;
    }

    .schedule-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .schedule-form input[type="text"] {
      grid-column: 1 / -1;
    }

    .category-select {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fafc;
    }

    .category-option {
      position: relative;
      min-height: 36px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .category-option[data-category="daily"] {
      --category-bg: #ecfdf5;
      --category-border: #bbf7d0;
      --category-text: #047857;
    }

    .category-option[data-category="study"] {
      --category-bg: #fdf2f8;
      --category-border: #fbcfe8;
      --category-text: #be185d;
    }

    .category-option[data-category="work"] {
      --category-bg: #fefce8;
      --category-border: #fde68a;
      --category-text: #854d0e;
    }

    .category-option[data-category="leisure"] {
      --category-bg: #eff6ff;
      --category-border: #bfdbfe;
      --category-text: #1d4ed8;
    }

    .category-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .category-option:has(input:checked) {
      color: var(--category-text, #0f5f52);
      background: var(--category-bg, #e9f7f1);
      box-shadow: inset 0 0 0 1px var(--category-border, rgba(71, 178, 151, .32));
    }

    .log-category {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 1px 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.55);
      color: #0f5f52;
      font-weight: 900;
    }

    .edit-note {
      display: none;
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .edit-note.active {
      display: block;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(77, 124, 199, 0.14);
    }

    .primary {
      border-radius: 8px;
      background: var(--rose);
      color: #fff;
      font-weight: 800;
      padding: 11px 12px;
      min-height: 44px;
    }

    .primary:active, .secondary:active, .icon-button:active {
      transform: translateY(1px);
    }

    .secondary {
      border-radius: 8px;
      background: #eef7f3;
      color: #17644f;
      font-weight: 800;
      padding: 11px 12px;
      min-height: 44px;
      border: 1px solid #b7ded1;
    }

    .task-list {
      display: grid;
      gap: 9px;
    }

    .home-task-create {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eef1f5;
    }

    .home-task-create h3 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0;
    }

    .home-task-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 82px;
      gap: 8px;
    }

    .home-task-form select {
      grid-column: 1 / -1;
    }

    .plan-list {
      position: relative;
      min-height: 810px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .day-timeline {
      position: relative;
      min-height: 810px;
      display: grid;
      grid-template-columns: 58px 1fr 1fr;
    }

    .timeline-hour {
      display: contents;
    }

    .timeline-label {
      min-height: 45px;
      padding: 6px 8px 0 0;
      color: #98a2b3;
      text-align: right;
      font-size: 12px;
      font-weight: 800;
      border-right: 1px solid #eef1f5;
    }

    .timeline-line {
      grid-column: 2 / 4;
      min-height: 45px;
      border-bottom: 1px solid #eef1f5;
    }

    .timeline-events {
      position: absolute;
      top: 0;
      bottom: 0;
    }

    .timeline-events.plan-events {
      left: 58px;
      right: calc(50% + 4px);
    }

    .timeline-events.record-events {
      left: calc(50% + 4px);
      right: 7px;
    }

    .timeline-column-labels {
      position: absolute;
      left: 58px;
      right: 7px;
      top: 0;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      pointer-events: none;
    }

    .timeline-column-labels span {
      display: inline-flex;
      width: fit-content;
      border: 1px solid rgba(31,41,55,.08);
      border-radius: 999px;
      background: rgba(255,255,255,.82);
      padding: 4px 8px;
      color: #64748b;
      font-size: 10px;
      font-weight: 900;
      box-shadow: 0 5px 14px rgba(31,41,55,.07);
    }

    .now-line {
      position: absolute;
      left: 58px;
      right: 7px;
      top: var(--top);
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      color: #d92d20;
      font-size: 10px;
      font-weight: 900;
    }

    .now-line::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #d92d20;
      box-shadow: 0 0 0 3px rgba(217,45,32,.12);
    }

    .now-line::after {
      content: "";
      height: 2px;
      flex: 1;
      border-radius: 99px;
      background: #d92d20;
      box-shadow: 0 1px 0 rgba(255,255,255,.8);
    }

    .timeline-empty {
      position: absolute;
      left: 74px;
      right: 16px;
      top: 14px;
      z-index: 2;
      border: 1px dashed #d8dee8;
      border-radius: 8px;
      background: rgba(255,255,255,.82);
      color: var(--muted);
      padding: 10px;
      font-size: 12px;
      line-height: 1.4;
    }

    .plan-item {
      position: absolute;
      left: calc(8px + var(--lane-left, 0%));
      width: calc(var(--lane-width, 100%) - 8px);
      top: var(--top);
      height: var(--height);
      min-height: 32px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
      align-items: start;
      padding: 6px 7px 6px 9px;
      border: 1px solid var(--item-border, rgba(227,107,127,.28));
      border-left: 6px solid var(--item-accent, var(--rose));
      border-radius: 8px;
      background: var(--item-bg, #fde8ee);
      box-shadow: 0 7px 16px rgba(31,41,55,.08);
      overflow: hidden;
      cursor: pointer;
    }

    .plan-item.done {
      opacity: .92;
    }

    .record-item {
      border-color: var(--item-border, rgba(61,169,137,.32));
      border-left-color: var(--item-accent, #3da989);
      background: var(--item-bg, #eefaf5);
    }

    .plan-title {
      font-size: 10px;
      font-weight: 850;
      line-height: 1.18;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .plan-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1px 5px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.2;
      margin-top: 1px;
      white-space: normal;
      overflow: hidden;
      text-overflow: clip;
    }

    .plan-task-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--item-text, #17644f);
      font-weight: 900;
    }

    .log-category {
      color: var(--item-text, #17644f);
      font-weight: 900;
    }

    .timeline-menu {
      position: absolute;
      left: min(var(--menu-x), calc(100% - 142px));
      top: var(--menu-y);
      z-index: 8;
      display: grid;
      grid-template-columns: 1fr;
      min-width: 126px;
      overflow: hidden;
      border: 1px solid rgba(216,222,232,.92);
      border-radius: 8px;
      background: rgba(255,253,248,.96);
      box-shadow: 0 14px 30px rgba(31,41,55,.16);
    }

    .timeline-menu button {
      min-height: 34px;
      padding: 8px 12px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      font-size: 12px;
      font-weight: 850;
      border-bottom: 1px solid #eef1f5;
    }

    .timeline-menu button:last-child {
      border-bottom: 0;
    }

    .timeline-menu button.danger {
      color: #b42318;
    }

    .compare-strip {
      display: grid;
      gap: 7px;
      margin: 10px 0 12px;
    }

    .compare-row {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr) minmax(72px, max-content);
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .compare-row strong {
      text-align: right;
      white-space: nowrap;
    }

    .meter {
      height: 8px;
      overflow: hidden;
      border-radius: 99px;
      background: #edf1f5;
    }

    .meter-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--mint), #f0c55d);
    }

    .task {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 9px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }

    .task.editing {
      grid-template-columns: 1fr;
      align-items: stretch;
    }

    .task.done {
      opacity: 0.65;
    }

    .task.done .task-name {
      text-decoration: line-through;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      border: 1px solid var(--line);
      color: var(--ink);
      font-weight: 900;
    }

    .task-name {
      font-weight: 750;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-reward {
      color: var(--gold);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .task-actions .icon-button {
      width: 34px;
      height: 34px;
      font-size: 13px;
    }

    .task-menu {
      position: absolute;
      left: min(var(--menu-x), calc(100% - 142px));
      top: var(--menu-y);
      z-index: 12;
      display: grid;
      min-width: 126px;
      overflow: hidden;
      border: 1px solid rgba(216,222,232,.92);
      border-radius: 8px;
      background: rgba(255,253,248,.97);
      box-shadow: 0 14px 30px rgba(31,41,55,.16);
    }

    .task-menu button {
      min-height: 34px;
      padding: 8px 12px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      font-size: 12px;
      font-weight: 850;
      border-bottom: 1px solid #eef1f5;
    }

    .task-menu button:last-child {
      border-bottom: 0;
    }

    .task-menu button.danger {
      color: #b42318;
    }

    .task-edit-grid {
      display: grid;
      grid-template-columns: 1fr 88px;
      gap: 8px;
    }

    .task-edit-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .timer-face {
      aspect-ratio: 1;
      width: min(72vw, 275px);
      margin: 8px auto 16px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #fffdf8 0 55%, transparent 56%),
        conic-gradient(var(--mint) var(--progress), #e6ece8 0);
      display: grid;
      place-items: center;
      border: 1px solid #c8ded5;
      box-shadow: inset 0 0 0 14px #ffffff, var(--shadow);
    }

    .timer-face.stopwatch {
      background:
        radial-gradient(circle at center, #fffdf8 0 55%, transparent 56%),
        #e6ece8;
    }

    .timer-time {
      font-size: 43px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .timer-actions, .timer-config {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .timer-actions {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .timer-abandon {
      border-radius: 8px;
      background: #f8fafc;
      color: #64748b;
      font-weight: 800;
      padding: 11px 12px;
      min-height: 44px;
      border: 1px solid #cbd5e1;
    }

    .timer-abandon:active {
      transform: translateY(1px);
    }

    .timer-config input[type="text"] {
      grid-column: 1 / -1;
    }

    #timerMinutes:disabled {
      background: #f1f5f9;
      color: #94a3b8;
      border-color: #dbe4ec;
      cursor: not-allowed;
      opacity: 1;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
      padding: 4px;
      border-radius: 8px;
      background: #f1f5f9;
      border: 1px solid var(--line);
    }

    .mode-button {
      min-height: 38px;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-weight: 850;
    }

    .mode-button.active {
      background: #fff;
      color: var(--rose-dark);
      box-shadow: 0 4px 12px rgba(31, 41, 55, .08);
    }

    .travel-map {
      display: grid;
      gap: 12px;
      margin-bottom: 14px;
    }

    #rewards-view.route-exploring #selectedCard,
    #rewards-view.city-exploring #journeyPanel {
      display: none;
    }

    .map-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .map-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .map-header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .map-chip {
      flex: 0 0 auto;
      border-radius: 8px;
      background: #1f2937;
      color: #fff;
      padding: 7px 9px;
      font-size: 12px;
      font-weight: 850;
    }

    .test-tools {
      display: none;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .test-tools.active {
      display: flex;
    }

    .test-tools button {
      min-height: 32px;
      border-radius: 999px;
      border: 1px dashed rgba(190,24,93,.36);
      background: #fff7fb;
      color: #9f1239;
      padding: 0 10px;
      font-size: 11px;
      font-weight: 900;
    }

    .map-trail {
      position: absolute;
      left: 10px;
      top: 10px;
      z-index: 4;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      min-height: 38px;
    }

    .map-trail span {
      border: 1px solid rgba(31,41,55,.1);
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      padding: 0 11px;
      color: #435064;
      font-size: 11px;
      font-weight: 850;
    }

    .map-trail span.active {
      color: #7a3342;
      border-color: rgba(227,107,127,.42);
      background: #fff1f4;
    }

    .map-trail.in-region {
      left: 116px;
    }

    .world-map {
      position: relative;
      min-height: 218px;
      overflow: hidden;
      border: 1px solid #b7ccdd;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.26)),
        url("assets/visual/generated/world-map-handdrawn.png") center / cover no-repeat,
        radial-gradient(circle at 16% 16%, rgba(255,255,255,.72), transparent 20%),
        linear-gradient(180deg, #bfe3f3 0%, #e9f6f9 100%);
      box-shadow: var(--shadow);
    }

    .world-map.map-china {
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.24)),
        url("assets/visual/generated/map-china-shanghai-handdrawn.png") center / cover no-repeat,
        radial-gradient(circle at 18% 16%, rgba(255,255,255,.72), transparent 20%),
        linear-gradient(180deg, #c9e7f5 0%, #edf9f2 100%);
    }

    .world-map.map-germany {
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.24)),
        url("assets/visual/generated/map-germany-tuebingen-handdrawn.png") center / cover no-repeat,
        radial-gradient(circle at 18% 16%, rgba(255,255,255,.72), transparent 20%),
        linear-gradient(180deg, #c9e7f5 0%, #faf0df 100%);
    }

    .world-map.map-shanghai-city {
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.18)),
        url("assets/visual/generated/map-shanghai-city-handdrawn.png") center / cover no-repeat,
        linear-gradient(180deg, #cfe8f4 0%, #fff7e8 100%);
    }

    .world-map.map-tuebingen-city {
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.18)),
        url("assets/visual/generated/map-tuebingen-city-handdrawn.png") center / cover no-repeat,
        linear-gradient(180deg, #d9edf0 0%, #fff7e8 100%);
    }

    .world-map.map-city {
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.18)),
        var(--city-map-image) center / cover no-repeat,

      border-radius: 9px;
      border: 1px solid rgba(31,41,55,.12);
      background:
        var(--sight-card-image) var(--sight-card-x, 50%) var(--sight-card-y, 50%) / var(--sight-card-size, cover) no-repeat,
        #fffdf8;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.6);
    }

    .sight-album-copy {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .sight-album-copy strong,
    .sight-album-copy span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sight-album-copy strong {
      color: #1f2937;
      font-size: 11px;
      line-height: 1.15;
      font-weight: 950;
    }

    .sight-album-copy span {
      color: #475467;
      font-size: 9px;
      line-height: 1.15;
      font-weight: 900;
    }

    .sight-album-status {
      position: absolute;
      right: 7px;
      top: 7px;
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,.84);
      color: #667085;
      font-size: 12px;
      font-weight: 950;
      box-shadow: 0 6px 14px rgba(31,41,55,.08);
    }

    .stamp-pager {
      display: grid;
      grid-template-columns: 38px 1fr 38px;
      gap: 8px;
      align-items: center;
      min-height: 38px;
    }

    .stamp-page-button {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(214,160,103,.42);
      background: rgba(255,255,255,.82);
      color: #8a5a2f;
      font-size: 18px;
      font-weight: 950;
      box-shadow: 0 8px 18px rgba(122,74,0,.07);
    }

    .stamp-page-button:disabled {
      opacity: .42;
      cursor: default;
      box-shadow: none;
    }

    .stamp-page-status {
      text-align: center;
      color: #8a5a2f;
      font-size: 11px;
      font-weight: 950;
    }

    @keyframes stampPress {
      0% { transform: scale(1.04) rotate(-1deg); }
      42% { transform: scale(.96) rotate(.5deg); box-shadow: inset 0 0 0 5px rgba(255,255,255,.8); }
      100% { transform: scale(1); }
    }

    .shop-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      margin-bottom: 12px;
    }

    .shop-tab {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .shop-tab.active {
      color: #7a3342;
      border-color: #efb5c0;
      background: #fff0f3;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .shop-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 10px;
      align-items: center;
    }

    .shop-item.selected {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(77, 124, 199, .12);
    }

    .shop-item.locked {
      background: #f8fafc;
      filter: saturate(.82);
    }

    .shop-copy {
      display: grid;
      gap: 6px;
    }

    .shop-item strong {
      font-size: 15px;
    }

    .shop-item span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .shop-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .shop-actions button:nth-child(3) {
      grid-column: 1 / -1;
    }

    .mini-preview {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      border: 1px solid #d9e1ec;
      background: var(--item-color, #eff7f4);
      display: grid;
      place-items: center;
      font-size: 24px;
      box-shadow: inset 0 -10px 0 rgba(31,41,55,.05);
    }

    .history {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #eef1f5;
    }

    .weekly-left {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      align-content: stretch;
    }

    .weekly-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .week-recap-card {
      display: grid;
      gap: 12px;
      height: 100%;
      min-height: 0;
      align-content: start;
      align-self: stretch;
      margin-bottom: 0;
    }

    .week-recap-list {
      display: grid;
      gap: 10px;
    }

    .week-recap-row {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .58);
    }

    .week-recap-icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--summary-color);
      background: var(--summary-bg);
      box-shadow: inset 0 0 0 1px rgba(31, 41, 55, .04);
    }

    .week-recap-icon svg {
      width: 17px;
      height: 17px;
      stroke-width: 2.4;
    }

    .week-recap-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .week-recap-value {
      color: var(--ink);
      font-size: 14px;
      font-weight: 900;
      text-align: right;
    }

    .weekly-overview {
      display: grid;
      grid-template-columns: max-content 240px;
      gap: 28px;
      align-items: start;
      justify-content: center;
    }

    .weekly-main {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .weekly-heatmap {
      display: grid;
      grid-template-columns: 34px repeat(7, 26px);
      grid-template-rows: 20px repeat(18, 16px);
      gap: 6px 14px;
      align-items: center;
      justify-content: start;
    }

    .weekly-day-label,
    .weekly-hour-label {
      color: #64748b;
      font-size: 10px;
      font-weight: 900;
      text-align: center;
    }

    .weekly-hour-label {
      text-align: right;
      padding-right: 4px;
    }

    .weekly-cell {
      width: 26px;
      height: 16px;
      border-radius: 5px;
      background: var(--cell-color, #f2f4f7);
      box-shadow: inset 0 0 0 1px rgba(31, 41, 55, .035);
    }

    .weekly-side {
      display: grid;
      gap: 12px;
      padding-left: 16px;
      border-left: 1px dashed #cbd5e1;
    }

    .weekly-title strong {
      display: block;
      color: var(--ink);
      font-size: 28px;
      line-height: 1.05;
      font-weight: 950;
    }

    .weekly-title span {
      color: var(--muted);
      font-size: 15px;
      font-weight: 750;
    }

    .weekly-legend {
      display: grid;
      gap: 9px;
    }

    .weekly-legend-item {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 850;
    }

    .weekly-swatch {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: var(--swatch-color);
      box-shadow: inset 0 0 0 1px rgba(31,41,55,.05);
    }

    nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(430px, 100%);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      background: rgba(255, 253, 248, 0.96);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .tab {
      min-height: 66px;
      display: grid;
      place-items: center;
      gap: 2px;
      color: var(--muted);
      background: transparent;
      font-size: 11px;
      font-weight: 750;
    }

    .tab svg {
      width: 21px;
      height: 21px;
      stroke-width: 2.4;
    }

    .tab.active {
      color: var(--rose-dark);
    }

    .empty {
      border: 1px dashed #cfd7e3;
      border-radius: 8px;
      padding: 16px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,.42);
      backdrop-filter: blur(4px);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 78px;
      transform: translateX(-50%) translateY(16px);
      width: min(390px, calc(100% - 32px));
      background: #1f2937;
      color: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: 180ms ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 360px) {
      h1 { font-size: 21px; }
      .timer-time { font-size: 36px; }
      .shop-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .weekly-heatmap {
        grid-template-columns: 30px repeat(7, 19px);
        grid-template-rows: 18px repeat(18, 14px);
        gap: 5px 7px;
      }

      .weekly-cell {
        width: 19px;
        height: 14px;
      }
    }

    @media (max-width: 620px) {
      .weekly-overview {
        grid-template-columns: 1fr;
      }

      .weekly-side {
        padding-left: 0;
        padding-top: 14px;
        border-left: 0;
        border-top: 1px dashed #cbd5e1;
      }
    }

    @media (min-width: 700px) {
      body {
        padding: 22px;
      }

      .app {
        width: min(100%, 1680px);
        max-width: 1680px;
        min-height: calc(100vh - 44px);
        grid-template-columns: 82px minmax(0, 1fr);
        grid-template-rows: auto 1fr;
        border: 1px solid rgba(216,222,232,.86);
        border-radius: 14px;
        overflow: hidden;
      }

      header {
        grid-column: 1 / -1;
        padding: 20px 28px 16px;
      }

      h1 {
        font-size: 30px;
      }

      .subtitle {
        font-size: 14px;
      }

      main {
        grid-column: 2;
        grid-row: 2;
        max-height: none;
        overflow: visible;
        padding: 22px 24px 24px;
      }

      nav {
        position: sticky;
        left: auto;
        bottom: auto;
        top: 0;
        transform: none;
        grid-column: 1;
        grid-row: 2;
        width: auto;
        height: 100%;
        align-self: stretch;
        grid-template-columns: 1fr;
        grid-auto-rows: 72px;
        align-content: start;
        border-top: 0;
        border-right: 1px solid var(--line);
        background: rgba(255,253,248,.9);
      }

      .tab {
        min-height: 72px;
        font-size: 11px;
      }

      .tab svg {
        width: 22px;
        height: 22px;
      }

      .view.active#home-view {
        display: grid;
        grid-template-columns: minmax(380px, 1fr) minmax(0, 2fr);
        grid-template-rows: auto 1fr;
        gap: 16px;
        align-items: stretch;
        min-height: 0;
      }

      #home-view .stats {
        grid-column: 1;
        margin-bottom: 0;
      }

      #home-view > .panel:nth-of-type(2) {
        grid-column: 1;
        grid-row: 2;
        margin-bottom: 0;
      }

      #home-view > .panel:nth-of-type(3) {
        grid-column: 2;
        grid-row: 1 / span 2;
        --home-timeline-height: clamp(410px, calc(100vh - 535px), 660px);
        display: grid;
        grid-template-rows: auto auto auto minmax(0, var(--home-timeline-height));
        align-content: start;
        min-height: 0;
        padding: clamp(10px, 1.25vh, 14px);
        margin-bottom: 0;
      }

      #home-view > .panel:nth-of-type(3) h2 {
        margin-bottom: 8px;
      }

      #home-view > .panel:nth-of-type(3) .schedule-form {
        gap: 6px;
        margin-bottom: 0;
      }

      #home-view > .panel:nth-of-type(3) input {
        min-height: 34px;
        padding: 8px 10px;
      }

      #home-view > .panel:nth-of-type(3) .category-select {
        gap: 4px;
        padding: 3px;
      }

      #home-view > .panel:nth-of-type(3) .category-option {
        min-height: 30px;
      }

      #home-view > .panel:nth-of-type(3) .primary,
      #home-view > .panel:nth-of-type(3) .secondary {
        min-height: 38px;
        padding: 8px 10px;
      }

      #home-view > .panel:nth-of-type(3) .compare-strip {
        gap: 5px;
        margin: 7px 0 8px;
      }

      #home-view > .panel:nth-of-type(3) .compare-row {
        gap: 7px;
      }

      #home-view > .panel:nth-of-type(3) .meter {
        height: 6px;
      }

      #home-view .plan-list,
      #home-view .day-timeline {
        min-height: var(--home-timeline-height);
        height: var(--home-timeline-height);
      }

      #home-view .timeline-label,
      #home-view .timeline-line {
        min-height: calc(var(--home-timeline-height) / 18);
      }

      .plan-title {
        font-size: 12px;
      }

      .plan-meta {
        font-size: 10px;
      }

      .view.active#timer-view {
        max-width: 620px;
        margin: 0 auto;
      }

      #timer-view > .panel {
        --timer-face-size: clamp(170px, calc(100vh - 640px), 240px);
        padding: clamp(10px, 1.4vh, 14px);
        margin-bottom: 0;
      }

      #timer-view .mode-switch,
      #timer-view .timer-actions,
      #timer-view .timer-config {
        gap: 8px;
        margin-bottom: clamp(7px, 1.1vh, 10px);
      }

      .timer-face {
        width: min(44vw, var(--timer-face-size));
        margin: clamp(4px, 1vh, 7px) auto clamp(7px, 1.2vh, 10px);
        box-shadow: inset 0 0 0 clamp(9px, 1.5vh, 12px) #ffffff, var(--shadow);
      }

      .timer-time {
        font-size: clamp(32px, 5vh, 40px);
      }

      .view.active#rewards-view {
        display: block;
      }

      .view.active#rewards-view .travel-map {
        grid-template-columns: minmax(0, 1.15fr) minmax(360px, .85fr);
        align-items: start;
      }

      .view.active#rewards-view .map-header {
        grid-column: 1 / -1;
      }

      .view.active#rewards-view #worldMap {
        grid-column: 1;
        grid-row: 2;
        width: 100%;
        min-height: 430px;
        aspect-ratio: 16 / 10;
        height: auto;
        align-self: start;
      }

      .view.active#rewards-view #worldMap.map-chapter-germany {
        aspect-ratio: 1649 / 954;
      }

      .view.active#rewards-view.route-exploring #journeyPanel {
        grid-column: 2;
        grid-row: 2;
        width: 100%;
        height: var(--travel-panel-height, auto);
        max-height: var(--travel-panel-height, none);
        grid-template-rows: auto auto auto auto minmax(0, 1fr);
        overflow: hidden;
      }

      .view.active#rewards-view.city-exploring #selectedCard {
        grid-column: 2;
        grid-row: 2;
        width: 100%;
      }

      .view.active#rewards-view.route-exploring #journeyPanel .route-chapter-list {
        max-height: none;
        min-height: 0;
        height: 100%;
      }

      .view.active#rewards-view #journeyPanel,
      .view.active#rewards-view #selectedCard {
        min-width: 0;
      }

      .shop-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .view.active#pet-view {
        height: calc(100vh - 172px);
        min-height: 560px;
        overflow: hidden;
      }

      .view.active#pet-view .pet-stage {
        height: 100%;
        grid-template-columns: minmax(520px, 1.05fr) minmax(560px, 1.15fr);
        align-items: stretch;
      }

      .view.active#pet-view .pet-room {
        min-height: 0;
        height: 100%;
      }

      .view.active#pet-view .passport {
        height: 100%;
        grid-template-rows: auto auto auto auto minmax(0, 1fr) auto;
      }

      .view.active#pet-view .stamp-album {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-content: start;
      }

      .view.active#report-view {
        display: grid;
        grid-template-columns: minmax(280px, 330px) minmax(0, 1fr);
        gap: 16px;
        grid-auto-rows: 1fr;
        align-items: stretch;
      }

      #report-view .weekly-left {
        grid-column: 1;
        height: 100%;
      }

      #report-view .weekly-grid {
        grid-template-columns: 1fr;
      }

      #report-view > .panel {
        grid-column: 2;
        margin-bottom: 0;
        height: 100%;
      }

      .toast {
        bottom: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-row">
        <div>
          <h1>TimeNest</h1>
          <p class="subtitle">把完成的事情，换成看得见的小奖励。</p>
        </div>
        <div class="coin-pill" aria-live="polite"><span id="coins">0</span> 金币</div>
      </div>
    </header>

    <main>
      <section class="view active" id="home-view">
        <div class="stats">
          <div class="stat">
            <strong id="todayDone">0</strong>
            <span>今日完成</span>
          </div>
          <div class="stat">
            <strong id="focusMinutes">0</strong>
            <span>专注分钟</span>
          </div>
        </div>

        <div class="panel">
          <h2>今日任务</h2>
          <div class="task-list" id="homeTasks"></div>
          <div class="home-task-create">
            <h3>添加任务</h3>
            <div class="home-task-form">
              <input id="taskInput" maxlength="40" placeholder="例如：背单词 30 分钟">
              <button class="primary" id="addTask">添加</button>
              <select id="taskReward">
                <option value="10">轻量任务 +10 金币</option>
                <option value="20">普通任务 +20 金币</option>
                <option value="35">困难任务 +35 金币</option>
              </select>
            </div>
          </div>
        </div>

        <div class="panel">
          <h2>今日时间规划</h2>
          <div class="schedule-form">
            <input id="planTitle" type="text" maxlength="40" placeholder="例如：写论文 / 健身 / 做饭">
            <input id="planStart" type="time" value="09:00" aria-label="开始时间">
            <input id="planEnd" type="time" value="10:00" aria-label="结束时间">
            <div class="category-select" aria-label="记录分类">
              <label class="category-option" data-category="daily"><input type="radio" name="logCategory" value="daily">日常</label>
              <label class="category-option" data-category="study"><input type="radio" name="logCategory" value="study" checked>学习</label>
              <label class="category-option" data-category="work"><input type="radio" name="logCategory" value="work">工作</label>
              <label class="category-option" data-category="leisure"><input type="radio" name="logCategory" value="leisure">娱乐</label>
            </div>
            <div class="edit-note" id="planEditNote"></div>
            <button class="primary" id="addPlan">加入计划</button>
            <button class="secondary" id="addTimeLog">加入记录</button>
          </div>
          <div class="compare-strip">
            <div class="compare-row">
              <span>计划</span>
              <div class="meter"><div class="meter-fill" id="plannedMeter"></div></div>
              <strong id="plannedMinutes">0分</strong>
            </div>
            <div class="compare-row">
              <span>记录</span>
              <div class="meter"><div class="meter-fill" id="actualMeter"></div></div>
              <strong id="actualMinutes">0分</strong>
            </div>
          </div>
          <div class="plan-list" id="planList"></div>
        </div>

      </section>

      <section class="view" id="timer-view">
        <div class="panel">
          <h2>专注计时</h2>
          <div class="mode-switch" aria-label="计时模式">
            <button class="mode-button active" data-timer-mode="countdown">倒计时</button>
            <button class="mode-button" data-timer-mode="stopwatch">正计时</button>
          </div>
          <div class="timer-config">
            <input id="timerTaskTitle" type="text" maxlength="40" placeholder="本次计时任务名，例如：写论文">
            <div class="category-select timer-category-select" aria-label="计时分类">
              <label class="category-option" data-category="daily"><input type="radio" name="timerCategory" value="daily">日常</label>
              <label class="category-option" data-category="study"><input type="radio" name="timerCategory" value="study" checked>学习</label>
              <label class="category-option" data-category="work"><input type="radio" name="timerCategory" value="work">工作</label>
              <label class="category-option" data-category="leisure"><input type="radio" name="timerCategory" value="leisure">娱乐</label>
            </div>
            <input id="timerMinutes" type="number" min="1" max="600" value="25" aria-label="倒计时分钟">
            <input id="timerRewardRule" value="每分钟 +1 金币" readonly aria-label="奖励规则">
          </div>
          <div class="timer-face" id="timerFace" style="--progress: 0deg">
            <div class="timer-time" id="timerTime">25:00</div>
          </div>
          <div class="timer-actions">
            <button class="primary" id="timerStart">开始</button>
            <button class="timer-abandon" id="timerAbandon">放弃</button>
            <button class="secondary" id="timerFinish">结算</button>
          </div>
        </div>
      </section>

      <section class="view" id="rewards-view">
        <div class="travel-map" aria-label="旅行地图">
          <div class="map-header">

      const parsed = JSON.parse(saved);
      parsed.ownedRewards ??= Array.isArray(parsed.ownedRewards) ? parsed.ownedRewards : [];
      if (!parsed.ownedRewards.includes("tuebingen-card")) parsed.ownedRewards.unshift("tuebingen-card");

      parsed.travel ??= { currentCityId: "tuebingen", arrivedCities: ["tuebingen"], tickets: [] };
      parsed.travel.currentCityId ??= "tuebingen";
      parsed.travel.arrivedCities = Array.isArray(parsed.travel.arrivedCities) ? parsed.travel.arrivedCities : ["tuebingen"];
      if (!parsed.travel.arrivedCities.includes("tuebingen")) parsed.travel.arrivedCities.unshift("tuebingen");
      if (!parsed.travel.arrivedCities.includes(parsed.travel.currentCityId)) parsed.travel.arrivedCities.push(parsed.travel.currentCityId);
      parsed.travel.tickets = Array.isArray(parsed.travel.tickets) ? parsed.travel.tickets : [];
      parsed.funds ??= {};
      parsed.wishlist ??= [];
      parsed.records ??= [];
      parsed.tasks = Array.isArray(parsed.tasks) ? parsed.tasks : [];
      if (parsed.tasks.length === 2

      parsed.plans ??= [];

    function addCoins(amount, label, record = {}) {
      state.coins += amount;
      const entry = {
        text: label,
        amount,
        date: todayKey,
        time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
      };
      state.history.unshift(entry);
      state.history = state.history.slice(0, 8);
      state.records.push({ kind: "earn", label, coins: amount, minutes: 0, date: todayKey, ts: Date.now(), ...record });
      state.records = state.records.slice(-500);
      saveState();
      render();
      showToast(`${label}，获得 ${amount} 金币`);
    }

    function spendCoins(amount, label) {
      state.coins -= amount;
      state.history.unshift({
        text: label,
        amount: -amount,
        date: todayKey,
        time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
      });
      state.history = state.history.slice(0, 8);
      state.records.push({ kind: "spend", label, coins: -amount, minutes: 0, date: todayKey, ts: Date.now() });
      state.records = state.records.slice(-500);
      saveState();
      render();
    }

    function minutesBetween(start, end) {
      const [startHour, startMinute] = start.split(":").map(Number);
      const [endHour, endMinute] = end.split(":").map(Number);
      let startTotal = startHour * 60 + startMinute;
      let endTotal = endHour * 60 + endMinute;
      if (endTotal <= startTotal) endTotal += 24 * 60;
      return endTotal - startTotal;
    }

    function timeToMinutes(time) {
      const [hour, minute] = time.split(":").map(Number);
      return hour * 60 + minute;
    }

    function formatMinutes(minutes) {
      if (minutes < 60) return `${minutes}分`;
      const hours = Math.floor(minutes / 60);
      const rest = minutes % 60;
      return rest ? `${hours}小时${rest}分` : `${hours}小时`;
    }

    function renderPlans() {
      const root = document.querySelector("#planList");
      const planned = state.plans.reduce((sum, plan) => sum + plan.minutes, 0);

      const max = Math.max(planned, actual, 1);
      document.querySelector("#plannedMinutes").textContent = formatMinutes(planned);
      document.querySelector("#actualMinutes").textContent = formatMinutes(actual);
      document.querySelector("#plannedMeter").style.width = `${planned / max * 100}%`;
      document.querySelector("#actualMeter").style.width = `${actual / max * 100}%`;
      root.innerHTML = "";

      const timelineStart = 6 * 60;
      const timelineEnd = 24 * 60;
      const timelineMinutes = timelineEnd - timelineStart;
      const now = new Date();
      const nowMinutes = now.getHours() * 60 + now.getMinutes();
      const showNow = nowMinutes >= timelineStart && nowMinutes <= timelineEnd;
      const nowTop = (nowMinutes - timelineStart) / timelineMinutes * 100;

      root.innerHTML = `
        <div class="day-timeline">
          ${Array.from({ length: 18 }, (_, index) => {
            const hour = index + 6;
            return `
              <div class="timeline-hour">
                <div class="timeline-label">${String(hour).padStart(2, "0")}:00</div>
                <div class="timeline-line"></div>
              </div>
            `;
          }).join("")}
          <div class="timeline-column-labels"><span>计划</span><span>记录</span></div>
          <div class="timeline-events plan-events"></div>
          <div class="timeline-events record-events"></div>
          ${showNow ? `<div class="now-line" style="--top:${nowTop}%"><span>现在 ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}</span></div>` : ""}
          ${state.plans.length || state.timeLogs.length ? "" : `<div class="timeline-empty">先把任务安排进时间轴，今天会更像一张真正的日程表。</div>`}
        </div>
      `;

      const planLayer = root.querySelector(".plan-events");
      const recordLayer = root.querySelector(".record-events");
      const visibleRange = (item) => {
        const start = timeToMinutes(item.start);
        let end = timeToMinutes(item.end);
        if (end <= start) end += 24 * 60;
        const visibleStart = Math.max(start, timelineStart);
        const visibleEnd = Math.min(end, timelineEnd);
        if (visibleEnd <= timelineStart || visibleStart >= timelineEnd) return null;
        const top = (visibleStart - timelineStart) / timelineMinutes * 100;
        const visibleMinutes = Math.max(15, visibleEnd - visibleStart);
        const minHeight = 32 / 810 * 100;
        const height = Math.min(100 - top, Math.max(minHeight, visibleMinutes / timelineMinutes * 100));
        const laneEnd = top + height;
        return { start, end, visibleStart, visibleEnd, top, height, laneEnd };
      };

      const assignTimelineLanes = (items) => {
        const blocks = items
          .map((item, originalIndex) => ({ item, originalIndex, range: visibleRange(item) }))
          .filter(block => block.range)
          .sort((a, b) => a.range.visibleStart - b.range.visibleStart || a.range.visibleEnd - b.range.visibleEnd || a.originalIndex - b.originalIndex);
        const active = [];
        blocks.forEach(block => {
          for (let index = active.length - 1; index >= 0; index -= 1) {
            if (active[index].range.laneEnd <= block.range.top) active.splice(index, 1);
          }
          const used = new Set(active.map(item => item.lane));
          let lane = 0;
          while (used.has(lane)) lane += 1;
          block.lane = lane;
          active.push(block);
          const group = active.slice();
          const laneCount = Math.max(...group.map(item => item.lane)) + 1;
          group.forEach(item => item.laneCount = Math.max(item.laneCount || 1, laneCount));
        });
        return blocks;
      };

      const placeBlock = (block, layer, type, className, statusText) => {
        const { item, range } = block;
        const displayMinutes = Math.max(1, range.end - range.start);
        const row = document.createElement("div");
        row.className = className;
        row.style.setProperty("--top", `${range.top}%`);
        row.style.setProperty("--height", `${range.height}%`);
        row.style.setProperty("--lane-left", `${block.lane / block.laneCount * 100}%`);
        row.style.setProperty("--lane-width", `${100 / block.laneCount}%`);
        const color = type === "plan" ? planTimelineStyle(item.done) : logCategoryStyle(item.category);
        row.style.setProperty("--item-bg", color.bg);
        row.style.setProperty("--item-border", color.border);
        row.style.setProperty("--item-accent", color.accent);
        row.style.setProperty("--item-text", color.text);
        row.innerHTML = `
          <div>
            <div class="plan-title"></div>
            <div class="plan-meta">
              <span>${item.start}-${item.end}</span>
              <span>${formatMinutes(displayMinutes)}</span>
              <span>${type === "log" ? `<span class="log-category">${logCategoryName(item.category)}</span>` : statusText}</span>
            </div>
          </div>
        `;
        row.querySelector(".plan-title").textContent = item.title;
        row.addEventListener("click", event => openTimelineMenu(event, type, item.id));
        layer.appendChild(row);
      };

      assignTimelineLanes([...state.plans])
        .forEach(block => placeBlock(block, planLayer, "plan", `plan-item${block.item.done ? " done" : ""}`, block.item.done ? "已完成" : "计划中"));

      assignTimelineLanes([...state.timeLogs])
        .forEach(block => placeBlock(block, recordLayer, "log", "plan-item record-item", "记录"));
    }

    function currentCalendarWeekDays() {
      const monday = new Date();
      const dayOffset = (monday.getDay() + 6) % 7;
      monday.setDate(monday.getDate() - dayOffset);
      monday.setHours(0, 0, 0, 0);
      return Array.from({ length: 7 }, (_, index) => {
        const date = new Date(monday);
        date.setDate(monday.getDate() + index);
        const key = localDateKey(date);
        return {
          key,
          date,
          label: date.toLocaleDateString("zh-CN", { weekday: "short" }),
          minutes: 0,
          coins: 0,
          tasks: 0,
          plans: 0
        };
      });
    }

    function weekNumber(date) {
      const target = new Date(date);
      target.setHours(0, 0, 0, 0);
      target.setDate(target.getDate() + 3 - ((target.getDay() + 6) % 7));
      const firstThursday = new Date(target.getFullYear(), 0, 4);
      firstThursday.setDate(firstThursday.getDate() + 3 - ((firstThursday.getDay() + 6) % 7));
      return 1 + Math.round((target - firstThursday) / (7 * 24 * 60 * 60 * 1000));
    }

    function shortDateLabel(date) {
      return `${date.getMonth() + 1}.${date.getDate()}`;
    }

    function timeLogRange(log) {
      const start = timeToMinutes(log.start);
      let end = timeToMinutes(log.end);
      if (end <= start) end += 24 * 60;
      return { start, end };
    }

    function weeklyCategoryMinutes(days) {
      return Object.fromEntries(Object.keys(logCategories).map(category => [category, 0]));
    }

    function categoryFromFocusRecord(record) {
      if (logCategories[record.category]) return record.category;
      if (String(record.label || "").startsWith("学习记录")) return "study";
      if (String(record.label || "").startsWith("工作记录")) return "work";
      return "daily";
    }

    function renderWeeklyReport() {
      const days = currentCalendarWeekDays();
      const byDay = Object.fromEntries(days.map(day => [day.key, day]));
      const categoryTotals = weeklyCategoryMinutes(days);
      const hours = Array.from({ length: 18 }, (_, index) => index + 6);
      const cells = Object.fromEntries(days.map(day => [
        day.key,
        Object.fromEntries(hours.map(hour => [
          hour,
          Object.fromEntries(Object.keys(logCategories).map(category => [category, 0]))
        ]))
      ]));

      const visibleTimeLogIds = new Set();
      state.timeLogs.forEach(log => {
        const day = byDay[log.date];
        if (!day) return;
        visibleTimeLogIds.add(log.id);
        const category = logCategories[log.category] ? log.category : "daily";
        const { start, end } = timeLogRange(log);
        const minutes = Math.max(0, end - start);
        day.minutes += minutes;
        categoryTotals[category] += minutes;
        hours.forEach(hour => {
          const hourStart = hour * 60;
          const hourEnd = hourStart + 60;
          const overlap = Math.max(0, Math.min(end, hourEnd) - Math.max(start, hourStart));
          if (overlap) cells[day.key][hour][category] += overlap;
        });
      });

      state.records.forEach(record => {
        if (!byDay[record.date]) return;
        if ((record.coins || 0) > 0) byDay[record.date].coins += record.coins;
        if (record.kind === "task") byDay[record.date].tasks += 1;
        if (record.kind === "plan") byDay[record.date].plans += record.minutes || 0;
        if (record.kind === "time-log-reward" && !visibleTimeLogIds.has(record.logId)) {
          const category = categoryFromFocusRecord(record);
          const minutes = record.minutes || 0;
          byDay[record.date].minutes += minutes;
          categoryTotals[category] += minutes;
        }
      });

      const weekMinutes = days.reduce((sum, day) => sum + day.minutes, 0);
      const weekCoins = days.reduce((sum, day) => sum + day.coins, 0);
      const weekTasks = days.reduce((sum, day) => sum + day.tasks, 0);
      const weekFocusStudyWorkMinutes = (categoryTotals.study || 0) + (categoryTotals.work || 0);
      const bestDay = [...days].sort((a, b) => b.minutes - a.minutes)[0];
      document.querySelector("#weekMinutes").textContent = weekMinutes;
      document.querySelector("#weekCoins").textContent = weekCoins;
      document.querySelector("#weeklyTasks").textContent = `${weekTasks} 个`;
      document.querySelector("#weeklyPlanMinutes").textContent = formatMinutes(weekFocusStudyWorkMinutes);
      document.querySelector("#weeklyBestDay").textContent = bestDay.minutes
        ? `${bestDay.label} ${formatMinutes(bestDay.minutes)}`
        : "-";

      const cellColor = (day, hour) => {
        const entries = Object.entries(cells[day.key][hour]);
        const [category, minutes] = entries.sort((a, b) => b[1] - a[1])[0];
        return minutes ? logCategoryStyle(category).bg : "#f2f4f7";
      };
      const overview = document.querySelector("#weeklyOverview");
      const startDate = days[0].date;
      const endDate = days[days.length - 1].date;
      overview.innerHTML = `
        <div class="weekly-main">
          <div class="weekly-heatmap">
            <div></div>
            ${days.map(day => `<div class="weekly-day-label">${day.label.replace("周", "")}</div>`).join("")}
            ${hours.map(hour => `
              <div class="weekly-hour-label">${String(hour).padStart(2, "0")}</div>
              ${days.map(day => `<div class="weekly-cell" title="${day.label} ${String(hour).padStart(2, "0")}:00-${String(hour + 1).padStart(2, "0")}:00" style="--cell-color:${cellColor(day, hour)}"></div>`).join("")}
            `).join("")}
          </div>
        </div>
        <div class="weekly-side">
          <div class="weekly-title">
            <strong>第 ${weekNumber(endDate)} 周</strong>
            <span>${shortDateLabel(startDate)} - ${shortDateLabel(endDate)}</span>
          </div>
          <div class="weekly-legend">
            ${Object.entries(logCategories).map(([category, meta]) => `
              <div class="weekly-legend-item">
                <span class="weekly-swatch" style="--swatch-color:${meta.bg}"></span>
                <span>${meta.name}</span>
                <strong>${formatMinutes(categoryTotals[category])}</strong>
              </div>
            `).join("")}
            <div class="weekly-legend-item">
              <span class="weekly-swatch" style="--swatch-color:#f2f4f7"></span>
              <span>未记录</span>
              <strong>-</strong>
            </div>
          </div>
        </div>
      `;
    }
