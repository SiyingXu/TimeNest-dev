<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e36b7f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TimeNest">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/app-icon-pig-192.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/app-icon-pig-192.png">
  <title>TimeNest</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2937;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #fffdf8;
      --panel: #ffffff;
      --rose: #e36b7f;
      --rose-dark: #b94d61;
      --mint: #3da989;
      --gold: #d99825;
      --blue: #4d7cc7;
      --floor: #d7a876;
      --wall: #f1d9c8;
      --shadow: 0 12px 30px rgba(31, 41, 55, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, #f7efe6 0%, #eef5f0 46%, #f8fbff 100%);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--paper);
      box-shadow: 0 0 0 1px rgba(31, 41, 55, 0.06);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 18px 18px 12px;
      background: linear-gradient(180deg, #fffaf1 0%, #fffdf8 100%);
      border-bottom: 1px solid rgba(216, 222, 232, 0.8);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .coin-pill {
      min-width: 92px;
      padding: 9px 11px;
      border-radius: 999px;
      background: #fff1c8;
      color: #7a4a00;
      font-weight: 800;
      text-align: center;
      border: 1px solid #f0cc77;
    }

    main {
      overflow: auto;
      padding: 16px 16px 88px;
    }

    .view {
      display: none;
      animation: rise 180ms ease-out;
    }

    .view.active { display: block; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.05);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      margin-bottom: 3px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 14px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 17px;
      letter-spacing: 0;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 90px;
      gap: 8px;
      margin-bottom: 10px;
    }

    .schedule-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .schedule-form input[type="text"] {
      grid-column: 1 / -1;
    }

    .edit-note {
      display: none;
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .edit-note.active {
      display: block;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(77, 124, 199, 0.14);
    }

    .primary {
      border-radius: 8px;
      background: var(--rose);
      color: #fff;
      font-weight: 800;
      padding: 11px 12px;
      min-height: 44px;
    }

    .primary:active, .secondary:active, .icon-button:active {
      transform: translateY(1px);
    }

    .secondary {
      border-radius: 8px;
      background: #eef7f3;
      color: #17644f;
      font-weight: 800;
      padding: 11px 12px;
      min-height: 44px;
      border: 1px solid #b7ded1;
    }

    .task-list {
      display: grid;
      gap: 9px;
    }

    .plan-list {
      position: relative;
      min-height: 810px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .day-timeline {
      position: relative;
      min-height: 810px;
      display: grid;
      grid-template-columns: 58px 1fr 1fr;
    }

    .timeline-hour {
      display: contents;
    }

    .timeline-label {
      min-height: 45px;
      padding: 6px 8px 0 0;
      color: #98a2b3;
      text-align: right;
      font-size: 12px;
      font-weight: 800;
      border-right: 1px solid #eef1f5;
    }

    .timeline-line {
      grid-column: 2 / 4;
      min-height: 45px;
      border-bottom: 1px solid #eef1f5;
    }

    .timeline-events {
      position: absolute;
      top: 0;
      bottom: 0;
    }

    .timeline-events.plan-events {
      left: 58px;
      right: calc(50% + 4px);
    }

    .timeline-events.record-events {
      left: calc(50% + 4px);
      right: 7px;
    }

    .timeline-column-labels {
      position: absolute;
      left: 58px;
      right: 7px;
      top: 0;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      pointer-events: none;
    }

    .timeline-column-labels span {
      display: inline-flex;
      width: fit-content;
      border: 1px solid rgba(31,41,55,.08);
      border-radius: 999px;
      background: rgba(255,255,255,.82);
      padding: 4px 8px;
      color: #64748b;
      font-size: 10px;
      font-weight: 900;
      box-shadow: 0 5px 14px rgba(31,41,55,.07);
    }

    .now-line {
      position: absolute;
      left: 58px;
      right: 7px;
      top: var(--top);
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      color: #d92d20;
      font-size: 10px;
      font-weight: 900;
    }

    .now-line::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #d92d20;
      box-shadow: 0 0 0 3px rgba(217,45,32,.12);
    }

    .now-line::after {
      content: "";
      height: 2px;
      flex: 1;
      border-radius: 99px;
      background: #d92d20;
      box-shadow: 0 1px 0 rgba(255,255,255,.8);
    }

    .timeline-empty {
      position: absolute;
      left: 74px;
      right: 16px;
      top: 14px;
      z-index: 2;
      border: 1px dashed #d8dee8;
      border-radius: 8px;
      background: rgba(255,255,255,.82);
      color: var(--muted);
      padding: 10px;
      font-size: 12px;
      line-height: 1.4;
    }

    .plan-item {
      position: absolute;
      left: 8px;
      right: 0;
      top: var(--top);
      height: var(--height);
      min-height: 32px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
      align-items: start;
      padding: 6px 7px 6px 9px;
      border: 1px solid rgba(227,107,127,.28);
      border-left: 6px solid var(--rose);
      border-radius: 8px;
      background: #fde8ee;
      box-shadow: 0 7px 16px rgba(31,41,55,.08);
      overflow: hidden;
      cursor: pointer;
    }

    .plan-item.done {
      opacity: .82;
    }

    .record-item {
      border-color: rgba(61,169,137,.32);
      border-left-color: #3da989;
      background: #eefaf5;
    }

    .plan-title {
      font-size: 10px;
      font-weight: 850;
      line-height: 1.18;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .plan-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1px 5px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.2;
      margin-top: 1px;
      white-space: normal;
      overflow: hidden;
      text-overflow: clip;
    }

    .plan-task-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #17644f;
      font-weight: 900;
    }

    .timeline-menu {
      position: absolute;
      left: min(var(--menu-x), calc(100% - 142px));
      top: var(--menu-y);
      z-index: 8;
      display: grid;
      grid-template-columns: 1fr;
      min-width: 126px;
      overflow: hidden;
      border: 1px solid rgba(216,222,232,.92);
      border-radius: 8px;
      background: rgba(255,253,248,.96);
      box-shadow: 0 14px 30px rgba(31,41,55,.16);
    }

    .timeline-menu button {
      min-height: 34px;
      padding: 8px 12px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      font-size: 12px;
      font-weight: 850;
      border-bottom: 1px solid #eef1f5;
    }

    .timeline-menu button:last-child {
      border-bottom: 0;
    }

    .timeline-menu button.danger {
      color: #b42318;
    }

    .compare-strip {
      display: grid;
      gap: 7px;
      margin: 10px 0 12px;
    }

    .compare-row {
      display: grid;
      grid-template-columns: 58px 1fr 46px;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .meter {
      height: 8px;
      overflow: hidden;
      border-radius: 99px;
      background: #edf1f5;
    }

    .meter-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--mint), #f0c55d);
    }

    .task {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 9px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }

    .task.editing {
      grid-template-columns: 1fr;
      align-items: stretch;
    }

    .task.done {
      opacity: 0.65;
    }

    .task.done .task-name {
      text-decoration: line-through;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      border: 1px solid var(--line);
      color: var(--ink);
      font-weight: 900;
    }

    .task-name {
      font-weight: 750;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-reward {
      color: var(--gold);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .task-actions .icon-button {
      width: 34px;
      height: 34px;
      font-size: 13px;
    }

    .task-menu {
      position: absolute;
      left: min(var(--menu-x), calc(100% - 142px));
      top: var(--menu-y);
      z-index: 12;
      display: grid;
      min-width: 126px;
      overflow: hidden;
      border: 1px solid rgba(216,222,232,.92);
      border-radius: 8px;
      background: rgba(255,253,248,.97);
      box-shadow: 0 14px 30px rgba(31,41,55,.16);
    }

    .task-menu button {
      min-height: 34px;
      padding: 8px 12px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      font-size: 12px;
      font-weight: 850;
      border-bottom: 1px solid #eef1f5;
    }

    .task-menu button:last-child {
      border-bottom: 0;
    }

    .task-menu button.danger {
      color: #b42318;
    }

    .task-edit-grid {
      display: grid;
      grid-template-columns: 1fr 88px;
      gap: 8px;
    }

    .task-edit-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .timer-face {
      aspect-ratio: 1;
      width: min(72vw, 275px);
      margin: 8px auto 16px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #fffdf8 0 55%, transparent 56%),
        conic-gradient(var(--mint) var(--progress), #e6ece8 0);
      display: grid;
      place-items: center;
      border: 1px solid #c8ded5;
      box-shadow: inset 0 0 0 14px #ffffff, var(--shadow);
    }

    .timer-time {
      font-size: 43px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .timer-actions, .timer-config {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .timer-config input[type="text"] {
      grid-column: 1 / -1;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
      padding: 4px;
      border-radius: 8px;
      background: #f1f5f9;
      border: 1px solid var(--line);
    }

    .mode-button {
      min-height: 38px;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-weight: 850;
    }

    .mode-button.active {
      background: #fff;
      color: var(--rose-dark);
      box-shadow: 0 4px 12px rgba(31, 41, 55, .08);
    }

    .travel-map {
      display: grid;
      gap: 12px;
      margin-bottom: 14px;
    }

    .reward-sections {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .reward-section-tab {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.74);
      color: #5f6b7a;
      min-height: 42px;
      font-size: 13px;
      font-weight: 900;
    }

    .reward-section-tab.active {
      border-color: rgba(227,107,127,.45);
      background: #fff1f4;
      color: #8e3047;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.62);
    }

    .reward-panel {
      display: none;
    }

    .reward-panel.active {
      display: block;
    }

    .map-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .map-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .map-header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .map-chip {
      flex: 0 0 auto;
      border-radius: 8px;
      background: #1f2937;
      color: #fff;
      padding: 7px 9px;
      font-size: 12px;
      font-weight: 850;
    }

    .map-trail {
      position: absolute;
      left: 10px;
      top: 10px;
      z-index: 4;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .map-trail span {
      border: 1px solid rgba(31,41,55,.1);
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      padding: 5px 8px;
      color: #435064;
      font-size: 11px;
      font-weight: 850;
    }

    .map-trail span.active {
      color: #7a3342;
      border-color: rgba(227,107,127,.42);
      background: #fff1f4;
    }

    .map-trail.in-region {
      left: 82px;
    }

    .world-map {
      position: relative;
      min-height: 218px;
      overflow: hidden;
      border: 1px solid #b7ccdd;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.26)),
        url("assets/visual/generated/world-map-handdrawn.png") center / cover no-repeat,
        radial-gradient(circle at 16% 16%, rgba(255,255,255,.72), transparent 20%),
        linear-gradient(180deg, #bfe3f3 0%, #e9f6f9 100%);
      box-shadow: var(--shadow);
    }

    .world-map.map-china {
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.24)),
        url("assets/visual/generated/map-china-shanghai-handdrawn.png") center / cover no-repeat,
        radial-gradient(circle at 18% 16%, rgba(255,255,255,.72), transparent 20%),
        linear-gradient(180deg, #c9e7f5 0%, #edf9f2 100%);
    }

    .world-map.map-germany {
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.24)),
        url("assets/visual/generated/map-germany-tuebingen-handdrawn.png") center / cover no-repeat,
        radial-gradient(circle at 18% 16%, rgba(255,255,255,.72), transparent 20%),
        linear-gradient(180deg, #c9e7f5 0%, #faf0df 100%);
    }

    .world-map.map-shanghai-city {
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.18)),
        url("assets/visual/generated/map-shanghai-city-handdrawn.png") center / cover no-repeat,
        linear-gradient(180deg, #cfe8f4 0%, #fff7e8 100%);
    }

    .world-map.map-tuebingen-city {
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.18)),
        url("assets/visual/generated/map-tuebingen-city-handdrawn.png") center / cover no-repeat,
        linear-gradient(180deg, #d9edf0 0%, #fff7e8 100%);
    }

    .world-map.map-chapter {
      min-height: 246px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.22)),
        radial-gradient(circle at 18% 22%, rgba(255,255,255,.86), transparent 16%),
        radial-gradient(circle at 78% 18%, rgba(255,246,219,.72), transparent 18%),
        repeating-linear-gradient(90deg, rgba(120,92,66,.08) 0 1px, transparent 1px 32px),
        repeating-linear-gradient(0deg, rgba(120,92,66,.06) 0 1px, transparent 1px 30px),
        linear-gradient(135deg, #f7ead8 0%, #e8f3ee 48%, #edf4fb 100%);
      border-color: rgba(160,130,93,.38);
    }

    .world-map.map-chapter.map-chapter-germany {
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.24)),
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.48), transparent 18%),
        url("assets/visual/generated/map-germany-route-handdrawn.png") center / cover no-repeat,
        linear-gradient(135deg, #d8edf1 0%, #f8f2df 52%, #eef6ef 100%);
    }

    .map-chapter-germany .chapter-art {
      display: none;
    }

    .chapter-map-image {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .world-map.map-chapter.map-chapter-germany::before {
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.12)),
        linear-gradient(90deg, transparent 24%, rgba(77,124,199,.05) 25%, transparent 26%, transparent 49%, rgba(77,124,199,.05) 50%, transparent 51%, transparent 74%, rgba(77,124,199,.05) 75%, transparent 76%),
        linear-gradient(0deg, transparent 32%, rgba(77,124,199,.05) 33%, transparent 34%, transparent 65%, rgba(77,124,199,.05) 66%, transparent 67%);
    }

    .chapter-art {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .chapter-art .land {
      fill: rgba(245, 231, 198, .82);
      stroke: rgba(111, 78, 45, .22);
      stroke-width: 2.2;
      filter: drop-shadow(0 10px 18px rgba(111,78,45,.12));
    }

    .chapter-art .sketch {
      fill: none;
      stroke: rgba(111,78,45,.22);
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 5 8;
    }

    .chapter-art .state {
      fill: rgba(141, 180, 134, .24);
      stroke: rgba(77, 124, 103, .18);
      stroke-width: 1.3;
    }

    .chapter-art .forest {
      fill: rgba(84, 136, 95, .28);
      stroke: rgba(47, 89, 72, .18);
      stroke-width: 1;
    }

    .chapter-art .river {
      fill: none;
      stroke: rgba(77,124,199,.34);
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-dasharray: 4 6;
    }

    .chapter-art .mountain {
      fill: rgba(143, 114, 78, .18);
      stroke: rgba(111, 78, 45, .16);
      stroke-width: 1;
    }

    .chapter-art .doodle {
      fill: none;
      stroke: rgba(67,80,100,.28);
      stroke-width: 1.2;
      stroke-linecap: round;
    }

    .chapter-art text {
      fill: rgba(67,80,100,.5);
      font-size: 11px;
      font-weight: 800;
    }

    .chapter-path {
      position: absolute;
      left: 8%;
      right: 8%;
      top: 50%;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(227,107,127,.55), rgba(42,121,103,.52));
      transform: rotate(-2deg);
      opacity: .72;

      align-items: center;
      color: #7a3342;
      font-size: 11px;
      font-weight: 900;
    }

    .pet-route-dot {
      height: 2px;
      background: repeating-linear-gradient(90deg, #d08b47 0 6px, transparent 6px 11px);
    }

    .pet-room .pig-face {
      left: 50%;
      bottom: 64px;
      width: 112px;
      height: 86px;
      transform: translateX(-50%);
      z-index: 2;
      box-shadow: 0 12px 0 rgba(185,77,97,.08);
    }

    .pet-room .pig-face::before,
    .pet-room .pig-face::after {
      width: 24px;
      height: 24px;
      top: -10px;
    }

    .pet-toy {
      position: absolute;
      right: 48px;
      bottom: 48px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 28%, #fff, #f0c55d 42%, #e36b7f 43%);
      border: 2px solid rgba(31,41,55,.12);
      z-index: 2;
    }

    .pet-status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .pet-meter {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 7px;
      font-size: 12px;
      font-weight: 850;
    }

    .meter-track {
      height: 8px;
      border-radius: 99px;
      background: #eef1f5;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: var(--value);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--rose), var(--gold));
    }

    .pet-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .pet-note {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .pig-pen {
      position: relative;
      min-height: 108px;
      border: 1px solid #e4b9c4;
      border-radius: 8px;
      background:
        repeating-linear-gradient(90deg, rgba(150, 94, 65, .2) 0 8px, transparent 8px 20px),
        linear-gradient(180deg, #fff7f5, #f7e7dc);
      overflow: hidden;
    }

    .pig-pen::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 26px;
      height: 8px;
      background: rgba(150, 94, 65, .34);
    }

    .pig-label {
      position: absolute;
      left: 12px;
      top: 12px;
      color: #7a3342;
      font-size: 12px;
      font-weight: 800;
      z-index: 3;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(228,185,196,.72);
      box-shadow: 0 8px 18px rgba(122,51,66,.08);
    }

    .pig-face {
      position: absolute;
      left: 36px;
      bottom: 26px;
      width: 38px;
      height: 32px;
      border-radius: 45% 45% 48% 48%;
      background:
        radial-gradient(circle at 35% 40%, #4b3138 0 2px, transparent 3px),
        radial-gradient(circle at 65% 40%, #4b3138 0 2px, transparent 3px),
        radial-gradient(ellipse at 50% 65%, #e8869b 0 22%, transparent 23%),
        #f5a9b9;
      border: 2px solid rgba(185, 77, 97, .24);
    }

    .pig-face::before,
    .pig-face::after {
      content: "";
      position: absolute;
      top: -5px;
      width: 12px;
      height: 12px;
      border-radius: 3px 8px 4px 8px;
      background: #f5a9b9;
      border: 2px solid rgba(185, 77, 97, .2);
    }

    .pig-face::before {
      left: 2px;
      transform: rotate(-28deg);
    }

    .pig-face::after {
      right: 2px;
      transform: rotate(28deg);
    }

    .passport {
      min-height: 0;
      border: 1px solid #ead3b8;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(185,124,64,.1) 0 1px, transparent 1px 50%),
        linear-gradient(180deg, rgba(255,255,255,.86), rgba(255,250,241,.94));
      background-size: 18px 18px;
      padding: 12px;
      display: grid;
      gap: 8px;
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,.72);
      overflow: hidden;
    }

    .passport strong {
      font-size: 13px;
    }

    .stamp-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .stamp-tab {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.86);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .stamp-tab.active {
      color: #7a3342;
      border-color: rgba(227,107,127,.42);
      background: #fff1f4;
    }

    .stamp-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .stamp-album {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      min-height: 0;
      overflow: auto;
      padding: 2px 3px 8px 2px;
      scrollbar-width: thin;
    }

    .stamp-album::after {
      content: attr(data-note);
      display: block;
      grid-column: 1 / -1;
      min-height: 32px;
      border: 1px dashed rgba(185,124,64,.34);
      border-radius: 10px;
      background: rgba(255,248,236,.72);
      color: #8a5a2f;
      padding: 9px 12px;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
    }

    .stamp-album[data-note=""]::after {
      display: none;
    }

    .stamp-card {
      min-height: 116px;
      border: 1px solid color-mix(in srgb, var(--stamp-color, #1f2937) 70%, #fff 30%);
      border-radius: 10px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.72) 0 58%, rgba(255,248,236,.94) 59%),
        radial-gradient(circle at 12% 16%, rgba(255,255,255,.92), transparent 18%),
        linear-gradient(180deg, #fffefb, #fff7ee);
      color: var(--stamp-color, #1f2937);
      padding: 9px;
      display: grid;
      grid-template-columns: .95fr 1.05fr;
      gap: 9px;
      box-shadow:
        0 1px 0 rgba(255,255,255,.9) inset,
        0 10px 18px rgba(122,74,0,.08);
      cursor: pointer;
      transition: 160ms ease;
      position: relative;
      overflow: hidden;
    }

    .stamp-card::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 9px;
      background: linear-gradient(90deg, rgba(122,74,0,.18), rgba(122,74,0,.04));
    }

    .stamp-card::after {
      content: attr(data-status);
      position: absolute;
      right: 7px;
      bottom: 7px;
      opacity: .72;
      font-size: 8px;
      font-weight: 950;
    }

    .stamp-card:hover {
      transform: translateY(-2px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.72), 0 8px 18px rgba(31,41,55,.12);
    }

    .stamp-visual {
      border: 2px dashed currentColor;
      border-radius: 50%;
      display: grid;
      place-items: center;
      min-width: 0;
      background:
        radial-gradient(circle at 26% 22%, rgba(255,255,255,.88), transparent 20%),
        radial-gradient(circle, rgba(255,255,255,.7), rgba(255,255,255,.18));
      font-size: 18px;
      font-weight: 950;
      letter-spacing: 0;
      aspect-ratio: 1;
      align-self: center;
      transform: rotate(-6deg);
    }

    .stamp-info {
      display: grid;
      align-content: space-between;
      min-width: 0;
      font-size: 10px;
      font-weight: 950;
      line-height: 1.15;
      text-transform: uppercase;
    }

    .stamp-info strong {
      font-size: 12px;
      line-height: 1.15;
      color: #1f2937;
    }

    .stamp-date {
      border: 1px solid currentColor;
      min-height: 17px;
      display: grid;
      place-items: center;
      font-size: 8px;
    }

    .stamp-card.empty-stamp {
      --stamp-color: #98a2b3;
      border-style: dashed;
      opacity: .75;
    }

    .stamp-card.locked-stamp {
      --stamp-color: #a8b0bd;
      border-style: dashed;
      color: #8b95a5;
      background:
        linear-gradient(90deg, rgba(255,255,255,.68) 0 58%, rgba(246,248,251,.9) 59%),
        radial-gradient(circle at 12% 16%, rgba(255,255,255,.92), transparent 18%),
        linear-gradient(180deg, #fbfcfe, #f4f6f9);
      filter: grayscale(.5);
    }

    .stamp-card.stamp-pressed {
      animation: stampPress 360ms ease;
    }

    @keyframes stampPress {
      0% { transform: scale(1.04) rotate(-1deg); }
      42% { transform: scale(.96) rotate(.5deg); box-shadow: inset 0 0 0 5px rgba(255,255,255,.8); }
      100% { transform: scale(1); }
    }

    .shop-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      margin-bottom: 12px;
    }

    .shop-tab {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .shop-tab.active {
      color: #7a3342;
      border-color: #efb5c0;
      background: #fff0f3;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .shop-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 10px;
      align-items: center;
    }

    .shop-item.selected {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(77, 124, 199, .12);
    }

    .shop-item.locked {
      background: #f8fafc;
      filter: saturate(.82);
    }

    .shop-copy {
      display: grid;
      gap: 6px;
    }

    .shop-item strong {
      font-size: 15px;
    }

    .shop-item span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .shop-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .shop-actions button:nth-child(3) {
      grid-column: 1 / -1;
    }

    .mini-preview {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      border: 1px solid #d9e1ec;
      background: var(--item-color, #eff7f4);
      display: grid;
      place-items: center;
      font-size: 24px;
      box-shadow: inset 0 -10px 0 rgba(31,41,55,.05);
    }

    .history {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #eef1f5;
    }

    .weekly-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .bar-chart {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      align-items: end;
      gap: 7px;
      height: 142px;
      padding-top: 12px;
    }

    .bar {
      display: grid;
      align-items: end;
      gap: 6px;
      height: 100%;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
    }

    .bar-fill {
      min-height: 6px;
      border-radius: 7px 7px 3px 3px;
      background: linear-gradient(180deg, #e36b7f, #f0c55d);
      box-shadow: 0 8px 14px rgba(227, 107, 127, .18);
    }

    nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(430px, 100%);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      background: rgba(255, 253, 248, 0.96);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .tab {
      min-height: 66px;
      display: grid;
      place-items: center;
      gap: 2px;
      color: var(--muted);
      background: transparent;
      font-size: 11px;
      font-weight: 750;
    }

    .tab svg {
      width: 21px;
      height: 21px;
      stroke-width: 2.4;
    }

    .tab.active {
      color: var(--rose-dark);
    }

    .empty {
      border: 1px dashed #cfd7e3;
      border-radius: 8px;
      padding: 16px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,.42);
      backdrop-filter: blur(4px);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 78px;
      transform: translateX(-50%) translateY(16px);
      width: min(390px, calc(100% - 32px));
      background: #1f2937;
      color: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: 180ms ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 360px) {
      h1 { font-size: 21px; }
      .timer-time { font-size: 36px; }
      .shop-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }

    @media (min-width: 700px) {
      body {
        padding: 22px;
      }

      .app {
        width: min(100%, 1680px);
        max-width: 1680px;
        min-height: calc(100vh - 44px);
        grid-template-columns: 82px minmax(0, 1fr);
        grid-template-rows: auto 1fr;
        border: 1px solid rgba(216,222,232,.86);
        border-radius: 14px;
        overflow: hidden;
      }

      header {
        grid-column: 1 / -1;
        padding: 20px 28px 16px;
      }

      h1 {
        font-size: 30px;
      }

      .subtitle {
        font-size: 14px;
      }

      main {
        grid-column: 2;
        grid-row: 2;
        max-height: none;
        overflow: visible;
        padding: 22px 24px 24px;
      }

      nav {
        position: sticky;
        left: auto;
        bottom: auto;
        top: 0;
        transform: none;
        grid-column: 1;
        grid-row: 2;
        width: auto;
        height: 100%;
        align-self: stretch;
        grid-template-columns: 1fr;
        grid-auto-rows: 72px;
        align-content: start;
        border-top: 0;
        border-right: 1px solid var(--line);
        background: rgba(255,253,248,.9);
      }

      .tab {
        min-height: 72px;
        font-size: 11px;
      }

      .tab svg {
        width: 22px;
        height: 22px;
      }

      .view.active#home-view {
        display: grid;
        grid-template-columns: minmax(380px, 1fr) minmax(0, 2fr);
        grid-template-rows: auto 1fr;
        gap: 16px;
        align-items: start;
      }

      #home-view .stats {
        grid-column: 1;
        margin-bottom: 0;
      }

      #home-view > .panel:nth-of-type(2) {
        grid-column: 1;
        grid-row: 2;
        margin-bottom: 0;
      }

      #home-view > .panel:nth-of-type(3) {
        grid-column: 2;
        grid-row: 1 / span 2;
        margin-bottom: 0;
      }

      .plan-list,
      .day-timeline {
        min-height: clamp(700px, calc(100vh - 330px), 1060px);
      }

      .timeline-label,
      .timeline-line {
        min-height: clamp(38px, calc((100vh - 330px) / 18), 58px);
      }

      .plan-title {
        font-size: 12px;
      }

      .plan-meta {
        font-size: 10px;
      }

      .view.active#tasks-view {
        display: grid;
        grid-template-columns: minmax(280px, 330px) minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }

      #tasks-view .panel {
        margin-bottom: 0;
      }

      .view.active#timer-view {
        max-width: 720px;
        margin: 0 auto;
      }

      .timer-face {
        width: min(34vw, 310px);
      }

      .view.active#rewards-view {
        display: block;
      }

      .reward-panel.active[data-reward-panel="city"] .travel-map {
        grid-template-columns: minmax(0, 1.15fr) minmax(360px, .85fr);
        align-items: start;
      }

      .reward-panel.active[data-reward-panel="city"] .map-header {
        grid-column: 1 / -1;
      }

      .reward-panel.active[data-reward-panel="city"] #worldMap {
        min-height: 430px;
      }

      .reward-panel.active[data-reward-panel="city"] #selectedCard {
        min-width: 0;
      }

      .shop-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .view.active#pet-view {
        height: calc(100vh - 172px);
        min-height: 560px;
        overflow: hidden;
      }

      .view.active#pet-view .pet-stage {
        height: 100%;
        grid-template-columns: minmax(360px, .9fr) minmax(0, 1.1fr);
        align-items: stretch;
      }

      .view.active#pet-view .pet-room {
        min-height: 0;
        height: 100%;
      }

      .view.active#pet-view .passport {
        height: 100%;
        grid-template-rows: auto auto auto auto minmax(0, 1fr);
      }

      .view.active#pet-view .stamp-album {
        align-content: start;
      }

      .view.active#report-view {
        display: grid;
        grid-template-columns: minmax(280px, 330px) minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }

      #report-view .weekly-grid {
        grid-column: 1;
        grid-template-columns: 1fr;
      }

      #report-view .panel {
        margin-bottom: 0;
      }

      .toast {
        bottom: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-row">
        <div>
          <h1>TimeNest</h1>
          <p class="subtitle">把完成的事情，换成看得见的小奖励。</p>
        </div>
        <div class="coin-pill" aria-live="polite"><span id="coins">0</span> 金币</div>
      </div>
    </header>

    <main>
      <section class="view active" id="home-view">
        <div class="stats">
          <div class="stat">
            <strong id="todayDone">0</strong>
            <span>今日完成</span>
          </div>
          <div class="stat">
            <strong id="focusMinutes">0</strong>
            <span>专注分钟</span>
          </div>
        </div>

        <div class="panel">
          <h2>今日任务</h2>
          <div class="task-list" id="homeTasks"></div>
        </div>

        <div class="panel">
          <h2>今日时间规划</h2>
          <div class="schedule-form">
            <input id="planTitle" type="text" maxlength="40" placeholder="例如：写论文 / 健身 / 做饭">
            <input id="planStart" type="time" value="09:00" aria-label="开始时间">
            <input id="planEnd" type="time" value="10:00" aria-label="结束时间">
            <div class="edit-note" id="planEditNote"></div>
            <button class="primary" id="addPlan">加入计划</button>
            <button class="secondary" id="addTimeLog">加入记录</button>
          </div>
          <div class="compare-strip">
            <div class="compare-row">
              <span>计划</span>
              <div class="meter"><div class="meter-fill" id="plannedMeter"></div></div>
              <strong id="plannedMinutes">0分</strong>
            </div>
            <div class="compare-row">
              <span>记录</span>
              <div class="meter"><div class="meter-fill" id="actualMeter"></div></div>
              <strong id="actualMinutes">0分</strong>
            </div>
          </div>
          <div class="plan-list" id="planList"></div>
        </div>

      </section>

      <section class="view" id="tasks-view">
        <div class="panel">
          <h2>添加任务</h2>
          <div class="form-row">
            <input id="taskInput" maxlength="40" placeholder="例如：背单词 30 分钟">
            <button class="primary" id="addTask">添加</button>
          </div>
          <select id="taskReward">
            <option value="10">轻量任务 +10 金币</option>
            <option value="20">普通任务 +20 金币</option>
            <option value="35">困难任务 +35 金币</option>
          </select>
        </div>
        <div class="panel">
          <h2>清单</h2>
          <div class="task-list" id="allTasks"></div>
        </div>
      </section>

      <section class="view" id="timer-view">
        <div class="panel">
          <h2>专注计时</h2>
          <div class="mode-switch" aria-label="计时模式">
            <button class="mode-button active" data-timer-mode="countdown">倒计时</button>
            <button class="mode-button" data-timer-mode="stopwatch">正计时</button>
          </div>
          <div class="timer-config">
            <input id="timerTaskTitle" type="text" maxlength="40" placeholder="本次计时任务名，例如：写论文">
            <input id="timerMinutes" type="number" min="1" max="600" value="25" aria-label="倒计时分钟">
            <input value="每分钟 +1 金币" readonly aria-label="奖励规则">
          </div>
          <div class="timer-face" id="timerFace" style="--progress: 0deg">
            <div class="timer-time" id="timerTime">25:00</div>
          </div>
          <div class="timer-actions">
            <button class="primary" id="timerStart">开始</button>
            <button class="secondary" id="timerFinish">结算</button>
          </div>
        </div>
      </section>

      <section class="view" id="rewards-view">
        <div class="reward-sections" id="rewardSections" aria-label="旅行奖励分区">
          <button class="reward-section-tab active" data-reward-section="city" type="button">当前城市</button>
          <button class="reward-section-tab" data-reward-section="route" type="button">环球路线</button>

    function cityCardId(cityId) {
      return cityId === "tuebingen" ? "tuebingen-card"
        : cityId === "stuttgart" ? "stuttgart-card"
        : cityId === "shanghai" ? "shanghai-card"
        : `${cityId}-card`;
    }

    function journeyStamp(city, index = 0) {
      return `${city.id.slice(0, 3).toUpperCase()}${index || ""}`.slice(0, 6);
    }

    function routeCardAsset(city) {
      if (city.id === "shanghai") return "assets/visual/generated/card-shanghai-handdrawn.png";
      if (city.id === "tuebingen" || city.country === "德国" || city.chapter.includes("北方")) return "assets/visual/generated/card-tuebingen-handdrawn.png";
      return "assets/visual/card-pig-passport.svg";
    }

    const journeyGeneratedItems = journeyCities.flatMap((city, index) => {
      const previous = journeyCities[index - 1];
      const cityItem = {
        id: cityCardId(city.id),
        category: "city",
        name: `${city.name}城市卡`,
        price: index === 0 ? 0 : 180 + Math.min(720, index * 18),
        desc: `环球主线第 ${index + 1} 站：${city.country} · ${city.chapter}。完成本城任意 3 个游览章后才能前往下一站。`,
        icon: journeyStamp(city),
        color: index % 3 === 0 ? "#eff7f4" : index % 3 === 1 ? "#eef2ff" : "#fff7e8",
        region: city.country,
        mapScope: "world",
        stamp: journeyStamp(city),
        x: city.x,
        y: city.y,
        rarity: index === 0 ? "base" : index > 70 ? "epic" : index > 15 ? "rare" : "common",
        border: index % 4 === 0 ? "green" : index % 4 === 1 ? "blue" : index % 4 === 2 ? "gold" : "rose",
        art: city.id === "shanghai" ? "shanghai" : "tuebingen",
        cardAsset: routeCardAsset(city),
        cardLine: `${city.chapter}：${city.visits.join(" / ")}。`,
        routeCityId: city.id,
        routeIndex: index,
        routePreviousCity: previous?.id || null
      };
      const visitItems = city.visits.map((visit, visitIndex) => ({
        id: `${city.id}-visit-${visitIndex + 1}`,
        category: visitIndex === 2 ? "wish" : "sight",
        name: `${city.name} · ${visit}`,
        price: 60 + visitIndex * 25 + Math.min(120, index * 2),
        desc: `完成一段真实学习或计划后，给小猪护照盖下 ${city.name} 的「${visit}」章。`,
        icon: visitIndex === 0 ? "VIEW" : visitIndex === 1 ? "MUSE" : "WISH",
        color: visitIndex === 0 ? "#e9fbf8" : visitIndex === 1 ? "#f0f7ff" : "#fff2e8",
        region: city.name,
        mapScope: "world",
        stamp: journeyStamp(city, visitIndex + 1),
        x: Math.min(92, city.x + (visitIndex - 1) * 1.2),
        y: Math.min(92, city.y + 2 + visitIndex * 1.2),
        rarity: visitIndex === 2 ? "wish" : "common",
        requires: cityCardId(city.id),
        cityId: city.id,
        routeIndex: index,
        border: visitIndex === 0 ? "green" : visitIndex === 1 ? "blue" : "rose",
        art: city.id === "shanghai" ? "shanghai" : "tuebingen",
        cardAsset: routeCardAsset(city),
        cardLine: `${city.name}游览章：${visit}。`
      }));
      return [cityItem, ...visitItems];
    });

    journeyGeneratedItems.forEach(item => {
      const existing = shopItems.find(reward => reward.id === item.id);
      if (existing) Object.assign(existing, item, { ...existing, routeCityId: item.routeCityId, routeIndex: item.routeIndex, routePreviousCity: item.routePreviousCity, cityId: existing.cityId || item.cityId });
      else shopItems.push(item);
    });

    Object.assign(shopItems.find(item => item.id === "regional-ticket") || {}, { cityId: "tuebingen" });
    Object.assign(shopItems.find(item => item.id === "neckar-punt") || {}, { cityId: "tuebingen" });
    Object.assign(shopItems.find(item => item.id === "shanghai-flight") || {}, { cityId: "shanghai" });
    Object.assign(shopItems.find(item => item.id === "bund-walk") || {}, { cityId: "shanghai" });
    Object.assign(shopItems.find(item => item.id === "wukang-coffee") || {}, { cityId: "shanghai" });

    let activeCategory = "city";
    let activeStampCategory = "city";
    let activeRewardSection = "city";
    let selectedRewardId = "tuebingen-card";
    let mapMode = "world";
    let timerMode = "countdown";
    let editingPlanId = null;
    let editingTimeLogId = null;
    let editingTaskId = null;
    let planningTaskId = null;

    let state = loadState();
    let timer = {
      total: Math.max(1, Number(document.querySelector("#timerMinutes").value) || 25) * 60,
      left: Math.max(1, Number(document.querySelector("#timerMinutes").value) || 25) * 60,
      elapsed: 0,
      startedAt: null,
      interval: null
    };

    function makeId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function loadState() {
      const saved = localStorage.getItem("TimeNestState") || localStorage.getItem("timeNestState");
      if (!saved) return structuredClone(defaultState);
      const parsed = JSON.parse(saved);
      parsed.ownedRewards ??= Array.isArray(parsed.ownedRewards) ? parsed.ownedRewards : [];
      if (!parsed.ownedRewards.includes("tuebingen-card")) parsed.ownedRewards.unshift("tuebingen-card");
      parsed.pet ??= { food: 70, mood: 72, energy: 68 };
      parsed.pet.food ??= 70;
      parsed.pet.mood ??= 72;
      parsed.pet.energy ??= 68;
      parsed.travel ??= { currentCityId: "tuebingen", arrivedCities: ["tuebingen"], tickets: [] };
      parsed.travel.currentCityId ??= "tuebingen";
      parsed.travel.arrivedCities = Array.isArray(parsed.travel.arrivedCities) ? parsed.travel.arrivedCities : ["tuebingen"];
      if (!parsed.travel.arrivedCities.includes("tuebingen")) parsed.travel.arrivedCities.unshift("tuebingen");
      if (!parsed.travel.arrivedCities.includes(parsed.travel.currentCityId)) parsed.travel.arrivedCities.push(parsed.travel.currentCityId);
      parsed.travel.tickets = Array.isArray(parsed.travel.tickets) ? parsed.travel.tickets : [];
      parsed.funds ??= {};
      parsed.wishlist ??= [];
      parsed.records ??= [];
      parsed.tasks = Array.isArray(parsed.tasks) ? parsed.tasks : [];
      if (parsed.tasks.length === 2
        && parsed.tasks.some(task => task.name === "整理今天最重要的 3 件事" && task.reward === 10)
        && parsed.tasks.some(task => task.name === "专注学习 25 分钟" && task.reward === 25)) {
        parsed.tasks = [];
      }
      parsed.plans ??= [];
      parsed.timeLogs = Array.isArray(parsed.timeLogs) ? parsed.timeLogs : [];
      parsed.plans = parsed.plans.map(plan => ({ ...plan, taskId: plan.taskId || null }));
      parsed.history = (parsed.history || []).map(item => ({ ...item, date: item.date || todayKey }));
      if (parsed.date !== todayKey) {
        parsed.date = todayKey;
        parsed.todayDone = 0;
        parsed.focusMinutes = 0;
        parsed.tasks = parsed.tasks.map(task => ({ ...task, done: false }));
        parsed.plans = [];
        parsed.timeLogs = [];
      }
      return parsed;
    }

    function saveState() {
      localStorage.setItem("TimeNestState", JSON.stringify(state));
    }

    function addCoins(amount, label, record = {}) {
      state.coins += amount;
      const entry = {
        text: label,
        amount,
        date: todayKey,
        time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
      };
      state.history.unshift(entry);
      state.history = state.history.slice(0, 8);
      state.records.push({ kind: "earn", label, coins: amount, minutes: 0, date: todayKey, ts: Date.now(), ...record });
      state.records = state.records.slice(-500);
      saveState();
      render();
      showToast(`${label}，获得 ${amount} 金币`);
    }

    function spendCoins(amount, label) {
      state.coins -= amount;
      state.history.unshift({
        text: label,
        amount: -amount,
        date: todayKey,
        time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
      });
      state.history = state.history.slice(0, 8);
      state.records.push({ kind: "spend", label, coins: -amount, minutes: 0, date: todayKey, ts: Date.now() });
      state.records = state.records.slice(-500);
      saveState();
      render();
    }

    function render() {
      ensureTravelState();
      document.querySelector("#coins").textContent = state.coins;
      document.querySelector("#todayDone").textContent = state.todayDone;
      document.querySelector("#focusMinutes").textContent = state.focusMinutes;
      renderTaskCards("#homeTasks", state.tasks.slice(0, 4));
      renderTaskCards("#allTasks", state.tasks);
      renderPlans();
      renderWeeklyReport();
      renderRewardSections();
      renderShop();
      renderTravelMap();
      renderPet();
    }

    function renderRewardSections() {
      document.querySelectorAll("[data-reward-section]").forEach(button => {
        button.classList.toggle("active", button.dataset.rewardSection === activeRewardSection);
        button.onclick = () => {
          activeRewardSection = button.dataset.rewardSection;
          if (activeRewardSection === "city") mapMode = "world";
          render();
        };
      });
      document.querySelectorAll("[data-reward-panel]").forEach(panel => {
        panel.classList.toggle("active", panel.dataset.rewardPanel === activeRewardSection);
      });
    }

    function renderTasks(selector, tasks) {
      const root = document.querySelector(selector);
      root.innerHTML = "";
      if (!tasks.length) {
        root.innerHTML = `<div class="empty">这里暂时很清爽，给今天加一个小目标吧。</div>`;
        return;
      }
      tasks.forEach(task => {
        const row = document.createElement("div");
        row.className = `task${task.done ? " done" : ""}${editingTaskId === task.id ? " editing" : ""}`;
        if (editingTaskId === task.id) {
          row.innerHTML = `
            <div class="task-edit-grid">
              <input data-field="name" maxlength="40" aria-label="任务名称">
              <select data-field="reward" aria-label="任务金币">
                <option value="5">+5</option>
                <option value="10">+10</option>
                <option value="25">+25</option>
                <option value="50">+50</option>
              </select>
            </div>
            <div class="task-edit-actions">
              <button class="primary" data-action="save">保存</button>
              <button class="secondary" data-action="cancel">取消</button>
            </div>
          `;
          row.querySelector('[data-field="name"]').value = task.name;
          row.querySelector('[data-field="reward"]').value = String(task.reward);
          row.querySelector('[data-action="save"]').addEventListener("click", () => saveTaskEdit(task.id, row));
          row.querySelector('[data-action="cancel"]').addEventListener("click", cancelTaskEdit);

    function minutesBetween(start, end) {
      const [startHour, startMinute] = start.split(":").map(Number);
      const [endHour, endMinute] = end.split(":").map(Number);
      let startTotal = startHour * 60 + startMinute;
      let endTotal = endHour * 60 + endMinute;
      if (endTotal <= startTotal) endTotal += 24 * 60;
      return endTotal - startTotal;
    }

    function timeToMinutes(time) {
      const [hour, minute] = time.split(":").map(Number);
      return hour * 60 + minute;
    }

    function formatMinutes(minutes) {
      if (minutes < 60) return `${minutes}分`;
      const hours = Math.floor(minutes / 60);
      const rest = minutes % 60;
      return rest ? `${hours}小时${rest}分` : `${hours}小时`;
    }

    function renderPlans() {
      const root = document.querySelector("#planList");
      const planned = state.plans.reduce((sum, plan) => sum + plan.minutes, 0);
      const actual = state.timeLogs.reduce((sum, log) => sum + log.minutes, 0);
      const max = Math.max(planned, actual, 1);
      document.querySelector("#plannedMinutes").textContent = formatMinutes(planned);
      document.querySelector("#actualMinutes").textContent = formatMinutes(actual);
      document.querySelector("#plannedMeter").style.width = `${planned / max * 100}%`;
      document.querySelector("#actualMeter").style.width = `${actual / max * 100}%`;
      root.innerHTML = "";

      const timelineStart = 6 * 60;
      const timelineEnd = 24 * 60;
      const timelineMinutes = timelineEnd - timelineStart;
      const now = new Date();
      const nowMinutes = now.getHours() * 60 + now.getMinutes();
      const showNow = nowMinutes >= timelineStart && nowMinutes <= timelineEnd;
      const nowTop = (nowMinutes - timelineStart) / timelineMinutes * 100;

      root.innerHTML = `
        <div class="day-timeline">
          ${Array.from({ length: 18 }, (_, index) => {
            const hour = index + 6;
            return `
              <div class="timeline-hour">
                <div class="timeline-label">${String(hour).padStart(2, "0")}:00</div>
                <div class="timeline-line"></div>
              </div>
            `;
          }).join("")}
          <div class="timeline-column-labels"><span>计划</span><span>记录</span></div>
          <div class="timeline-events plan-events"></div>
          <div class="timeline-events record-events"></div>
          ${showNow ? `<div class="now-line" style="--top:${nowTop}%"><span>现在 ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}</span></div>` : ""}
          ${state.plans.length || state.timeLogs.length ? "" : `<div class="timeline-empty">先把任务安排进时间轴，今天会更像一张真正的日程表。</div>`}
        </div>
      `;

      const planLayer = root.querySelector(".plan-events");
      const recordLayer = root.querySelector(".record-events");
      const placeBlock = (item, layer, type, className, statusText) => {
        const start = timeToMinutes(item.start);
        const end = start + item.minutes;
        const visibleStart = Math.max(start, timelineStart);
        const visibleEnd = Math.min(end, timelineEnd);
        if (visibleEnd <= timelineStart || visibleStart >= timelineEnd) return;
        const top = (visibleStart - timelineStart) / timelineMinutes * 100;
        const visibleMinutes = Math.max(15, visibleEnd - visibleStart);
        const minHeight = 32 / 810 * 100;
        const height = Math.min(100 - top, Math.max(minHeight, visibleMinutes / timelineMinutes * 100));
        const row = document.createElement("div");
        row.className = className;
        row.style.setProperty("--top", `${top}%`);
        row.style.setProperty("--height", `${height}%`);
        row.innerHTML = `
          <div>
            <div class="plan-title"></div>
            <div class="plan-meta">
              <span>${item.start}-${item.end}</span>
              <span>${formatMinutes(item.minutes)}</span>
              <span>${statusText}</span>
            </div>
          </div>
        `;
        row.querySelector(".plan-title").textContent = item.title;
        row.addEventListener("click", event => openTimelineMenu(event, type, item.id));
        layer.appendChild(row);
      };

      [...state.plans]
        .sort((a, b) => a.start.localeCompare(b.start))
        .forEach(plan => placeBlock(plan, planLayer, "plan", `plan-item${plan.done ? " done" : ""}`, plan.done ? "已完成" : "计划中"));

      [...state.timeLogs]
        .sort((a, b) => a.start.localeCompare(b.start))
        .forEach(log => placeBlock(log, recordLayer, "log", "plan-item record-item", "记录"));
    }

    function renderWeeklyReport() {
      const days = lastSevenDays();
      const byDay = Object.fromEntries(days.map(day => [day.key, day]));
      state.records.forEach(record => {
        if (!byDay[record.date]) return;
        if (record.kind === "focus") byDay[record.date].minutes += record.minutes || 0;
        if ((record.coins || 0) > 0) byDay[record.date].coins += record.coins;
        if (record.kind === "task") byDay[record.date].tasks += 1;
        if (record.kind === "plan") byDay[record.date].plans += record.minutes || 0;
      });

      const weekMinutes = days.reduce((sum, day) => sum + day.minutes, 0);
      const weekCoins = days.reduce((sum, day) => sum + day.coins, 0);
      const weekTasks = days.reduce((sum, day) => sum + day.tasks, 0);
      const weekPlanMinutes = days.reduce((sum, day) => sum + day.plans, 0);
      const bestDay = [...days].sort((a, b) => b.minutes - a.minutes)[0];
      document.querySelector("#weekMinutes").textContent = weekMinutes;
      document.querySelector("#weekCoins").textContent = weekCoins;

      const maxMinutes = Math.max(1, ...days.map(day => day.minutes));
      const bars = document.querySelector("#weeklyBars");
      bars.innerHTML = "";
      days.forEach(day => {
        const bar = document.createElement("div");
        bar.className = "bar";
        bar.innerHTML = `
          <div class="bar-fill" style="height:${Math.max(6, day.minutes / maxMinutes * 105)}px"></div>
          <span>${day.label}</span>
        `;
        bars.appendChild(bar);
      });

      const summary = document.querySelector("#weeklySummary");
      summary.innerHTML = `
        <div class="history-item"><span>本周完成任务</span><strong>${weekTasks} 个</strong></div>
        <div class="history-item"><span>计划实际完成</span><strong>${formatMinutes(weekPlanMinutes)}</strong></div>
        <div class="history-item"><span>最佳专注日</span><strong>${bestDay.minutes ? `${bestDay.label} ${bestDay.minutes} 分` : "暂无"}</strong></div>
        <div class="history-item"><span>按 1 金币/分钟，本月理论上限约</span><strong>10000</strong></div>

    function ensureTravelState() {
      state.travel ??= { currentCityId: "tuebingen", arrivedCities: ["tuebingen"], tickets: [] };
      state.travel.currentCityId ??= "tuebingen";
      state.travel.arrivedCities = Array.isArray(state.travel.arrivedCities) ? state.travel.arrivedCities : ["tuebingen"];
      state.travel.tickets = Array.isArray(state.travel.tickets) ? state.travel.tickets : [];
      if (!state.travel.arrivedCities.includes("tuebingen")) state.travel.arrivedCities.unshift("tuebingen");
      if (!state.travel.arrivedCities.includes(state.travel.currentCityId)) state.travel.arrivedCities.push(state.travel.currentCityId);
      const currentCard = cityCardId(state.travel.currentCityId);
      if (!state.ownedRewards.includes(currentCard)) state.ownedRewards.push(currentCard);
    }

    function currentJourneyIndex() {
      ensureTravelState();
      const index = journeyCities.findIndex(city => city.id === state.travel.currentCityId);
      return index === -1 ? journeyCities.length - 1 : index;
    }

    function nextJourneyCity() {
      return journeyCities[currentJourneyIndex() + 1] || null;
    }

    function travelTicketId(fromCityId, toCityId) {
      return `ticket-${fromCityId}-to-${toCityId}`;
    }

    function travelTicketType(fromCity, toCity) {
      const span = Math.abs(toCity.x - fromCity.x) + Math.abs(toCity.y - fromCity.y);
      if (fromCity.country === toCity.country) return "城际火车票";
      if (fromCity.chapter === toCity.chapter) return "跨境火车票";
      return span > 26 ? "长途机票" : "跨区交通票";
    }

    function travelTicketPrice(fromCity, toCity) {
      const span = Math.abs(toCity.x - fromCity.x) + Math.abs(toCity.y - fromCity.y);
      if (fromCity.country === toCity.country) return 90;
      if (fromCity.chapter === toCity.chapter) return 160;
      if (span > 32) return 760;
      if (span > 22) return 480;
      return 260;
    }

    function currentTravelTicket() {
      const from = journeyCities[currentJourneyIndex()];
      const to = nextJourneyCity();
      if (!from || !to) return null;
      return {
        id: travelTicketId(from.id, to.id),
        from,
        to,
        type: travelTicketType(from, to),
        price: travelTicketPrice(from, to)
      };
    }

    function isUnlocked(item) {
      ensureTravelState();
      if (item.routeCityId && item.category === "city") {
        return state.travel.arrivedCities.includes(item.routeCityId) || item.routeCityId === state.travel.currentCityId;
      }
      if (item.cityId && item.category !== "city" && item.cityId !== state.travel.currentCityId) return false;
      if (item.cityId && item.category !== "city" && !state.ownedRewards.includes(cityCardId(item.cityId))) return false;
      return !item.requires || state.ownedRewards.includes(item.requires);
    }

    function unlockHint(item) {
      ensureTravelState();
      if (item.routeCityId && item.category === "city" && !state.travel.arrivedCities.includes(item.routeCityId)) {
        const current = journeyCities[currentJourneyIndex()];
        return current ? `先从「${current.name}」买票出发` : "先抵达这座城市";
      }
      if (item.cityId && item.category !== "city" && item.cityId !== state.travel.currentCityId) {
        const city = journeyCityById(item.cityId);
        return city ? `抵达「${city.name}」后开放` : "抵达对应城市后开放";
      }
      if (item.cityId && item.category !== "city" && !state.ownedRewards.includes(cityCardId(item.cityId))) {
        const city = journeyCityById(item.cityId);
        return city ? `先解锁「${city.name}城市卡」` : "先解锁城市卡";
      }
      const parent = shopItems.find(reward => reward.id === item.requires);
      return parent ? `先解锁「${parent.name}」` : "暂未解锁";
    }

    function journeyChapters() {
      return [...new Set(journeyCities.map(city => city.chapter))].map((name, index) => {
        const cities = journeyCities.filter(city => city.chapter === name);
        const done = cities.filter(city => state.travel.arrivedCities.includes(city.id)).length;
        const currentIndex = currentJourneyIndex();
        const currentCity = journeyCities[currentIndex];
        const firstRouteIndex = journeyCities.findIndex(city => city.id === cities[0].id);
        const lastRouteIndex = journeyCities.findIndex(city => city.id === cities[cities.length - 1].id);
        return {
          name,
          index,
          cities,
          done,
          firstRouteIndex,
          lastRouteIndex,
          active: cities.some(city => city.id === currentCity.id),
          unlocked: firstRouteIndex <= currentIndex || state.travel.arrivedCities.includes(cities[0].id),
          completed: done === cities.length
        };
      });
    }

          nuremberg: { x: 60, y: 65 },
          munich: { x: 64, y: 86 },
          fussen: { x: 58, y: 94 }
        }
      };
      if (custom[chapter.name]?.[city.id]) return custom[chapter.name][city.id];
      const index = chapter.cities.findIndex(item => item.id === city.id);
      const count = Math.max(1, chapter.cities.length - 1);
      const x = chapter.cities.length === 1 ? 50 : 12 + (index / count) * 76;
      const wave = index % 4;
      const y = [54, 38, 58, 44][wave] || 50;
      return { x, y };
    }

    function chapterSegmentStyle(from, to) {
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const width = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      return `--x:${from.x}%; --y:${from.y}%; --w:${width}%; --angle:${angle}deg`;
    }

    function chapterMapSlug(chapter) {
      if (chapter?.name === "德国起点") return "germany";
      return "default";
    }

      if (chapter?.name !== "德国起点") return "";
      return `
        <img class="chapter-map-image" src="assets/visual/generated/map-germany-route-handdrawn.png" alt="" aria-hidden="true">
      `;
    }

      root.innerHTML = `
        <div class="journey-head">

        <div class="journey-copy">当前章节：${activeChapter?.name || current.chapter} · ${activeChapter?.done || 0}/${activeChapter?.cities.length || 1} 城完成</div>
        <div class="journey-chapters" aria-label="环球旅行章节">
          ${chapters.map(chapter => `
            <button class="journey-chapter${chapter.active ? " active" : ""}${chapter.completed ? " done" : ""}${chapter.unlocked ? "" : " locked"}" data-chapter-index="${chapter.index}" type="button">
              <strong>${chapter.index + 1}. ${chapter.name}</strong>
              <span>${chapter.unlocked ? `${chapter.done}/${chapter.cities.length} 城 · ${chapter.completed ? "章节完成" : chapter.active ? "进行中" : "已开放"}` : "未解锁"}</span>

        </div>
        <div class="route-overview">
          <div class="route-overview-title">
            <strong>章节目录与完整路线</strong>

          </div>
          <div class="route-chapter-list" aria-label="完整环球路线目录">
            ${chapters.map(chapter => `

                <div class="route-chapter-head">
                  <strong>${chapter.index + 1}. ${chapter.name}</strong>
                  <span>${chapter.done}/${chapter.cities.length} 城</span>
                </div>
                <div class="route-city-chain">
                  ${chapter.cities.map((city, cityIndex) => `
                    ${cityIndex ? `<span class="route-arrow">→</span>` : ""}
                    <button class="route-city-node${state.travel.arrivedCities.includes(city.id) ? " done" : ""}${city.id === current.id ? " current" : ""}${chapter.unlocked ? "" : " locked"}" data-route-city="${city.id}" type="button">
                      ${city.name}
                    </button>
                  `).join("")}
                </div>
              </div>
            `).join("")}
          </div>
        </div>
        <div class="journey-city-strip">
          ${nearby.map(city => `

    function renderTravelMap() {
      document.querySelector("#travelBudget").textContent = `${state.coins} 金币`;
      document.querySelector("#cityCount").textContent = ownedRewardsBy("city").length;
      document.querySelector("#ticketCount").textContent = ownedRewardsBy("ticket").length + state.travel.tickets.length;
      document.querySelector("#wishCount").textContent = ownedRewardsBy("wish").length;
      renderJourneyPanel();

      const currentIndex = currentJourneyIndex();
      const currentCity = journeyCities[currentIndex];
      const previousCity = journeyCities[currentIndex - 1];
      const nextCity = journeyCities[currentIndex + 1];
      const chapter = currentChapter();
      const visualMode = mapMode === "world" ? "chapter" : mapMode;
      const map = document.querySelector("#worldMap");
      const wasZooming = map.classList.contains("map-zooming");
      const chapterClass = visualMode === "chapter" ? ` map-chapter-${chapterMapSlug(chapter)}` : "";
      map.className = `world-map map-${visualMode}${chapterClass}${wasZooming ? " map-zooming" : ""}`;
      map.innerHTML = visualMode === "chapter" ? chapterMapArtwork(chapter) : mapArtwork(mapMode);
      const trail = document.createElement("div");
      trail.className = `map-trail${mapMode === "world" ? "" : " in-region"}`;
      const layerText = layerTextFor(visualMode);
      trail.innerHTML = layerText.map((label, index) => `<span class="${index === layerText.length - 1 ? "active" : ""}">${label}</span>`).join("");
      map.appendChild(trail);
      if (mapMode === "world") {
        if (chapter) {
          const badge = document.createElement("div");
          badge.className = "chapter-badge";
          badge.innerHTML = `<strong>${chapter.index + 1}. ${chapter.name}</strong><span>${chapter.done}/${chapter.cities.length} 城已抵达 · ${chapter.completed ? "章节完成" : "当前章节进行中"}</span>`;
          map.appendChild(badge);
          chapter.cities.slice(0, -1).forEach((city, index) => {
            const next = chapter.cities[index + 1];
            const from = chapterCityPosition(chapter, city);
            const to = chapterCityPosition(chapter, next);
            const segment = document.createElement("div");
            const done = state.travel.arrivedCities.includes(city.id) && state.travel.arrivedCities.includes(next.id);
            const upcoming = city.id === currentCity.id && next.id === nextCity?.id;
            segment.className = [
              "chapter-segment",
              done ? "done" : "",
              upcoming ? "next" : "",
              !done && !upcoming ? "locked" : ""
            ].filter(Boolean).join(" ");
            segment.setAttribute("style", chapterSegmentStyle(from, to));
            map.appendChild(segment);
          });
        }
        const routePins = chapter ? chapter.cities : [previousCity, currentCity, nextCity];
        routePins
          .filter(Boolean)
          .filter((city, index, cities) => cities.findIndex(item => item.id === city.id) === index)
          .forEach(city => {
          const item = journeyCityCard(city.id);
          if (!item) return;
          const position = chapter ? chapterCityPosition(chapter, city) : { x: city.x, y: city.y };
          const pin = document.createElement("button");
          pin.className = [
            "map-pin",
            city.id === currentCity.id ? "" : "compact",
            state.travel.arrivedCities.includes(city.id) ? "owned" : "",
            state.travel.arrivedCities.includes(city.id) && city.id !== currentCity.id ? "completed-city" : "",
            city.id === currentCity.id ? "active" : "",
            city.id === nextCity?.id ? "next-stop" : "",
            !isUnlocked(item) ? "locked" : ""
          ].filter(Boolean).join(" ");
          pin.style.setProperty("--x", `${position.x}%`);
          pin.style.setProperty("--y", `${position.y}%`);
          const nodeMark = state.travel.arrivedCities.includes(city.id) && city.id !== currentCity.id ? "✓" : city.id === currentCity.id ? "●" : city.id === nextCity?.id ? "→" : "□";
          pin.innerHTML = `<span class="node-mark">${nodeMark}</span><span class="node-name">${city.name}</span>`;
          pin.title = isUnlocked(item) ? `${city.chapter} · ${cityProgress(city.id)}/3` : unlockHint(item);
          pin.addEventListener("click", () => openJourneyCity(city));
          map.appendChild(pin);
        });
        const caption = document.createElement("div");
        caption.className = "map-caption";
        caption.textContent = nextCity
          ? `${chapter?.name || currentCity.chapter} · 盖满 3 章并买票前往 ${nextCity.name}`
          : "环球路线收官";
        map.appendChild(caption);
        renderCurrentRouteCard();
        return;
      }

      const back = document.createElement("button");
      back.className = "map-back";
      back.textContent = mapMode === "tuebingen-city" ? "< 德国路线" : mapMode.includes("-city") ? "< 区域" : "< 世界";
      back.addEventListener("click", () => zoomMap(parentMapMode(mapMode)));
      map.appendChild(back);

      const cityTaskItems = mapMode.includes("-city") ? currentCityMapItems() : null;
      const mapItems = cityTaskItems || shopItems.filter(item => item.mapScope === mapMode && item.x && item.y);
      mapItems.forEach((item, index) => {
        const locked = !isUnlocked(item);
        const pin = document.createElement("button");
        const active = selectedRewardId === item.id;
        const position = cityTaskItems ? cityTaskPosition(item, index) : item;
        pin.className = [
          "map-pin",
          cityTaskItems ? "task-bubble" : "",
          isOwned(item) ? "owned" : "",
          locked ? "locked" : "",
          active ? "active" : ""
        ].filter(Boolean).join(" ");
        pin.style.setProperty("--x", `${position.x}%`);
        pin.style.setProperty("--y", `${position.y}%`);
        pin.dataset.rewardId = item.id;
        pin.dataset.short = taskShortMark(item);
        pin.textContent = cityTaskItems ? "" : item.name.replace("城市卡", "").replace("徽章", "").replace("基金", "").replace("体验", "");
        pin.title = locked ? unlockHint(item) : `${item.name}\n${item.cardLine || item.desc}`;
        pin.addEventListener("click", () => {
          selectReward(item.id, { stayOnMap: Boolean(cityTaskItems || item.zoomTo) });
          if (!cityTaskItems && item.zoomTo) zoomMap(item.zoomTo);
        });
        map.appendChild(pin);
      });
      const caption = document.createElement("div");
      caption.className = "map-caption";
      caption.textContent = captionFor(mapMode);
      if (!mapMode.includes("-city")) map.appendChild(caption);

      if (mapMode.includes("-city")) renderCurrentCityCard();
      else renderSelectedCard();
    }

    function renderPassport() {
      const latest = [...state.ownedRewards].reverse()
        .map(id => shopItems.find(item => item.id === id))
        .find(Boolean);
      const currentIndex = currentJourneyIndex();
      const current = journeyCities[currentIndex];
      const next = journeyCities[currentIndex + 1];
      const currentProgress = cityProgress(current.id);
      document.querySelector("#pigStatus").textContent = latest
        ? `小猪最近收下：${latest.name}`
        : "小猪正在等第一张票";
      document.querySelector("#pigTravelTitle").textContent = `小猪正在 ${current.name}`;
      document.querySelector("#pigTravelNote").textContent = next
        ? `本城已盖 ${currentProgress}/3 章。盖满后购买交通票，和小猪一起前往 ${next.name}。`
        : "环球路线已经回到图宾根，小猪正在整理毕业纪念章。";
      document.querySelector("#pigLastStamp").textContent = latest ? `最近：${latest.stamp}` : "最近：空白";
      document.querySelector("#pigNextStop").textContent = next ? `下一站：${next.name}` : "下一站：回家";

      const tabRoot = document.querySelector("#stampTabs");
      tabRoot.innerHTML = "";
      [
        { id: "city", name: "城市" },
        { id: "sight", name: "景点" },
        { id: "wish", name: "愿望" }
      ].forEach(tabInfo => {
        const tab = document.createElement("button");
        tab.className = `stamp-tab${activeStampCategory === tabInfo.id ? " active" : ""}`;
        tab.textContent = tabInfo.name;
        tab.addEventListener("click", () => {
          activeStampCategory = tabInfo.id;
          renderPassport();
        });
        tabRoot.appendChild(tab);
      });

      const stamps = shopItems.filter(item => activeStampCategory === "city"
        ? item.category === "city" || item.category === "ticket"
        : item.category === activeStampCategory
      ).sort((a, b) => (a.routeIndex ?? 999) - (b.routeIndex ?? 999) || a.name.localeCompare(b.name, "zh-CN"));
      const visibleStamps = [...stamps].sort((a, b) => {
        const rank = item => isOwned(item) ? 0 : isUnlocked(item) ? 1 : 2;
        return rank(a) - rank(b) || ((a.routeIndex ?? 999) - (b.routeIndex ?? 999)) || a.name.localeCompare(b.name, "zh-CN");
      }).slice(0, 6);
      const colors = ["#178f72", "#2563eb", "#e0523f", "#1f2937", "#7c3aed", "#d24777", "#0f766e", "#b45309"];
      const album = document.querySelector("#stampAlbum");
      album.innerHTML = "";
      album.dataset.note = stamps.length > visibleStamps.length
        ? `\u8fd8\u6709 ${stamps.length - visibleStamps.length} \u679a\u7ae0\u6536\u5728\u62a4\u7167\u540e\u9875`
        : "";
      visibleStamps.forEach((item, index) => {
        const owned = isOwned(item);
        const unlocked = isUnlocked(item);
        const card = document.createElement("div");
        card.className = `stamp-card${owned ? "" : " locked-stamp"}`;
        card.style.setProperty("--stamp-color", colors[index % colors.length]);
        card.dataset.status = owned ? "STAMPED" : unlocked ? "EMPTY" : "LOCKED";
        card.innerHTML = `
          <div class="stamp-visual">${owned ? (item.stamp || item.icon) : "..."}</div>
          <div class="stamp-info">
            <strong>${item.name}</strong>
            <span>${item.region || "TimeNest"}</span>
            <span>OFFICIAL<br>VISIT PASS</span>
            <div class="stamp-date">${owned ? `DATE ${todayKey.slice(5).replace("-", "/")}` : unlocked ? "DATE ____" : "LOCKED"}</div>
          </div>
        `;
        card.addEventListener("click", () => {
          if (!unlocked) {
            showToast(unlockHint(item));
            return;
          }
          card.classList.remove("stamp-pressed");
          void card.offsetWidth;
          card.classList.add("stamp-pressed");
          selectReward(item.id);
          openCardPreview(item);
        });
        album.appendChild(card);
      });
    }

    function renderSelectedCard() {
      const item = selectedReward();
      const owned = isOwned(item);
      const unlocked = isUnlocked(item);
      const progress = rewardProgress(item);
      const root = document.querySelector("#selectedCard");

      document.querySelector("#cardBuyButton").addEventListener("click", () => buyItem(item));

    function renderCurrentRouteCard() {
      const root = document.querySelector("#selectedCard");
      const currentIndex = currentJourneyIndex();
      const current = journeyCities[currentIndex];
      const next = journeyCities[currentIndex + 1];
      const progress = cityProgress(current.id);
      const chapter = currentChapter();
      const cityMode = cityVisualMapMode(current.id);
      root.className = "selected-card route-summary-card";
      root.style.setProperty("--card-color", "#fffaf0");
      root.style.setProperty("--card-poster", "none");
      root.innerHTML = `
        <div class="journey-head">
          <div>
            <h3>${current.name} · 章节地图</h3>

          </div>
          <div class="map-chip">${chapter?.done || 0}/${chapter?.cities.length || 1}</div>

      document.querySelector("#enterCurrentCityButton").addEventListener("click", () => openJourneyCity(current));
