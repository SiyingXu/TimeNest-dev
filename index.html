    }

    function isRewardOwnedById(id) {
      return equivalentIds(id).some(rewardId => state.ownedRewards.includes(rewardId) || state.travel?.tickets?.includes(rewardId));
    }

    function isOwned(item) {
      return isRewardOwnedById(item.id);
    }

    function journeyCityById(cityId) {
      return journeyCities.find(city => city.id === cityId);
    }

    function journeyCityCard(cityId) {
      return shopItems.find(item => item.id === cityCardId(cityId));
    }

    function ownedVisitItems(cityId) {
      const unique = new Map();
      shopItems
        .filter(item => item.cityId === cityId && item.category === "sight" && !item.sideQuest && isOwned(item))
        .forEach(item => unique.set(canonicalRewardId(item), item));
      return [...unique.values()];
    }

    function cityProgress(cityId) {
      return Math.min(requiredCityProgress(cityId), ownedVisitItems(cityId).length);
    }

    function isCityCompleted(cityId) {
      return cityProgress(cityId) >= requiredCityProgress(cityId);
    }

    function ensureTravelState() {
      state.travel ??= { currentCityId: "tuebingen", arrivedCities: ["tuebingen"], tickets: [] };
      state.travel.currentCityId ??= "tuebingen";
      state.travel.arrivedCities = Array.isArray(state.travel.arrivedCities) ? state.travel.arrivedCities : ["tuebingen"];
      state.travel.tickets = Array.isArray(state.travel.tickets) ? state.travel.tickets : [];
      if (!state.travel.arrivedCities.includes("tuebingen")) state.travel.arrivedCities.unshift("tuebingen");
      if (!state.travel.arrivedCities.includes(state.travel.currentCityId)) state.travel.arrivedCities.push(state.travel.currentCityId);
      const currentCard = cityCardId(state.travel.currentCityId);
      if (!state.ownedRewards.includes(currentCard)) state.ownedRewards.push(currentCard);
    }

    function currentJourneyIndex() {
      ensureTravelState();
      const index = journeyCities.findIndex(city => city.id === state.travel.currentCityId);
      return index === -1 ? journeyCities.length - 1 : index;
    }

    function nextJourneyCity() {
      return journeyCities[currentJourneyIndex() + 1] || null;
    }

    function exploringCity() {
      return journeyCityById(exploringCityId) || journeyCities[currentJourneyIndex()];
    }

    function journeyCityIndex(cityId) {
      return journeyCities.findIndex(city => city.id === cityId);
    }

    function travelTicketId(fromCityId, toCityId) {
      return `ticket-${fromCityId}-to-${toCityId}`;
    }

    function travelTicketType(fromCity, toCity) {
      const span = Math.abs(toCity.x - fromCity.x) + Math.abs(toCity.y - fromCity.y);
      if (fromCity.country === toCity.country) return "城际火车票";
      if (fromCity.chapter === toCity.chapter) return "跨境火车票";
      return span > 26 ? "长途机票" : "跨区交通票";
    }

    function travelTicketPrice(fromCity, toCity) {
      const span = Math.abs(toCity.x - fromCity.x) + Math.abs(toCity.y - fromCity.y);
      if (fromCity.country === toCity.country) return 90;
      if (fromCity.chapter === toCity.chapter) return 160;
      if (span > 32) return 760;
      if (span > 22) return 480;
      return 260;
    }

    function currentTravelTicket() {
      const from = journeyCities[currentJourneyIndex()];
      const to = nextJourneyCity();
      if (!from || !to) return null;
      return travelTicketFor(from, to);
    }

    function travelTicketFor(from, to) {
      if (!from || !to) return null;
      const type = travelTicketType(from, to);
      const price = travelTicketPrice(from, to);
      return {
        id: travelTicketId(from.id, to.id),
        category: "ticket",
        name: `${from.name} → ${to.name}`,
        from,
        to,
        type,
        price,
        icon: type.includes("机票") ? "AIR" : "RAIL",
        stamp: type.includes("机票") ? "AIR" : "RAIL",
        region: from.country === to.country ? from.country : `${from.country} → ${to.country}`,
        cityId: from.id,
        desc: `${type}：从 ${from.name} 前往 ${to.name}。`,
        cardLine: `买好${type}，和小猪一起前往 ${to.name}。`
      };
    }

    function cityTravelTicket(cityId) {
      const index = journeyCityIndex(cityId);
      if (index < 0) return null;
      return travelTicketFor(journeyCities[index], journeyCities[index + 1]);
    }

    function isTravelTicketOwned(ticket) {
      return Boolean(ticket && isRewardOwnedById(ticket.id));
    }

    function isUnlocked(item) {
      ensureTravelState();
      if (isOwned(item)) return true;
      if (item.routeCityId && item.category === "city") {
        return state.travel.arrivedCities.includes(item.routeCityId) || item.routeCityId === state.travel.currentCityId;
      }
      if (item.cityId && item.category !== "city" && item.cityId !== state.travel.currentCityId) return false;
      if (item.cityId && item.category !== "city" && !state.ownedRewards.includes(cityCardId(item.cityId))) return false;
      return !item.requires || state.ownedRewards.includes(item.requires);
    }

    function unlockHint(item) {
      ensureTravelState();
      if (item.routeCityId && item.category === "city" && !state.travel.arrivedCities.includes(item.routeCityId)) {
        const current = journeyCities[currentJourneyIndex()];
        return current ? `先从「${current.name}」买票出发` : "先抵达这座城市";
      }
      if (item.cityId && item.category !== "city" && item.cityId !== state.travel.currentCityId) {
        const city = journeyCityById(item.cityId);
        return city ? `抵达「${city.name}」后开放` : "抵达对应城市后开放";
      }
      if (item.cityId && item.category !== "city" && !state.ownedRewards.includes(cityCardId(item.cityId))) {
        const city = journeyCityById(item.cityId);
        return city ? `先解锁「${city.name}城市卡」` : "先解锁城市卡";
      }
      const parent = shopItems.find(reward => reward.id === item.requires);
      return parent ? `先解锁「${parent.name}」` : "暂未解锁";
    }

    function fundedAmount(item) {
      return Math.min(item.price, state.funds?.[item.id] || 0);
    }

    function rewardProgress(item) {
      if (isOwned(item)) return 100;
      if (!item.installment) return 0;
      return Math.round(fundedAmount(item) / item.price * 100);
    }

    function rewardPriceLabel(item) {
      if (isOwned(item)) return "已收藏";
      if (!isUnlocked(item)) return "未解锁";
      if (item.installment) {
        const left = Math.max(0, item.price - fundedAmount(item));
        return left ? `存入基金` : "领取票据";
      }
      return item.price ? `${item.price} 金币` : "领取";
    }

    function cityIdFromMapMode(mode) {
      return mode?.endsWith("-city") ? mode.replace(/-city$/, "") : null;
    }

    function isCityMapMode(mode) {
      const cityId = cityIdFromMapMode(mode);
      return Boolean(cityId && cityMapAssets[cityId]);
    }

    function cityMapAsset(mode) {
      const cityId = cityIdFromMapMode(mode);
      return cityId ? cityMapAssets[cityId] : null;
    }

    function isMapMode(mode) {
      return ["world", "china", "germany"].includes(mode) || isCityMapMode(mode);
    }

    function parentMapMode(mode) {
      const city = journeyCityById(cityIdFromMapMode(mode));
      if (city?.id === "shanghai") return "china";
      if (city?.country === "德国") return "world";
      if (isCityMapMode(mode)) return "world";
      return "world";
    }

    function layerTextFor(mode) {
      if (mode === "china") return ["世界", "中国", "上海入口"];
      if (isCityMapMode(mode)) {
        const city = journeyCityById(cityIdFromMapMode(mode)) || exploringCity();
        return ["世界", city.country || "德国", city.name];
      }
      if (mode === "chapter") return ["环球章节", journeyCities[currentJourneyIndex()]?.chapter || "当前章节"];
      return ["世界地图", "选择国家"];
    }

    function captionFor(mode) {
      if (mode === "china") return "中国地图：点击上海进入城市地图";
      if (isCityMapMode(mode)) {
        const city = journeyCityById(cityIdFromMapMode(mode)) || exploringCity();
        return `${city.name}地图：${city.visits.join(" / ")}`;
      }
      return "点击国家区域放大";
    }

    function mapArtwork(mode) {
      return "";
    }

    function cityVisualMapMode(cityId) {
      return cityMapAssets[cityId] ? `${cityId}-city` : "world";
    }

    function openJourneyCity(city) {
      if (!city) return;
      const card = journeyCityCard(city.id);
      if (!card) return;
      exploringCityId = city.id;
      selectedRewardId = card.id;
      mapMode = cityVisualMapMode(city.id);
      renderTravelMap();
      renderShop();
    }

    function journeyChapters() {
      return [...new Set(journeyCities.map(city => city.chapter))].map((name, index) => {
        const cities = journeyCities.filter(city => city.chapter === name);
        const done = cities.filter(city => state.travel.arrivedCities.includes(city.id)).length;
        const currentIndex = currentJourneyIndex();
        const currentCity = journeyCities[currentIndex];
        const firstRouteIndex = journeyCities.findIndex(city => city.id === cities[0].id);
        const lastRouteIndex = journeyCities.findIndex(city => city.id === cities[cities.length - 1].id);
        return {
          name,
          index,
          cities,
          done,
          firstRouteIndex,
          lastRouteIndex,
          active: cities.some(city => city.id === currentCity.id),
          unlocked: firstRouteIndex <= currentIndex || state.travel.arrivedCities.includes(cities[0].id),
          completed: done === cities.length
        };
      });
    }

    function currentChapter() {
      const current = journeyCities[currentJourneyIndex()];
      return journeyChapters().find(chapter => chapter.cities.some(city => city.id === current.id));
    }

    function chapterCityPosition(chapter, city) {
      const custom = {
        "德国漫游": {
          lubeck: { x: 59.2, y: 20.0 },
          hamburg: { x: 42.2, y: 21.2 },
          bremen: { x: 34.0, y: 29.1 },
          berlin: { x: 68.5, y: 30.6 },
          leipzig: { x: 56.4, y: 52.6 },
          dresden: { x: 74.6, y: 52.3 },
          aachen: { x: 15.6, y: 53.8 },
          cologne: { x: 20.4, y: 51.5 },
          frankfurt: { x: 34.9, y: 46.9 },
          heidelberg: { x: 30.8, y: 63.5 },
          stuttgart: { x: 32.4, y: 65.7 },
          tuebingen: { x: 33.5, y: 75.4 },
          freiburg: { x: 23.2, y: 87.2 },
          ulm: { x: 64.6, y: 75.7 },
          rothenburg: { x: 55.0, y: 63.2 },
          nuremberg: { x: 55.8, y: 72.4 },
          munich: { x: 65.4, y: 84.2 },
          fussen: { x: 57.3, y: 89.7 }
        }
      };
      if (custom[chapter.name]?.[city.id]) return custom[chapter.name][city.id];
      const index = chapter.cities.findIndex(item => item.id === city.id);
      const count = Math.max(1, chapter.cities.length - 1);
      const x = chapter.cities.length === 1 ? 50 : 12 + (index / count) * 76;
      const wave = index % 4;
      const y = [54, 38, 58, 44][wave] || 50;
      return { x, y };
    }

    function chapterSegmentStyle(from, to) {
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const width = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      return `--x:${from.x}%; --y:${from.y}%; --w:${width}%; --angle:${angle}deg`;
    }

    function chapterMapSlug(chapter) {
      if (chapter?.name === "德国漫游") return "germany";
      return "default";
    }

    function chapterMapArtwork(chapter) {
      if (chapter?.name !== "德国漫游") return "";
      return `
        <img class="chapter-map-image" src="assets/visual/generated/map-germany-route-handdrawn.png" alt="" aria-hidden="true">
      `;
    }

    function chapterMapPreviewAsset(chapter) {
      const number = String((chapter?.index ?? 0) + 1).padStart(2, "0");
      return `assets/visual/generated/chapter-maps/chapter-${number}.png`;
    }

    function renderJourneyPanel() {
      const root = document.querySelector("#journeyPanel");
      const currentIndex = currentJourneyIndex();
      const current = journeyCities[currentIndex];
      const next = journeyCities[currentIndex + 1];
      const arrivedCount = state.travel.arrivedCities.length;
      const progress = Math.round(arrivedCount / journeyCities.length * 100);
      const currentProgress = cityProgress(current.id);
      const chapters = journeyChapters();
      const activeChapter = chapters.find(chapter => chapter.cities.includes(current));
      const ticket = currentTravelTicket();
      const requiredProgress = requiredCityProgress(current);
      root.innerHTML = `
        <div class="journey-head">
          <div>
            <strong>环球之旅</strong>
            <span>已抵达 ${arrivedCount}/${journeyCities.length} 城</span>
          </div>
          <div class="map-chip">${progress}%</div>
        </div>
        <div class="journey-progress" aria-label="环球路线进度"><div style="--progress:${progress}%"></div></div>
        <div class="journey-copy">${next ? (currentProgress >= requiredProgress ? `本城 ${requiredProgress} 章已完成，可以购买${ticket.type}前往 ${next.name}。` : `完成 ${current.name} 的 ${requiredProgress} 个游览章后，会开放前往 ${next.name} 的交通票。`) : "环球主线已经回到图宾根，可以准备毕业纪念章。"}</div>
        <div class="journey-copy">当前章节：${activeChapter?.name || current.chapter} · ${activeChapter?.done || 0}/${activeChapter?.cities.length || 1} 城完成</div>
        <div class="route-overview">
          <div class="route-overview-title">
            <strong>章节目录与完整路线</strong>
            <span>共 ${chapters.length} 章 · ${journeyCities.length} 城</span>
          </div>
          <div class="route-chapter-list" aria-label="完整环球路线目录">
            ${chapters.map(chapter => `
              <div class="route-chapter-card${chapter.active ? " active" : ""}${chapter.completed ? " done" : ""}${chapter.unlocked ? "" : " locked"}" data-preview-chapter="${chapter.index}">
                <div class="route-chapter-head">
                  <strong>${chapter.index + 1}. ${chapter.name}</strong>
                  <span>${chapter.done}/${chapter.cities.length} 城</span>
                </div>
                <div class="route-city-chain">
                  ${chapter.cities.map((city, cityIndex) => `
                    ${cityIndex ? `<span class="route-arrow">→</span>` : ""}
                    <button class="route-city-node${state.travel.arrivedCities.includes(city.id) ? " done" : ""}${city.id === current.id ? " current" : ""}${chapter.unlocked ? "" : " locked"}" data-route-city="${city.id}" type="button">
                      ${city.name}
                    </button>
                  `).join("")}
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
      root.querySelectorAll("[data-route-city]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          const city = journeyCityById(button.dataset.routeCity);
          openJourneyCity(city);
        });
      });
      root.querySelectorAll("[data-preview-chapter]").forEach(card => {
        card.addEventListener("click", () => {
          const chapter = chapters[Number(card.dataset.previewChapter)];
          if (chapter) openChapterPreview(chapter);
        });
      });
    }

    function renderTravelMap() {
      const cityCount = document.querySelector("#cityCount");
      const ticketCount = document.querySelector("#ticketCount");
      const wishCount = document.querySelector("#wishCount");
      if (cityCount) cityCount.textContent = ownedRewardsBy("city").length;
      if (ticketCount) ticketCount.textContent = ownedTicketCount();
      if (wishCount) wishCount.textContent = ownedRewardsBy("wish").length;
      const passportItem = shopItems.find(item => item.id === "pig-passport");
      if (passportItem && !isOwned(passportItem)) {
        selectedRewardId = "pig-passport";
        const rewardsView = document.querySelector("#rewards-view");
        rewardsView?.classList.toggle("city-exploring", true);
        rewardsView?.classList.toggle("route-exploring", false);
        const map = document.querySelector("#worldMap");
        map.className = "world-map";
        map.style.removeProperty("--city-map-image");
        map.innerHTML = `
          <div class="map-trail"><span class="active">旅行护照</span></div>
          <div class="passport-gate-card">
            <strong>先为小猪购买护照</strong>
            <span>为小猪购买护照，开启环球旅行吧。护照入册后，就会出现德国路线和第一座城市。</span>
          </div>
        `;
        document.querySelector("#journeyPanel").innerHTML = "";
        renderPassportPurchaseCard(passportItem);
        requestAnimationFrame(syncTravelPanelHeight);
        return;
      }
      renderJourneyPanel();

      const currentIndex = currentJourneyIndex();
      const currentCity = journeyCities[currentIndex];
      const previousCity = journeyCities[currentIndex - 1];
      const nextCity = journeyCities[currentIndex + 1];
      const chapter = currentChapter();
      const rewardsView = document.querySelector("#rewards-view");
      const isCityExploring = mapMode.includes("-city");
      rewardsView?.classList.toggle("city-exploring", isCityExploring);
      rewardsView?.classList.toggle("route-exploring", !isCityExploring);
      const visualMode = mapMode === "world" ? "chapter" : mapMode;
      const map = document.querySelector("#worldMap");
      const wasZooming = map.classList.contains("map-zooming");
      const chapterClass = visualMode === "chapter" ? ` map-chapter-${chapterMapSlug(chapter)}` : "";
      const cityMapClass = isCityMapMode(visualMode) ? " map-city" : "";
      const cityMapImage = cityMapAsset(visualMode);
      map.className = `world-map map-${visualMode}${cityMapClass}${chapterClass}${wasZooming ? " map-zooming" : ""}`;
      if (cityMapImage) map.style.setProperty("--city-map-image", `url("${cityMapImage}")`);
      else map.style.removeProperty("--city-map-image");
      map.innerHTML = visualMode === "chapter" ? chapterMapArtwork(chapter) : mapArtwork(mapMode);
      const trail = document.createElement("div");
      trail.className = `map-trail${mapMode === "world" ? "" : " in-region"}`;
      const layerText = layerTextFor(visualMode);
      trail.innerHTML = layerText.map((label, index) => `<span class="${index === layerText.length - 1 ? "active" : ""}">${label}</span>`).join("");
      map.appendChild(trail);
      if (mapMode === "world") {
        if (chapter) {
          const badge = document.createElement("div");
          badge.className = "chapter-badge";
          badge.innerHTML = `<strong>${chapter.index + 1}. ${chapter.name}</strong><span>${chapter.done}/${chapter.cities.length} 城已抵达 · ${chapter.completed ? "章节完成" : "当前章节进行中"}</span>`;
          map.appendChild(badge);
          const routeLayer = document.createElementNS("http://www.w3.org/2000/svg", "svg");
          routeLayer.setAttribute("class", "chapter-route-layer");
          routeLayer.setAttribute("viewBox", "0 0 100 100");
          routeLayer.setAttribute("preserveAspectRatio", "none");
          chapter.cities.slice(0, -1).forEach((city, index) => {
            const next = chapter.cities[index + 1];
            const from = chapterCityPosition(chapter, city);
            const to = chapterCityPosition(chapter, next);
            const done = state.travel.arrivedCities.includes(city.id) && state.travel.arrivedCities.includes(next.id);
            const upcoming = city.id === currentCity.id && next.id === nextCity?.id;
            const segment = document.createElementNS("http://www.w3.org/2000/svg", "line");
            segment.setAttribute("x1", from.x);
            segment.setAttribute("y1", from.y);
            segment.setAttribute("x2", to.x);
            segment.setAttribute("y2", to.y);
            segment.setAttribute("class", [
              "chapter-route-line",
              done ? "done" : "",
              upcoming ? "next" : "",
              !done && !upcoming ? "locked" : ""
            ].filter(Boolean).join(" "));
            routeLayer.appendChild(segment);
          });
          map.appendChild(routeLayer);
        }
        const routePins = chapter ? chapter.cities : [previousCity, currentCity, nextCity];
        routePins
          .filter(Boolean)
          .filter((city, index, cities) => cities.findIndex(item => item.id === city.id) === index)
          .forEach(city => {
          const item = journeyCityCard(city.id);
          if (!item) return;
          const position = chapter ? chapterCityPosition(chapter, city) : { x: city.x, y: city.y };
          const pin = document.createElement("button");
          pin.className = [
            "map-pin",
            city.id === currentCity.id ? "" : "compact",
            state.travel.arrivedCities.includes(city.id) ? "owned" : "",
            state.travel.arrivedCities.includes(city.id) && city.id !== currentCity.id ? "completed-city" : "",
            city.id === currentCity.id ? "active" : "",
            city.id === nextCity?.id ? "next-stop" : "",
            !isUnlocked(item) ? "locked" : ""
          ].filter(Boolean).join(" ");
          pin.style.setProperty("--x", `${position.x}%`);
          pin.style.setProperty("--y", `${position.y}%`);
          const nodeMark = state.travel.arrivedCities.includes(city.id) && city.id !== currentCity.id ? "✓" : city.id === currentCity.id ? "●" : city.id === nextCity?.id ? "→" : "□";
          pin.innerHTML = `<span class="node-mark">${nodeMark}</span><span class="node-name">${city.name}</span>`;
          pin.title = isUnlocked(item) ? `${city.chapter} · ${cityProgress(city.id)}/${requiredCityProgress(city)}` : unlockHint(item);
          pin.addEventListener("click", () => openJourneyCity(city));
          map.appendChild(pin);
        });
        const caption = document.createElement("div");
        caption.className = "map-caption";
        caption.textContent = nextCity
          ? `${chapter?.name || currentCity.chapter} · 盖满 ${requiredCityProgress(currentCity)} 章并买票前往 ${nextCity.name}`
          : "环球路线收官";
        map.appendChild(caption);
        renderCurrentRouteCard();
        requestAnimationFrame(syncTravelPanelHeight);
        return;
      }

      const back = document.createElement("button");
      back.className = "map-back";
      const mapCity = journeyCityById(cityIdFromMapMode(mapMode));
      back.textContent = mapCity?.country === "德国" ? "< 德国路线" : mapMode.includes("-city") ? "< 区域" : "< 世界";
      back.addEventListener("click", () => zoomMap(parentMapMode(mapMode)));
      map.appendChild(back);

      const cityTaskItems = mapMode.includes("-city") ? currentCityMapItems(exploringCityId) : null;
      const mapItems = cityTaskItems || shopItems.filter(item => item.mapScope === mapMode && item.x && item.y);
      mapItems.forEach((item, index) => {
        const locked = !isUnlocked(item);
        const pin = document.createElement("button");
        const active = selectedRewardId === item.id;
        const position = cityTaskItems ? cityTaskPosition(item, index) : item;
        pin.className = [
          "map-pin",
          cityTaskItems ? "task-bubble" : "",
          isOwned(item) ? "owned" : "",
          locked ? "locked" : "",
          active ? "active" : ""
        ].filter(Boolean).join(" ");
        pin.style.setProperty("--x", `${position.x}%`);
        pin.style.setProperty("--y", `${position.y}%`);
        pin.dataset.rewardId = item.id;
        pin.dataset.short = taskShortMark(item);
        pin.textContent = cityTaskItems ? "" : item.name.replace("城市卡", "").replace("徽章", "").replace("基金", "").replace("体验", "");
        pin.title = locked ? unlockHint(item) : `${item.name}\n${item.cardLine || item.desc}`;
        pin.addEventListener("click", () => {
          selectReward(item.id, { stayOnMap: Boolean(cityTaskItems || item.zoomTo) });
          if (!cityTaskItems && item.zoomTo) zoomMap(item.zoomTo);
        });
        map.appendChild(pin);
      });
      const caption = document.createElement("div");
      caption.className = "map-caption";
      caption.textContent = captionFor(mapMode);
      if (!mapMode.includes("-city")) map.appendChild(caption);

      if (mapMode.includes("-city")) renderCurrentCityCard(exploringCityId);
      else renderSelectedCard();
      requestAnimationFrame(syncTravelPanelHeight);
    }

    function syncTravelPanelHeight() {
      const rewardsView = document.querySelector("#rewards-view");
      const map = document.querySelector("#worldMap");
      if (!rewardsView || !map) return;
      const height = Math.round(map.getBoundingClientRect().height);
      if (height > 0) rewardsView.style.setProperty("--travel-panel-height", `${height}px`);
    }

    function passportCityId(item) {
      if (item.cityId) return item.cityId;
      if (item.routeCityId) return item.routeCityId;
      if (item.category === "city") return item.id.replace(/-card$/, "");
      return null;
    }

    function stampLocationLabel(item) {
      const cityId = passportCityId(item);
      const city = journeyCityById(cityId);
      return item.region || city?.name || "TimeNest";
    }

    function passportStampItems(category, chapter = null) {
      const chapterCityIds = chapter ? new Set(chapter.cities.map(city => city.id)) : null;
      const routeOrder = item => item.routeIndex ?? journeyCityIndex(passportCityId(item)) ?? 999;
      const visitOrder = item => item.visitIndex ?? Number(item.id.match(/-visit-(\d+)$/)?.[1] || 99);
      const items = category === "city"
        ? shopItems.filter(item => item.category === "city" && journeyCityById(passportCityId(item)))
        : category === "sight"
          ? shopItems.filter(item => item.cityId && item.category === "sight" && !item.sideQuest)
          : shopItems.filter(item => item.cityId && item.category === "wish" && item.sideQuest);
      const unique = new Map();
      items
        .filter(item => !chapterCityIds || chapterCityIds.has(passportCityId(item)))
        .forEach(item => {
          const canonicalId = canonicalRewardId(item);
          const current = unique.get(canonicalId);
          const preferred = shopItems.find(reward => reward.id === canonicalId) || item;
          unique.set(canonicalId, current || preferred);
        });
      return [...unique.values()].sort((a, b) => routeOrder(a) - routeOrder(b) || visitOrder(a) - visitOrder(b) || a.name.localeCompare(b.name, "zh-CN"));
    }

    function passportCategoryLabel(category) {
      return {
        city: "城市",
        sight: "景点·主线",
        wish: "景点·支线"
      }[category] || "卡牌";
    }

    function passportProgressUnit(category) {
      return {
        city: "城市卡",
        sight: "主线景点",
        wish: "支线景点"
      }[category] || "卡牌";
    }

    function isPassportCardLit(item, category = activeStampCategory) {
      const cityId = passportCityId(item);
      if (category === "city") return Boolean(cityId && state.travel?.arrivedCities?.includes(cityId));
      return isOwned(item);
    }

    function passportPages(category) {
      const chapters = journeyChapters();
      return chapters.map(chapter => {
        const stamps = passportStampItems(category, chapter);
        return {
          chapter,
          partIndex: 0,
          partCount: 1,
          stamps,
          total: stamps.length
        };
      });
    }

    function sightAlbumArtStyle(item) {
      const art = resolvedCardArt(item);
      if (art.cardSprite) {
        const cols = art.cardSpriteCols || 1;
        const rows = art.cardSpriteRows || 1;
        const index = art.cardSpriteIndex || 0;
        const x = spriteOffset(index % cols, cols);
        const y = spriteOffset(Math.floor(index / cols), rows);
        return `--sight-card-image:url('${art.cardSprite}'); --sight-card-size:${cols * 100}% ${rows * 100}%; --sight-card-x:${x}%; --sight-card-y:${y}%;`;
      }
      return `--sight-card-image:url('${art.cardAsset || "assets/visual/card-pig-passport.svg"}'); --sight-card-size:cover; --sight-card-x:center; --sight-card-y:center;`;
    }

    function passportCurrentPageIndex(pages) {
      const chapter = currentChapter();
      const currentCityId = state.travel?.currentCityId;
      const cityMatch = pages.findIndex(page => page.stamps.some(item => passportCityId(item) === currentCityId));
      if (cityMatch >= 0) return cityMatch;
      return Math.max(0, pages.findIndex(page => page.chapter.index === chapter?.index));
    }

    function renderPassport() {
      const latest = [...state.ownedRewards].reverse()
        .map(id => shopItems.find(item => item.id === id))
        .find(Boolean);
      const currentIndex = currentJourneyIndex();
      const current = journeyCities[currentIndex];
      const next = journeyCities[currentIndex + 1];
      const currentProgress = cityProgress(current.id);
      const requiredProgress = requiredCityProgress(current);
      const pages = passportPages(activeStampCategory);
      if (activeStampPage < 0 || activeStampPage >= pages.length) activeStampPage = passportCurrentPageIndex(pages);
      const page = pages[activeStampPage] || pages[0];
      const pageChapter = page?.chapter || currentChapter();
      const pageChapterText = pageChapter ? `第 ${pageChapter.index + 1} 章 · ${pageChapter.name}` : "旅行卡册";
      document.querySelector(".passport-title strong").textContent = pageChapterText;
      const passportPageKind = passportProgressUnit(activeStampCategory);
      document.querySelector("#pigStatus").textContent = `${passportPageKind} · ${page?.partCount > 1 ? `${page.partIndex + 1}/${page.partCount}` : "章节页"}`;
      document.querySelector("#pigTravelTitle").textContent = `小猪正在 ${current.name}`;
      document.querySelector("#pigTravelNote").textContent = next
        ? `本城已盖 ${currentProgress}/${requiredProgress} 章。盖满后购买交通票，和小猪一起前往 ${next.name}。`
        : "环球路线已经回到图宾根，小猪正在整理毕业纪念章。";
      document.querySelector("#pigLastStamp").textContent = latest ? `最近：${latest.stamp}` : "最近：空白";
      document.querySelector("#pigNextStop").textContent = next ? `下一站：${next.name}` : "下一站：回家";

      const tabRoot = document.querySelector("#stampTabs");
      tabRoot.innerHTML = "";
      [
        { id: "city", name: "城市" },
        { id: "sight", name: "景点·主线" },
        { id: "wish", name: "景点·支线" }
      ].forEach(tabInfo => {
        const tab = document.createElement("button");
        tab.className = `stamp-tab${activeStampCategory === tabInfo.id ? " active" : ""}`;
        tab.textContent = tabInfo.name;
        tab.addEventListener("click", () => {
          activeStampCategory = tabInfo.id;
          activeStampPage = -1;
          renderPassport();
        });
        tabRoot.appendChild(tab);
      });

      const pageCount = Math.max(1, pages.length);
      const visibleStamps = page?.stamps || [];
      const visibleOwnedCount = visibleStamps.filter(item => isPassportCardLit(item, activeStampCategory)).length;
      const colors = ["#178f72", "#2563eb", "#e0523f", "#1f2937", "#7c3aed", "#d24777", "#0f766e", "#b45309"];
      const progressHead = document.querySelector("#passportProgressHead");
      const pageTotal = page?.total || visibleStamps.length;
      const progressPercent = pageTotal ? Math.min(100, Math.round(visibleOwnedCount / pageTotal * 100)) : 0;
      progressHead.hidden = false;
      progressHead.innerHTML = `
        <div class="stamp-progress-copy">
          <strong>${visibleOwnedCount} / ${pageTotal}</strong>
          <span>${passportProgressUnit(activeStampCategory)}</span>
        </div>
        <div class="stamp-progress-track" aria-label="${passportCategoryLabel(activeStampCategory)}收集进度">
          <div style="--progress:${progressPercent}%"></div>
        </div>
      `;
      const album = document.querySelector("#stampAlbum");
      album.innerHTML = "";
      album.dataset.note = "";
      album.classList.toggle("city-stamp-album", false);
      album.classList.toggle("sight-card-album", true);
      visibleStamps.forEach((item, index) => {
        const owned = isPassportCardLit(item, activeStampCategory);
        const unlocked = isUnlocked(item);
        const globalIndex = (pageChapter?.firstRouteIndex || 0) + index;
        const city = journeyCityById(passportCityId(item));
        const card = document.createElement("div");
        card.className = `sight-album-card${owned ? " owned-stamp" : " locked-stamp"}`;
        card.style.setProperty("--stamp-color", colors[globalIndex % colors.length]);
        card.setAttribute("aria-label", item.name);
        card.innerHTML = `
          <div class="sight-album-art" style="${sightAlbumArtStyle(item)}" aria-hidden="true"></div>
          <div class="sight-album-copy">
            <strong>${item.name.replace(`${city?.name || ""} · `, "")}</strong>
            <span>${stampLocationLabel(item)}</span>
          </div>
          <div class="sight-album-status">${owned ? "&check;" : "&#128274;"}</div>
        `;
        card.addEventListener("click", () => {
          if (owned) {
            selectReward(item.id);
            openCardPreview(item);
            return;
          }
          showToast(unlocked ? `完成兑换后可点亮：${item.name}` : unlockHint(item));
        });
        album.appendChild(card);
      });

      const pager = document.querySelector("#stampPager");
      pager.innerHTML = `
        <button class="stamp-page-button" type="button" data-stamp-page="prev" ${activeStampPage <= 0 ? "disabled" : ""}>‹</button>
        <div class="stamp-page-status">${pageChapterText} · ${visibleOwnedCount} / ${page?.total || 0} 枚</div>
        <button class="stamp-page-button" type="button" data-stamp-page="next" ${activeStampPage >= pageCount - 1 ? "disabled" : ""}>›</button>
      `;
      pager.querySelector('[data-stamp-page="prev"]').addEventListener("click", () => {
        activeStampPage = Math.max(0, activeStampPage - 1);
        renderPassport();
      });
      pager.querySelector('[data-stamp-page="next"]').addEventListener("click", () => {
        activeStampPage = Math.min(pageCount - 1, activeStampPage + 1);
        renderPassport();
      });
    }

    function renderPassportPurchaseCard(item) {
      const art = resolvedCardArt(item);
      const imageMarkup = art.cardSprite ? (() => {
        const cols = art.cardSpriteCols || 1;
        const rows = art.cardSpriteRows || 1;
        const index = art.cardSpriteIndex || 0;
        const x = spriteOffset(index % cols, cols);
        const y = spriteOffset(Math.floor(index / cols), rows);
        return `<div class="modal-card-art" role="img" aria-label="${item.name}" style="--modal-card-image:url('${art.cardSprite}'); --modal-card-size:${cols * 100}% ${rows * 100}%; --modal-card-x:${x}%; --modal-card-y:${y}%;"></div>`;

        .sort((a, b) => visitOrder(a) - visitOrder(b) || a.name.localeCompare(b.name, "zh-CN"));
      const sideQuests = shopItems
        .filter(item => item.cityId === city.id && item.sideQuest)
        .sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
      return { city, cityCard, visits, sideQuests };
    }

      const { city, cityCard, visits, sideQuests } = currentCityItems(cityId);

    function renderCurrentCityCard(cityId = null) {

      const ticketOwned = isTravelTicketOwned(ticket);
      const ticketReady = ticket && isMainCurrentCity && (progress >= requiredProgress || ticketOwned);
      const chapter = journeyChapters().find(item => item.cities.some(chapterCity => chapterCity.id === city.id));

          if (isOwned(item)) {
            selectedRewardId = item.id;
            openCardPreview(item);
            return;
          }
          if (event.target.closest("button")) buyItem(item);
          else {
            selectReward(item.id, { stayOnMap: true });

        });

      root.querySelector("[data-travel-ticket]")?.addEventListener("click", event => {
        const ticket = cityTravelTicket(city.id);
        if (!ticket) return;
        if (event.target.closest("button")) {
          if (city.id !== state.travel.currentCityId) {
            showToast(`当前主线在「${journeyCities[currentJourneyIndex()].name}」，这里只能预览 ${city.name} 的项目。`);
            return;
          }
          buyTravelTicket();
          return;
        }
        selectedRewardId = ticket.id;
        showToast(city.id === state.travel.currentCityId ? `完成 ${requiredProgress} 个游览章后可购买：${ticket.type}` : `${city.name} 的交通票仅作路线预览。`);

    function buyTravelTicket() {
      const ticket = currentTravelTicket();
      if (!ticket) {
        showToast("环球路线已经完成啦。");
        return;
      }
      const progress = cityProgress(ticket.from.id);
      const requiredProgress = requiredCityProgress(ticket.from);
      const ticketOwned = isTravelTicketOwned(ticket);
      if (progress < requiredProgress && !ticketOwned) {
        showToast(`先完成「${ticket.from.name}」的 ${requiredProgress} 个游览章。`);
        return;
      }
      if (!ticketOwned && state.coins < ticket.price) {
        showToast("金币还不够，先去完成任务或专注计时。");
        return;
      }
      if (!ticketOwned && !window.confirm(`确认花费 ${ticket.price} 金币购买${ticket.type}，从「${ticket.from.name}」前往「${ticket.to.name}」吗？`)) return;
      if (!ticketOwned) spendCoins(ticket.price, `购买「${ticket.from.name}→${ticket.to.name}」${ticket.type}`);
      if (!state.travel.tickets.includes(ticket.id)) state.travel.tickets.push(ticket.id);
      if (!state.ownedRewards.includes(ticket.id)) state.ownedRewards.push(ticket.id);
      state.travel.currentCityId = ticket.to.id;
      if (!state.travel.arrivedCities.includes(ticket.to.id)) state.travel.arrivedCities.push(ticket.to.id);
      const nextCardId = cityCardId(ticket.to.id);
      if (!state.ownedRewards.includes(nextCardId)) state.ownedRewards.push(nextCardId);
      selectedRewardId = nextCardId;
      mapMode = "world";
      activeRewardSection = "city";
      const nextCard = journeyCityCard(ticket.to.id);
      saveState();
      render();
      openArrivalModal(ticket, nextCard);
      showToast(`已抵达 ${ticket.to.name}，新的城市章开放了。`);
    }

    function zoomMap(mode) {
      const map = document.querySelector("#worldMap");
      map.classList.remove("map-zooming");
      void map.offsetWidth;
      map.classList.add("map-zooming");
      if (mode === "wish") {
        mapMode = "world";
        selectReward("pig-passport");
      } else if (mode === "china") {
        mapMode = "china";
        selectReward("shanghai-card", { stayOnMap: true });
      } else if (mode === "germany") {
        mapMode = "world";
        renderTravelMap();
        renderShop();
      } else if (mode === "shanghai-city") {
        mapMode = "shanghai-city";
        renderTravelMap();
        renderShop();
      } else if (isCityMapMode(mode)) {
        mapMode = mode;
        exploringCityId = cityIdFromMapMode(mode) || exploringCityId;
        renderTravelMap();
        renderShop();
      } else {
        mapMode = "world";
        renderTravelMap();
        renderShop();
      }
    }

    function selectReward(id, options = {}) {
      const item = shopItems.find(reward => reward.id === id);
      selectedRewardId = id;
      if (item) {
        activeCategory = item.category;
        if (!options.stayOnMap) {
          const rewardCityId = item.routeCityId || item.cityId || cityIdFromMapMode(item.zoomTo);
          if (item.zoomTo && isMapMode(item.zoomTo)) mapMode = item.zoomTo;
          else if (item.mapScope === "germany" && rewardCityId) mapMode = cityVisualMapMode(rewardCityId);
          else if (item.mapScope === "germany") mapMode = "world";
          else if (isMapMode(item.mapScope)) mapMode = item.mapScope;
          else if (item.mapScope === "world") mapMode = "world";
        }
      }
      renderTravelMap();
      renderShop();
    }

    function spriteOffset(index, count) {
      return count <= 1 ? 0 : (index / (count - 1)) * 100;
    }

    function resolvedCardArt(item) {
      const tuebingenIndex = tuebingenRewardSpriteIndex[item.id];
      if (Number.isInteger(tuebingenIndex)) return spriteCardArt(cardSpriteAssets.tuebingenRewards, tuebingenIndex);

      const freiburgIndex = freiburgRewardSpriteIndex[item.id];
      if (Number.isInteger(freiburgIndex)) return spriteCardArt(cardSpriteAssets.freiburgRewards, freiburgIndex);

      const cityRewardArt = cityRewardSpriteArt(item);
      if (cityRewardArt && item.category !== "city") return cityRewardArt;

      const cityId = item.routeCityId || (item.category === "city" ? item.id.replace(/-card$/, "") : item.cityId);
      const germanyIndex = cityId ? germanyCityCardOrder.indexOf(cityId) : -1;
      if (item.category === "city" && germanyIndex >= 0) return spriteCardArt(cardSpriteAssets.germanyCities, germanyIndex);

      if (item.cardSprite) {
        return {
          cardSprite: item.cardSprite,
          cardSpriteCols: item.cardSpriteCols || 1,
          cardSpriteRows: item.cardSpriteRows || 1,
          cardSpriteIndex: item.cardSpriteIndex || 0
        };
      }

      return { cardAsset: item.cardAsset || "assets/visual/card-pig-passport.svg" };
    }

    function modalCardArt(item) {
      const art = resolvedCardArt(item);
      if (art.cardSprite) {
        const cols = art.cardSpriteCols || 1;
        const rows = art.cardSpriteRows || 1;
        const index = art.cardSpriteIndex || 0;
        const x = spriteOffset(index % cols, cols);
        const y = spriteOffset(Math.floor(index / cols), rows);
        return `<div class="modal-card-art" role="img" aria-label="${item.name}" style="--modal-card-image:url('${art.cardSprite}'); --modal-card-size:${cols * 100}% ${rows * 100}%; --modal-card-x:${x}%; --modal-card-y:${y}%;"></div>`;
      }
      return `<img src="${art.cardAsset}" alt="${item.name}">`;
    }

    function renderShop() {
      const tabRoot = document.querySelector("#shopTabs");
      const root = document.querySelector("#shop");
      if (!tabRoot || !root) return;
      tabRoot.innerHTML = "";
      shopCategories.forEach(category => {
        const tab = document.createElement("button");
        tab.className = `shop-tab${category.id === activeCategory ? " active" : ""}`;
        tab.textContent = category.name;
        tab.addEventListener("click", () => {
          activeCategory = category.id;
          render();
        });
        tabRoot.appendChild(tab);
      });

      root.innerHTML = "";
      const currentCity = journeyCities[currentJourneyIndex()];
      const scopedItems = shopItems.filter(item => {
        if (item.category !== activeCategory) return false;
        if (item.routeIndex === undefined && !item.cityId) return activeCategory === "wish";
        if (activeCategory === "city") {
          const routeIndex = item.routeIndex ?? 999;
          const currentIndex = currentJourneyIndex();
          return routeIndex >= Math.max(0, currentIndex - 1) && routeIndex <= currentIndex + 2;
        }
        return item.cityId === currentCity.id;
      });
      const itemsToRender = scopedItems.length ? scopedItems : shopItems.filter(item => item.category === activeCategory && item.routeIndex === undefined);
      itemsToRender
        .sort((a, b) => (a.routeIndex ?? 999) - (b.routeIndex ?? 999) || a.name.localeCompare(b.name, "zh-CN"))
        .forEach(item => {
        const owned = isOwned(item);
        const unlocked = isUnlocked(item);
        const actionText = rewardPriceLabel(item);
        const progress = rewardProgress(item);
        const card = document.createElement("div");
        card.className = `shop-item${selectedRewardId === item.id ? " selected" : ""}${unlocked ? "" : " locked"}`;
        card.innerHTML = `
          <div class="mini-preview" style="${rewardStyle(item)}">${item.icon}</div>
          <div class="shop-copy">
            <strong>${item.name}</strong>
            <span>${unlocked ? item.desc : unlockHint(item)}</span>
            <div class="card-meta">
              <span>${categoryLabel(item.category)}</span>
              <span>${rarityLabel(item)}</span>
              <span>${owned ? "已收藏" : unlocked ? "可兑换" : "未解锁"}</span>
              ${item.routeIndex !== undefined ? `<span>第 ${item.routeIndex + 1} 站</span>` : ""}
              ${item.cityId ? `<span>${cityProgress(item.cityId)}/${requiredCityProgress(item.cityId)} 章</span>` : ""}
              ${item.installment ? `<span>基金 ${fundedAmount(item)} / ${item.price}</span>` : ""}
              ${state.wishlist.includes(item.id) ? `<span>想要</span>` : ""}
            </div>
            ${item.installment && !owned ? `<div class="card-progress"><div style="--progress:${progress}%"></div></div>` : ""}
            <div class="shop-actions">
              <button class="secondary" data-action="detail">查看</button>
              <button class="${owned ? "secondary" : "primary"}" data-action="buy">${actionText}</button>
              ${item.category === "wish" && !owned ? `<button class="secondary" data-action="wish">${state.wishlist.includes(item.id) ? "已想要" : "想要"}</button>` : ""}
            </div>
          </div>
        `;
        card.querySelector('[data-action="detail"]').addEventListener("click", () => showRewardDetail(item));
        card.querySelector('[data-action="buy"]').addEventListener("click", () => buyItem(item));
        card.querySelector('[data-action="wish"]')?.addEventListener("click", event => {
          event.stopPropagation();
          toggleWishlist(item.id);
        });
        card.addEventListener("click", event => {
          if (event.target.closest("button")) return;
          selectReward(item.id);
        });
        root.appendChild(card);
      });
    }

    function showRewardDetail(item) {
      selectReward(item.id);
      openCardPreview(item);
    }

    function toggleWishlist(id) {
      if (state.wishlist.includes(id)) {
        state.wishlist = state.wishlist.filter(itemId => itemId !== id);
        showToast("已从想要清单移除。");
      } else {
        state.wishlist.push(id);
        showToast("已加入想要清单。");
      }
      saveState();
      render();
    }

    function toggleTask(id) {
      const task = state.tasks.find(item => item.id === id);
      if (!task) return;
      if (task.done) {
        undoTask(task);
        return;
      }
      task.done = true;
      state.todayDone += 1;
      addCoins(task.reward, `完成「${task.name}」`, { kind: "task", taskId: task.id });
    }

    function undoTask(task, options = {}) {
      task.done = false;
      state.todayDone = Math.max(0, state.todayDone - 1);
      const recordIndex = [...state.records].reverse().findIndex(record =>
        record.kind === "task" && (record.taskId === task.id || record.label === `完成「${task.name}」`)
      );
      let removedRecord = null;
      if (recordIndex >= 0) {
        const actualIndex = state.records.length - 1 - recordIndex;
        removedRecord = state.records.splice(actualIndex, 1)[0];
      }
      const refund = removedRecord?.coins ?? task.reward;
      state.coins = Math.max(0, state.coins - refund);
      const historyIndex = state.history.findIndex(item =>
        item.amount === refund && (item.text === removedRecord?.label || item.text === `完成「${task.name}」`)
      );
      if (historyIndex >= 0) state.history.splice(historyIndex, 1);
      if (options.defer) return;
      saveState();
      render();
      showToast(`已取消完成：${task.name}`);
    }

    function deleteTask(id) {
      const task = state.tasks.find(item => item.id === id);
      if (!task) return;
      if (task.done) {
        undoTask(task);
      }
      state.tasks = state.tasks.filter(item => item.id !== id);
      if (editingTaskId === id) editingTaskId = null;
      saveState();
      render();
      showToast(`已删除任务：${task.name}`);
    }

    function editTask(id) {
      editingTaskId = id;
      render();
    }

    function saveTaskEdit(id, row) {
      const task = state.tasks.find(item => item.id === id);
      if (!task) return;
      const name = row.querySelector('[data-field="name"]').value.trim();
      if (!name) {
        showToast("任务名称不能为空。");
        return;
      }
      task.name = name;
      task.reward = Number(row.querySelector('[data-field="reward"]').value);
      editingTaskId = null;
      saveState();
      render();
      showToast(`已保存任务：${task.name}`);
    }

    function cancelTaskEdit() {
      editingTaskId = null;
      render();
    }

    function scheduleTask(id) {
      const task = state.tasks.find(item => item.id === id);
      if (!task) return;
      planningTaskId = id;
      editingPlanId = null;
      editingTimeLogId = null;
      const now = new Date();
      const current = now.getHours() * 60 + now.getMinutes();
      const rounded = Math.ceil(current / 30) * 30;
      const startMinutes = Math.min(23 * 60, Math.max(6 * 60, rounded));
      const endMinutes = Math.min(24 * 60, startMinutes + 60);
      document.querySelector("#planTitle").value = task.name;
      document.querySelector("#planStart").value = minutesToTime(startMinutes);
      document.querySelector("#planEnd").value = minutesToTime(endMinutes);
      document.querySelector("#addPlan").textContent = "安排到时间轴";
      document.querySelector("#addTimeLog").textContent = "加入记录";
      const note = document.querySelector("#planEditNote");
      note.textContent = `正在安排任务：${task.name}`;
      note.classList.add("active");
      document.querySelector('[data-view="home-view"]')?.click();
      document.querySelector("#planTitle").focus();
      showToast("已带入任务，调整时间后加入计划。");
    }

    function minutesToTime(minutes) {
      const normalized = Math.max(0, Math.min(24 * 60, minutes));
      const hour = Math.floor(normalized / 60);
      const minute = normalized % 60;
      return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
    }

    function dateToTime(date) {
      return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function selectedLogCategory() {
      return document.querySelector('input[name="logCategory"]:checked')?.value || "study";
    }

    function selectedTimerCategory() {
      return document.querySelector('input[name="timerCategory"]:checked')?.value || "study";
    }

    function updateTimerRewardRule() {
      const category = selectedTimerCategory();
      const input = document.querySelector("#timerRewardRule");
      if (input) input.value = logCategories[category]?.reward ? "每分钟 +1 金币" : "不结算金币";
    }

    function setSelectedLogCategory(category) {
      const safeCategory = logCategories[category] ? category : "study";
      const input = document.querySelector(`input[name="logCategory"][value="${safeCategory}"]`);
      if (input) input.checked = true;
    }

    function logCategoryName(category) {
      return logCategories[category]?.name || "日常";
    }

    function logCategoryStyle(category) {
      return logCategories[category] || logCategories.daily;
    }

    function planTimelineStyle(done) {
      return done
        ? { bg: "#f1f5f9", border: "#cbd5e1", accent: "#94a3b8", text: "#64748b" }
        : { bg: "#fde8ee", border: "rgba(227,107,127,.28)", accent: "#e36b7f", text: "#b94d61" };
    }

    function logRewardFor(category, minutes) {
      if (!logCategories[category]?.reward) return { minutes: 0, coins: 0 };
      return { minutes, coins: minutes };
    }

    function removeLegacyFocusReward(log) {
      const index = state.records.findIndex(record =>
        record.kind === "focus"
        && record.date === log.date
        && (record.minutes || 0) === (log.minutes || 0)
        && (record.coins || 0) === (log.minutes || 0)
      );
      if (index < 0) return { minutes: 0, coins: 0 };
      const record = state.records.splice(index, 1)[0];
      state.focusMinutes = Math.max(0, state.focusMinutes - (record.minutes || 0));
      state.coins = Math.max(0, state.coins - (record.coins || 0));
      const historyIndex = state.history.findIndex(item =>
        item.amount === record.coins && item.text === record.label
      );
      if (historyIndex >= 0) state.history.splice(historyIndex, 1);
      return { minutes: record.minutes || 0, coins: record.coins || 0 };
    }

    function settleTimeLogReward(log, previousReward = { minutes: 0, coins: 0 }) {
      const oldMinutes = previousReward.minutes || 0;
      const oldCoins = previousReward.coins || 0;
      if (oldMinutes) state.focusMinutes = Math.max(0, state.focusMinutes - oldMinutes);
      if (oldCoins) state.coins = Math.max(0, state.coins - oldCoins);
      if (!oldMinutes && !oldCoins) removeLegacyFocusReward(log);
      state.records = state.records.filter(record => record.kind !== "time-log-reward" || record.logId !== log.id);
      state.history = state.history.filter(item => item.logId !== log.id);

      const reward = logRewardFor(log.category, log.minutes);
      log.reward = reward;
      if (reward.minutes) state.focusMinutes += reward.minutes;
      if (reward.coins) {
        state.coins += reward.coins;
        const label = `${logCategoryName(log.category)}记录「${log.title}」`;
        state.history.unshift({
          text: label,
          amount: reward.coins,
          date: todayKey,
          time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }),
          logId: log.id
        });
        state.history = state.history.slice(0, 8);
        state.records.push({
          kind: "time-log-reward",
          logId: log.id,
          label,
          coins: reward.coins,
          minutes: reward.minutes,
          category: log.category,
          date: todayKey,
          ts: Date.now()
        });
        state.records = state.records.slice(-500);
      }
      return reward;
    }

    function addTimeLog({ title, start, end, planId = null, taskId = null, category = "study", skipReward = false }) {
      const minutes = minutesBetween(start, end);
      const existing = planId ? state.timeLogs.find(log => log.planId === planId) : null;
      if (existing) {
        const previousReward = existing.reward || { minutes: 0, coins: 0 };
        existing.title = title;
        existing.start = start;
        existing.end = end;
        existing.minutes = minutes;
        existing.taskId = taskId;
        existing.category = category;
        if (!skipReward) settleTimeLogReward(existing, previousReward);
        return existing;
      }
      const log = { id: makeId(), title, start, end, minutes, planId, taskId, category, reward: { minutes: 0, coins: 0 }, date: todayKey };
      state.timeLogs.push(log);
      if (!skipReward) settleTimeLogReward(log);
      return log;
    }

    function deleteTimeLog(id) {
      const log = state.timeLogs.find(item => item.id === id);
      if (!log) return;
      settleTimeLogReward({ ...log, category: "daily", reward: { minutes: 0, coins: 0 } }, log.reward || { minutes: 0, coins: 0 });
      state.timeLogs = state.timeLogs.filter(item => item.id !== id);
      if (editingTimeLogId === id) resetPlanForm();
      saveState();
      render();
      showToast(`已删除记录：${log.title}`);
    }

    function editTimeLog(id) {
      const log = state.timeLogs.find(item => item.id === id);
      if (!log) return;
      editingTimeLogId = id;
      editingPlanId = null;
      planningTaskId = log.taskId || null;
      document.querySelector("#planTitle").value = log.title;
      document.querySelector("#planStart").value = log.start;
      document.querySelector("#planEnd").value = log.end;
      setSelectedLogCategory(log.category);
      document.querySelector("#addPlan").textContent = "加入计划";
      document.querySelector("#addTimeLog").textContent = "保存记录";
      const note = document.querySelector("#planEditNote");
      note.textContent = `正在编辑记录：${log.title}`;
      note.classList.add("active");
      showToast("已载入记录，修改后点保存记录。");
    }

    function completePlan(id) {
      const plan = state.plans.find(item => item.id === id);
      if (!plan) return;
      if (plan.done) {
        undoPlan(plan);
        return;
      }
      plan.done = true;
      addTimeLog({ title: plan.title, start: plan.start, end: plan.end, planId: plan.id, taskId: plan.taskId, category: plan.category || "study" });
      state.records.push({
        kind: "plan",
        planId: plan.id,
        label: plan.title,
        coins: 0,
        minutes: plan.minutes,
        date: todayKey,
        ts: Date.now()
      });
      state.records = state.records.slice(-500);
      const linkedTask = plan.taskId ? state.tasks.find(task => task.id === plan.taskId) : null;
      if (linkedTask && !linkedTask.done) {
        linkedTask.done = true;
        state.todayDone += 1;
        state.coins += linkedTask.reward;
        state.history.unshift({
          text: `完成「${linkedTask.name}」`,
          amount: linkedTask.reward,
          date: todayKey,
          time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
        });
        state.history = state.history.slice(0, 8);
        state.records.push({
          kind: "task",
          taskId: linkedTask.id,
          label: `完成「${linkedTask.name}」`,
          coins: linkedTask.reward,
          minutes: 0,
          date: todayKey,
          ts: Date.now(),
          fromPlanId: plan.id
        });
        state.records = state.records.slice(-500);
      }
      saveState();
      render();
      showToast(linkedTask ? `已完成计划并同步任务：${plan.title}` : `已完成计划：${plan.title}`);
    }

    function undoPlan(plan) {
      plan.done = false;
      const linkedTask = plan.taskId ? state.tasks.find(task => task.id === plan.taskId) : null;
      const completedTaskFromPlan = linkedTask && state.records.some(record =>
        record.kind === "task" && record.taskId === linkedTask.id && record.fromPlanId === plan.id
      );
      state.records = state.records.filter(record => record.planId !== plan.id);
      state.timeLogs
        .filter(log => log.planId === plan.id)
        .forEach(log => settleTimeLogReward({ ...log, category: "daily", reward: { minutes: 0, coins: 0 } }, log.reward || { minutes: 0, coins: 0 }));
      state.timeLogs = state.timeLogs.filter(log => log.planId !== plan.id);
      if (linkedTask) {
        const hasOtherDonePlan = state.plans.some(item => item.id !== plan.id && item.taskId === linkedTask.id && item.done);
        if (completedTaskFromPlan && !hasOtherDonePlan && linkedTask.done) undoTask(linkedTask, { defer: true });
      }
      saveState();
      render();
      showToast(linkedTask ? `已取消计划完成，并同步取消任务：${plan.title}` : `已取消计划完成：${plan.title}`);
    }

    function editPlan(id) {
      const plan = state.plans.find(item => item.id === id);
      if (!plan) return;
      editingPlanId = id;
      editingTimeLogId = null;
      planningTaskId = plan.taskId || null;
      document.querySelector("#planTitle").value = plan.title;
      document.querySelector("#planStart").value = plan.start;
      document.querySelector("#planEnd").value = plan.end;
      setSelectedLogCategory(plan.category || "study");
      document.querySelector("#addPlan").textContent = "保存修改";
      document.querySelector("#addTimeLog").textContent = "加入记录";
      const note = document.querySelector("#planEditNote");
      note.textContent = `正在编辑：${plan.title}`;
      note.classList.add("active");
      showToast("已载入计划，修改后点保存。");
    }

    function deletePlan(id) {
      const plan = state.plans.find(item => item.id === id);
      if (!plan) return;
      state.plans = state.plans.filter(item => item.id !== id);
      state.records = state.records.filter(record => record.planId !== id);
      state.timeLogs
        .filter(log => log.planId === id)
        .forEach(log => settleTimeLogReward({ ...log, category: "daily", reward: { minutes: 0, coins: 0 } }, log.reward || { minutes: 0, coins: 0 }));
      state.timeLogs = state.timeLogs.filter(log => log.planId !== id);
      if (editingPlanId === id) resetPlanForm();
      saveState();
      render();
      showToast(`已删除计划：${plan.title}`);
    }

    function resetPlanForm() {
      editingPlanId = null;
      editingTimeLogId = null;
      planningTaskId = null;
      document.querySelector("#planTitle").value = "";
      setSelectedLogCategory("study");
      document.querySelector("#addPlan").textContent = "加入计划";
      document.querySelector("#addTimeLog").textContent = "加入记录";
      const note = document.querySelector("#planEditNote");
      note.textContent = "";
      note.classList.remove("active");
    }

    function buyItem(item) {
      if (isOwned(item)) {
        showToast(`已经在卡册里：${item.name}`);
        return;
      }
      if (!isUnlocked(item)) {
        showToast(unlockHint(item));
        return;
      }
      if (item.installment) {
        const left = item.price - fundedAmount(item);
        if (left > 0) {
          if (state.coins <= 0) {
            showToast("金币还不够，先去完成一个小任务或专注计时。");
            return;
          }
          const deposit = Math.min(left, state.coins, 100);
          if (!window.confirm(`确认向「${item.name}」存入 ${deposit} 金币吗？`)) return;
          state.funds[item.id] = fundedAmount(item) + deposit;
          spendCoins(deposit, `存入「${item.name}」基金`);
          if (state.funds[item.id] >= item.price) {
            state.ownedRewards.push(item.id);
            selectedRewardId = item.id;
            showToast(`基金已存满，小猪盖下 ${item.stamp} 章！`);
          } else {
            showToast(`已存入 ${deposit} 金币，还差 ${item.price - state.funds[item.id]}。`);
          }
          saveState();
          render();
          return;
        }
      }
      if (state.coins < item.price) {
        showToast("金币还不够，先去完成一个小任务或专注计时。");
        return;
      }
      if (item.price > 0 && !window.confirm(`确认花费 ${item.price} 金币兑换「${item.name}」吗？`)) return;
      state.ownedRewards.push(item.id);
      selectedRewardId = item.id;
      spendCoins(item.price, `购买「${item.name}」`);
      state.wishlist = state.wishlist.filter(id => id !== item.id);
      saveState();
      render();
      if (item.cityId && !item.sideQuest && isCityCompleted(item.cityId)) {
        const city = journeyCityById(item.cityId);
        const next = city ? journeyCities[journeyCities.findIndex(routeCity => routeCity.id === city.id) + 1] : null;
        showToast(next ? `${city.name} 3 章完成，前往 ${next.name} 的交通票开放了。` : `${city.name} 3 章完成，环球路线收官！`);
      } else {
        showToast(`小猪盖下 ${item.stamp || item.icon} 章：${item.name}`);
      }
      openCardPreview(item);
    }

    function currentTimerElapsed(now = Date.now()) {
      const runningSeconds = timer.runningSince !== null ? Math.floor((now - timer.runningSince) / 1000) : 0;
      return Math.max(0, timer.elapsed + runningSeconds);
    }

    function syncTimerFromClock(now = Date.now()) {
      const elapsed = currentTimerElapsed(now);
      if (timerMode === "countdown") {
        timer.left = Math.max(0, timer.total - elapsed);
      }
      return elapsed;
    }

    function pauseTimerClock(now = Date.now()) {
      timer.elapsed = currentTimerElapsed(now);
      timer.runningSince = null;
      if (timerMode === "countdown") {
        timer.left = Math.max(0, timer.total - timer.elapsed);
      }
      return timer.elapsed;
    }

    function updateTimerDisplay() {
      const elapsed = currentTimerElapsed();
      if (timerMode === "countdown") {
        timer.left = Math.max(0, timer.total - elapsed);
      }
      const secondsValue = timerMode === "countdown" ? timer.left : elapsed;
      const minutes = Math.floor(secondsValue / 60).toString().padStart(2, "0");
      const seconds = (secondsValue % 60).toString().padStart(2, "0");
      document.querySelector("#timerTime").textContent = `${minutes}:${seconds}`;
      const timerFace = document.querySelector("#timerFace");
      timerFace.classList.toggle("stopwatch", timerMode === "stopwatch");
      const done = timerMode === "countdown" && timer.total ? (timer.total - timer.left) / timer.total : 0;
      timerFace.style.setProperty("--progress", `${done * 360}deg`);
    }

    function resetTimer() {
      clearInterval(timer.interval);
      timer.interval = null;
      const minutes = Math.min(600, Math.max(1, Number(document.querySelector("#timerMinutes").value) || 25));
      document.querySelector("#timerMinutes").value = minutes;
      timer.total = minutes * 60;
      timer.left = timer.total;
      timer.elapsed = 0;
      timer.startedAt = null;
      timer.runningSince = null;
      document.querySelector("#timerStart").textContent = "开始";
      updateTimerDisplay();
    }

    function finishTimer() {
      const elapsed = syncTimerFromClock();
      const spentSeconds = timerMode === "countdown" ? timer.total - timer.left : elapsed;
      const spent = Math.max(0, Math.floor(spentSeconds / 60));
      if (spent < 1) {
        showToast("至少专注 1 分钟再结算。");
        return;
      }
      const endDate = new Date();
      const startDate = new Date(endDate.getTime() - spent * 60000);
      const timerTitle = document.querySelector("#timerTaskTitle").value.trim() || "专注计时";
      const category = selectedTimerCategory();
      const log = addTimeLog({
        title: timerTitle,
        start: dateToTime(startDate),
        end: dateToTime(endDate),
        category
      });
      const reward = log.reward || { minutes: 0, coins: 0 };
      document.querySelector("#timerTaskTitle").value = "";
      resetTimer();
      saveState();
      render();
      showToast(reward.coins
        ? `专注 ${spent} 分钟，获得 ${reward.coins} 金币`
        : `已记录${logCategoryName(category)}计时 ${spent} 分钟`
      );
    }

    function abandonTimer() {
      const hadProgress = currentTimerElapsed() > 0 || (timerMode === "countdown" && timer.left < timer.total);
      resetTimer();
      showToast(hadProgress ? "已放弃本次计时，未记录时间。" : "本次计时已重置。");
    }

    function showToast(message) {
      const toast = document.querySelector("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timeout);
      showToast.timeout = setTimeout(() => toast.classList.remove("show"), 2100);
    }

    document.querySelector("#addTask").addEventListener("click", () => {
      const input = document.querySelector("#taskInput");
      const name = input.value.trim();
      if (!name) {
        showToast("先写下一个任务。");
        return;
      }
      state.tasks.unshift({
        id: makeId(),
        name,
        reward: Number(document.querySelector("#taskReward").value),
        done: false
      });
      input.value = "";
      saveState();
      render();
    });

    document.querySelector("#taskInput").addEventListener("keydown", event => {
      if (event.key === "Enter") document.querySelector("#addTask").click();
    });

    document.querySelector("#addPlan").addEventListener("click", () => {
      const title = document.querySelector("#planTitle").value.trim();
      const start = document.querySelector("#planStart").value;
      const end = document.querySelector("#planEnd").value;
      const category = selectedLogCategory();
      if (!title || !start || !end) {
        showToast("先填完整计划、开始和结束时间。");
        return;
      }
      const minutes = minutesBetween(start, end);
      if (editingPlanId) {
        const plan = state.plans.find(item => item.id === editingPlanId);
        if (plan) {
          plan.title = title;
          plan.start = start;
          plan.end = end;
          plan.minutes = minutes;
          plan.taskId = planningTaskId;
          plan.category = category;
          if (plan.done) {
            state.records = state.records.map(record => record.planId === plan.id
              ? { ...record, label: title, minutes }
              : record
            );
            addTimeLog({ title, start, end, planId: plan.id, taskId: planningTaskId, category });
          }
        }
        resetPlanForm();
        showToast(`已保存修改：${title}`);
      } else {
        state.plans.push({ id: makeId(), title, start, end, minutes, done: false, taskId: planningTaskId, category });
        resetPlanForm();
        showToast(`已加入计划：${title}`);
      }
      saveState();
      render();
    });

    document.querySelector("#addTimeLog").addEventListener("click", () => {
      const title = document.querySelector("#planTitle").value.trim();
      const start = document.querySelector("#planStart").value;
      const end = document.querySelector("#planEnd").value;
      const category = selectedLogCategory();
      if (!title || !start || !end) {
        showToast("先填完整记录、开始和结束时间。");
        return;
      }
      if (editingTimeLogId) {
        const log = state.timeLogs.find(item => item.id === editingTimeLogId);
        if (log) {
          const previousReward = log.reward || { minutes: 0, coins: 0 };
          log.title = title;
          log.start = start;
          log.end = end;
          log.minutes = minutesBetween(start, end);
          log.taskId = planningTaskId;
          log.category = category;
          settleTimeLogReward(log, previousReward);
        }
        const rewarded = logCategories[category]?.reward;
        showToast(rewarded ? `已保存记录并结算：${title}` : `已保存记录：${title}`);
      } else {
        const log = addTimeLog({ title, start, end, taskId: planningTaskId, category });
        showToast(log.reward?.coins ? `已加入${logCategoryName(category)}记录，获得 ${log.reward.coins} 金币` : `已加入记录：${title}`);
      }
      resetPlanForm();
      saveState();
      render();
    });

    document.querySelector("#planTitle").addEventListener("keydown", event => {
      if (event.key === "Enter") document.querySelector("#addPlan").click();
    });

    document.querySelector("#timerMinutes").addEventListener("change", resetTimer);
    document.querySelectorAll('input[name="timerCategory"]').forEach(input => {
      input.addEventListener("change", updateTimerRewardRule);
    });

    document.querySelectorAll("[data-timer-mode]").forEach(button => {
      button.addEventListener("click", () => {
        timerMode = button.dataset.timerMode;
        document.querySelectorAll("[data-timer-mode]").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        document.querySelector("#timerMinutes").disabled = timerMode === "stopwatch";
        resetTimer();
      });
    });

    document.querySelector("#timerStart").addEventListener("click", () => {
      if (timer.interval) {
        syncTimerFromClock();
        clearInterval(timer.interval);
        timer.interval = null;
        timer.runningSince = null;
        document.querySelector("#timerStart").textContent = "继续";
        updateTimerDisplay();
        return;
      }
      document.querySelector("#timerStart").textContent = "暂停";
      if (!timer.startedAt) timer.startedAt = Date.now();
      timer.runningSince = Date.now();
      timer.interval = setInterval(() => {
        syncTimerFromClock();
        updateTimerDisplay();
        if (timerMode === "countdown" && timer.left === 0) finishTimer();
      }, 1000);
    });

    document.querySelector("#timerFinish").addEventListener("click", finishTimer);
    document.querySelector("#timerAbandon").addEventListener("click", abandonTimer);
    document.addEventListener("visibilitychange", updateTimerDisplay);
    document.querySelector("#cityShelfButton")?.addEventListener("click", openCityShelf);
    document.addEventListener("click", closeTimelineMenu);
    document.addEventListener("click", closeTaskMenu);

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(item => item.classList.remove("active"));
        document.querySelectorAll(".view").forEach(view => view.classList.remove("active"));
        tab.classList.add("active");
        document.querySelector(`#${tab.dataset.view}`).classList.add("active");
        if (tab.dataset.view === "pet-view") {
          activeStampPage = -1;
          renderPet();
        }
        if (tab.dataset.view === "rewards-view") requestAnimationFrame(syncTravelPanelHeight);
        const route = tab.dataset.view.replace("-view", "");
        if (location.hash !== `#${route}`) history.replaceState(null, "", `#${route}`);
      });
    });

    document.querySelectorAll("[data-view-jump]").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelector(`.tab[data-view="${button.dataset.viewJump}"]`)?.click();
      });
    });

    function openRouteFromHash() {
      const route = location.hash.replace("#", "");
      if (!route) return;
      const normalizedRoute = route === "tasks" ? "home" : route;
      const tab = document.querySelector(`[data-view="${normalizedRoute}-view"]`);
      if (tab) tab.click();
    }

    window.addEventListener("hashchange", openRouteFromHash);
    window.addEventListener("resize", () => requestAnimationFrame(syncTravelPanelHeight));

    setInterval(renderPlans, 60 * 1000);

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    render();
    updateTimerRewardRule();
    openRouteFromHash();
    updateTimerDisplay();
  </script>
  <!-- deploy: keep pet album cards full size v114 -->
</body>
</html>
